.np-pop-search input::placeholder{color:var(--g400);}
.np-pop-searchx{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:var(--g500);flex-shrink:0;}
.np-pop-searchx:hover{background:var(--g100);color:var(--g800);}
.np-pop-empty{padding:20px 12px;text-align:center;font-size:13px;color:var(--g500);}
.np-pop-row{display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border-radius:10px;text-align:left;transition:background .12s;border:none;background:none;cursor:pointer;font-family:inherit;}
.np-pop-row:hover{background:var(--g50);}
.np-pop-row.on{background:var(--blue-light);}
.np-pop-name{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-pop-info{flex:1;min-width:0;display:flex;flex-direction:column;}
.np-pop-info .np-pop-name{flex:none;}
.np-pop-sub{font-size:11px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-pop-row.on .np-pop-sub{color:var(--blue-dark);}
.np-pop-role{font-size:11px;font-weight:600;color:var(--g600);background:var(--g100);border-radius:7px;padding:2px 9px;white-space:nowrap;flex-shrink:0;}
.np-pop-row.on .np-pop-role{background:#fff;color:var(--blue-dark);}
.np-pop-tick{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--g300);background:#fff;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.np-pop-row:hover .np-pop-tick{border-color:var(--g500);}
.np-pop-tick.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.np-pop-all{border-bottom:1px solid var(--g100);border-radius:10px 10px 8px 8px;margin-bottom:2px;padding-bottom:11px;}
.np-pop-all-ava{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);flex-shrink:0;}
.np-pop-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--g100);background:var(--g50);}
.np-pop-link{font-size:12.5px;font-weight:600;color:var(--blue);padding:3px 6px;border-radius:6px;border:none;background:none;cursor:pointer;font-family:inherit;}
.np-pop-link:hover{background:var(--blue-light);}
.np-cpop{position:fixed;z-index:130;background:#fff;border-radius:13px;box-shadow:var(--np-sh3);border:1px solid var(--g200);padding:13px;width:202px;}
@media (prefers-reduced-motion:no-preference){.np-cpop{animation:npPopsm .14s ease both;}}
.np-cpop-head{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g600);margin-bottom:10px;}
.np-cpop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.np-cswatch{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;outline:2px solid transparent;outline-offset:2px;transition:transform .1s,outline-color .12s;border:none;cursor:pointer;}
.np-cswatch:hover{transform:scale(1.09);}
.np-cswatch.on{outline-color:currentColor;}
.np-fs{padding:8px 22px 22px;display:flex;flex-direction:column;gap:12px;}
.np-fs-empty{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;padding:30px 18px 26px;border:1.5px dashed var(--g300);border-radius:14px;background:var(--g50);margin-top:4px;}
.np-fs-empty .np-fe-ic{width:54px;height:54px;border-radius:14px;background:#fff;color:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:var(--np-sh1);}
.np-fs-empty h3{margin:4px 0 0;font-size:15px;font-weight:700;color:var(--g800);}
.np-fs-empty p{margin:0;font-size:12.5px;color:var(--g500);max-width:280px;line-height:1.5;}
.np-root{border:1px solid var(--g200);border-radius:13px;overflow:hidden;background:#fff;box-shadow:var(--np-sh1);}
.np-root-head{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--rh);border-bottom:1px solid transparent;transition:border-color .15s;}
.np-root.open .np-root-head{border-bottom-color:var(--g100);}
.np-root-chev{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--rc);transition:background .12s,transform .15s;flex-shrink:0;border:none;background:none;cursor:pointer;}
.np-root-chev:hover{background:rgba(0,0,0,.05);}
.np-root-ic{color:var(--rc);display:flex;flex-shrink:0;}
.np-nameinp{flex:1;min-width:0;border:1px solid transparent;border-radius:8px;background:transparent;padding:5px 9px;font-family:inherit;outline:none;transition:border-color .12s,background .12s,box-shadow .12s;}
.np-nameinp:hover{background:rgba(255,255,255,.65);}
.np-nameinp:focus{background:#fff;border-color:var(--rc);box-shadow:0 0 0 3px rgba(0,0,0,.04);}
.np-root-name{font-size:15px;font-weight:700;color:var(--g900);}
.np-root-badge{font-size:11px;font-weight:700;color:var(--rc);background:rgba(255,255,255,.78);border-radius:9px;padding:2px 9px;flex-shrink:0;white-space:nowrap;}
.np-root-acts{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.np-iact{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--g500);transition:background .12s,color .12s;border:none;background:none;cursor:pointer;}
.np-iact:hover{background:rgba(0,0,0,.06);color:var(--g800);}
.np-iact.danger:hover{background:var(--danger-light);color:var(--danger);}
.np-color-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .12s;border:none;background:none;cursor:pointer;}
.np-color-dot:hover{background:rgba(0,0,0,.06);}
.np-color-dot .np-dot{width:17px;height:17px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);}
.np-memb-btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:2px 8px 2px 5px;border-radius:20px;background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.06);transition:background .12s;flex-shrink:0;cursor:pointer;}
.np-memb-btn:hover{background:#fff;}
.np-memb-empty{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--rc);padding:0 3px;}
.np-av-stack{display:inline-flex;align-items:center;}
.np-av-stack .np-av{margin-left:-7px;box-shadow:0 0 0 2px var(--rh);border-radius:50%;}
.np-av-stack .np-av:first-child{margin-left:0;}
.np-av-more{display:inline-flex;align-items:center;justify-content:center;height:20px;min-width:20px;margin-left:-5px;padding:0 5px;border-radius:10px;background:rgba(0,0,0,.08);color:var(--g700);font-size:10.5px;font-weight:700;box-shadow:0 0 0 2px var(--rh);}
.np-children{padding:6px 8px 8px;}
.np-subrow{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:9px;transition:background .1s;position:relative;}
.np-subrow:hover{background:var(--g50);}
.np-sub-ic{display:flex;flex-shrink:0;}
.np-sub-name{font-size:13.5px;font-weight:500;color:var(--g800);}
.np-sub-acts{display:flex;align-items:center;gap:2px;margin-left:auto;opacity:0;transition:opacity .12s;flex-shrink:0;}
.np-subrow:hover .np-sub-acts,.np-subrow:focus-within .np-sub-acts{opacity:1;}
.np-sub-act{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--g500);transition:background .12s,color .12s;border:none;background:none;cursor:pointer;}
.np-sub-act:hover{background:var(--g200);color:var(--g800);}
.np-sub-act.danger:hover{background:var(--danger-light);color:var(--danger);}
.np-nest{margin-left:13px;padding-left:11px;border-left:1.5px solid var(--g200);margin-top:2px;}
.np-add-sub{display:inline-flex;align-items:center;gap:7px;height:32px;margin:3px 6px 0;padding:0 10px;border-radius:8px;color:var(--g600);font-size:12.5px;font-weight:600;transition:background .12s,color .12s;border:none;background:none;cursor:pointer;}
.np-add-sub:hover{background:var(--blue-light);color:var(--blue-dark);}
.np-add-root{display:flex;align-items:center;gap:11px;width:100%;padding:14px 16px;border:1.5px dashed var(--g300);border-radius:13px;background:var(--g50);color:var(--g600);transition:border-color .12s,color .12s,background .12s;text-align:left;cursor:pointer;}
.np-add-root:hover{border-color:var(--blue);color:var(--blue-dark);background:var(--blue-light);}
.np-add-root .np-ar-ic{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;color:inherit;box-shadow:var(--np-sh1);flex-shrink:0;}
.np-add-root .np-ar-tt{display:flex;flex-direction:column;line-height:1.3;}
.np-add-root .np-ar-tt b{font-size:13.5px;font-weight:700;color:var(--g800);}
.np-add-root:hover .np-ar-tt b{color:var(--blue-dark);}
.np-add-root .np-ar-tt span{font-size:11.5px;color:var(--g500);}
.np-foot{display:flex;align-items:center;gap:14px;padding:14px 22px;border-top:1px solid var(--g200);background:#fff;flex-shrink:0;}
.np-foot-info{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--g600);}
.np-foot-info svg{color:var(--g400);}
.np-foot-info b{color:var(--g800);font-weight:700;}
.np-foot-acts{margin-left:auto;display:flex;align-items:center;gap:10px;}
.np-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:42px;padding:0 20px;border-radius:var(--pill);font-size:14px;font-weight:600;transition:background .15s,box-shadow .15s,border-color .15s,color .15s;white-space:nowrap;border:none;cursor:pointer;font-family:inherit;}
.np-btn-ghost{border:1px solid var(--g300);color:var(--g700);background:#fff;}
.np-btn-ghost:hover{background:var(--g50);border-color:var(--g500);}
.np-btn-primary{background:var(--blue);color:#fff;box-shadow:var(--np-sh1);}
.np-btn-primary:hover{background:var(--blue-dark);}
.np-btn-primary:disabled{background:var(--g200);color:var(--g500);box-shadow:none;cursor:not-allowed;}
.np-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--g900);color:#fff;padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--np-sh3);z-index:140;display:flex;align-items:center;gap:10px;}
.np-toast svg{color:#8AB4F8;}
.np-av{display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;border-radius:50%;flex-shrink:0;line-height:1;}
@media (max-width:820px){
  .np-body{grid-template-columns:1fr;}
  .np-pane-l{border-right:none;border-bottom:1px solid var(--g200);}
}

    xls: { icon: "xls", color: "#188038", label: "X" },

  return <Icon name={m.icon} size={size} style={{ color: m.color }} />;
}

  // A subfolder is logically one file (its files are revisions). Progress = subfolders with a file / total subfolders.
  let withFile = 0, total = 0;
  const walk = (list) => (list || []).forEach(f => {
    if (f.fileNo && String(f.fileNo).trim()) { total++; if ((f.files || []).length > 0) withFile++; }
    walk(f.subfolders);
  });
  walk(p.folders);
  const pct = total ? Math.min(100, Math.round((withFile / total) * 100)) : 0;
  const pending = ACTION_ITEMS.filter(a => a.projectId === p.id && a.status !== "completed").length;
  const status = pct >= 100 ? "Completed" : pct === 0 ? "Planning" : pending > 3 ? "At Risk" : "In Progress";

  return { pct, pending, status, code, uploaded: withFile, target: total };

// ---- comment files (attachments) shown in the DetailPanel Comments tab ----
function cf_extType(name) {
  const e = (name.split(".").pop() || "").toLowerCase();
  if (e === "pdf") return "pdf";
  if (e === "doc" || e === "docx") return "doc";
  if (e === "xls" || e === "xlsx" || e === "csv") return "xls";
  if (["png", "jpg", "jpeg", "gif", "webp"].includes(e)) return "image";
  return "pdf";
}
function cf_humanSize(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return Math.round(b / 1024) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}
function cf_buildPdf(fileName, body) {
  const esc = (s) => String(s || "").replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
  const lines = [
    "BT /F1 18 Tf 60 760 Td (Comment file) Tj ET",
    "BT /F1 12 Tf 60 730 Td (" + esc(fileName) + ") Tj ET",
    "BT /F1 11 Tf 60 700 Td (" + esc(body) + ") Tj ET"
  ].join("\n");
  const objs = [
    "<</Type/Catalog/Pages 2 0 R>>",
    "<</Type/Pages/Kids[3 0 R]/Count 1>>",
    "<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Resources<</Font<</F1 5 0 R>>>>/Contents 4 0 R>>",
    "<</Length " + lines.length + ">>\nstream\n" + lines + "\nendstream",
    "<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>"
  ];
  let pdf = "%PDF-1.4\n";
  const offsets = [];
  objs.forEach((b, i) => { offsets.push(pdf.length); pdf += (i + 1) + " 0 obj\n" + b + "\nendobj\n"; });
  const xrefStart = pdf.length;
  pdf += "xref\n0 " + (objs.length + 1) + "\n0000000000 65535 f \n";
  offsets.forEach((off) => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
  pdf += "trailer\n<</Size " + (objs.length + 1) + "/Root 1 0 R>>\nstartxref\n" + xrefStart + "\n%%EOF";
  return new Blob([pdf], { type: "application/pdf" });
}
function seedCommentFiles(item) {
  if (!item || item.kind !== "file") return [];
  const base = (item.name || "file").replace(/\.[^.]+$/, "");
  return [
    { id: "cf-" + item.id + "-1", name: base + " — review comments.pdf", by: "c", time: "Yesterday", type: "pdf", text: "Consolidated review comments for " + item.name },
    { id: "cf-" + item.id + "-2", name: base + " — markup notes.pdf", by: "asha", time: "2 days ago", type: "pdf", text: "Markup notes and annotations for " + item.name },
  ];
}
function downloadCommentFile(cf) {
  const blob = cf.file ? cf.file : cf_buildPdf(cf.name, cf.text || "Comment file");
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = cf.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function DetailPanel({ item, onClose, bookmarked, onToggleBookmark, onSaveNote, onAddUser, onAddUserKey, onAddMemberKey, onRemoveMember, onDownload, onShare, onUpload, onRename, onDelete, onAssignAction, onUnassignAction, onAct, actionDone, onSetStatus, onSetFileNo }) {

  const [noteText, setNoteText] = useState("");

  // Project-level members are shown in folder access lists but can't be removed at folder/lower level.

  const ai = item._actionItem || (item.kind === "file"

          </button>

}

function Meta({ label, value, sub }) {

}

// ============ CONTEXT (MORE) MENU ============

    { id: "bookmark", label: "Bookmark", icon: "starOutline" },
    { id: "open", label: "Open", icon: "project", sep: true },
    { id: "details", label: "Details", icon: "info" },
    { id: "delete", label: "Delete", icon: "trash", danger: true },

  folder: [
    { id: "addFile", label: "Add File", icon: "addFile" },
    { id: "review", label: "Review Files", icon: "review" },
    { id: "approve", label: "Approve Files", icon: "approve" },
    { id: "pending", label: "Show Pending Updates", icon: "pending" },
    { id: "bookmark", label: "Bookmark", icon: "starOutline" },
    { id: "open", label: "Open", icon: "folder", sep: true },
    { id: "details", label: "Details", icon: "info" },
    { id: "delete", label: "Delete", icon: "trash", danger: true },
  ],
  file: [
    { id: "download", label: "Download", icon: "download" },
    { id: "review", label: "Review File", icon: "review" },

<!-- dms-list.jsx -->
<script type='text/babel'>
const { Icon, FileTypeIcon, USERS, CURRENT_USER, DATA, NOTIFICATIONS, itemCount, ownerName,
  Sidebar, TopBar, FilterRow, ProfileMenu, NotificationPopup, DetailPanel, ContextMenu, Avatar } = window.DMS;
const { useState, useEffect, useRef, useMemo } = React;

// ============ LIST ROW ============
// Hover quick icons follow DMS spec v3 §3.6
const QUICK_BY_KIND = {
  project: [{ id: "addFolder", icon: "addFolder", label: "Add folder" }, { id: "review", icon: "review", label: "Review files" }],
  folder: [{ id: "addFile", icon: "addFile", label: "Add file" }, { id: "review", icon: "review", label: "Review files" }],
  file: [{ id: "comment", icon: "comment", label: "Add comment" }, { id: "download", icon: "download", label: "Download" }]
};

function ListRow({ item, columns, selected, onSelect, onSingle, onDouble, onName, onDownloadName, bookmarked, onToggleBookmark, onMore, onQuick, anySelected, unread }) {
  const clickTimer = useRef(null);
  const handleClick = (e) => {
    if (e.target.closest(".row-actions") || e.target.closest(".row-check")) return;
    if (clickTimer.current) return;
    clickTimer.current = setTimeout(() => {clickTimer.current = null;onSingle(item);}, 220);
  };
  const handleDouble = (e) => {
    if (e.target.closest(".row-actions") || e.target.closest(".row-check")) return;
    if (clickTimer.current) {clearTimeout(clickTimer.current);clickTimer.current = null;}
    onDouble(item);
  };
  const iconType = item.kind === "file" ? item.type : item.kind;
  const quick = QUICK_BY_KIND[item.kind] || QUICK_BY_KIND.file;
  const pendingCount = (() => {
    if (item.kind === "file") return item.action ? 1 : 0;
    if (item.kind === "folder") return (item.files || []).filter(f => f.action).length;
    if (item.kind === "project") return (item.folders || []).reduce((s, f) => s + (f.files || []).filter(x => x.action).length, 0);
    return 0;
  })();
  // project/folder names navigate into the item; clicking the name should NOT also open the detail panel
  const nameNav = onName && (item.kind === "project" || item.kind === "folder");
  const fileNameDl = item.kind === "file" && !!onDownloadName;
  const handleName = (e) => {
    if (nameNav) {
      e.stopPropagation();
      if (clickTimer.current) {clearTimeout(clickTimer.current);clickTimer.current = null;}
      onName(item);
      return;
    }
    if (fileNameDl) {
      e.stopPropagation();
      if (clickTimer.current) {clearTimeout(clickTimer.current);clickTimer.current = null;}
      onDownloadName(item);
    }
  };

  return (
    <div className={"list-row" + (selected ? " selected" : "") + (anySelected ? " select-mode" : "") + (unread ? " unread-row" : "") + (pendingCount > 0 ? " row-pending" : "")}
    onClick={handleClick} onDoubleClick={handleDouble} tabIndex={0}>
      <label className="row-check" onClick={(e) => e.stopPropagation()}>
        <input type="checkbox" checked={selected} onChange={() => onSelect(item)} aria-label={"Select " + item.name} />
        <span className="check-box"><Icon name="check" size={16} /></span>
      </label>
      <div className="cell cell-name" style={{ width: "350px" }}>
        <span className={"row-icon-wrap" + (item.kind === "project" ? " row-icon-wrap--proj" : "")}>
          <FileTypeIcon type={iconType} size={item.kind === "project" ? 40 : item.kind === "file" ? 30 : 22} />
          {item.kind === "project" && PROJECT_BADGES[item.id]
            ? <span className={"row-status-glyph rsg-" + PROJECT_BADGES[item.id].tone}
                title={PROJECT_BADGES[item.id].label + (pendingCount > 0 ? " · " + pendingCount + " pending action" + (pendingCount > 1 ? "s" : "") : "")}>
                <Icon name={STATUS_GLYPH[PROJECT_BADGES[item.id].tone] || "info"} size={10} />
              </span>
            : pendingCount > 0 && <span className="row-pending-dot" title={pendingCount + " pending action" + (pendingCount > 1 ? "s" : "")} />}
        </span>
        <span className="row-name-wrap">
          <span className="row-name-line">
            <span className={"row-name" + (nameNav || fileNameDl ? " row-name-link" : "")} title={nameNav ? "Open " + item.name : (fileNameDl ? "Download " + item.name : item.name)}
              onClick={handleName}>{item.name}</span>
            {bookmarked && <Icon name="star" size={15} style={{ color: "#F9AB00" }} />}
            {item.kind === "folder" && pendingCount > 0 && <span className="pending-pill" title={pendingCount + " pending action" + (pendingCount > 1 ? "s" : "")}>{pendingCount}</span>}
          </span>
          {item.fileNo && <span className="row-fileno">{item.fileNo}</span>}
        </span>
      </div>
      {columns.map((col) =>
      <div className={"cell cell-" + col.key} key={col.key} style={{ textAlign: "left", width: "200px" }}>{col.render(item)}</div>
      )}
      <div className="row-actions">
        <button className="icon-btn small" title="More actions" aria-label="More actions"
        onClick={(e) => {e.stopPropagation();onMore(item, e);}}><Icon name="more" size={20} /></button>
      </div>
    </div>);

}

// ============ LIST CARD ============
function ListCard({ title, count, countLabel, columns, items, selection, onToggleSel, onToggleAll,
  onSingle, onDouble, onName, onDownloadName, bookmarks, onToggleBookmark, onMore, onQuick, emptyText, search, onSearch, onBulk, kind, readSet, hideHead, hideCount, onNewFolder, onUploadFile, noSelect, newFolderLabel, hideEmpty }) {
  const selCount = selection.size;
  const allSelected = items.length > 0 && items.every((i) => selection.has(i.id));
  // Bulk actions per spec v3 §3.7 — Review/Approve only apply to file lists
  const fileScope = kind === "file" || kind === "recent";
  const bulkActions = [
  ...(fileScope ? [["review", "Review Selected"], ["approve", "Approve Selected"]] : []),
  ["star", "Bookmark / Unbookmark"], ["pending", "Show Pending Updates"],
  ["move", "Move to…"], ["trash", "Delete"]];

  return (
    <div className={"list-card list-" + (kind || "file") + " no-select"} style={{ "--cols": columns.length }}>
      {selCount > 0 ?
      <div className="bulk-toolbar">
          <button className="icon-btn" onClick={() => onBulk("clear")} aria-label="Clear selection"><Icon name="close" size={20} /></button>
          <span className="bulk-count">{selCount} selected</span>
        </div> :
      hideHead ? null :
      <div className="card-head">
          <div className="card-title">{title}{!hideCount && <span className="count-badge">{count} {countLabel}</span>}</div>
          <div className="card-head-right">
            {onNewFolder && (
              <button className="btn-primary card-newfolder" onClick={onNewFolder}><Icon name="addFolder" size={18} />{newFolderLabel || "Create Filename"}</button>
            )}
            {onUploadFile && (
              <button className="btn-primary card-newfolder" onClick={onUploadFile}><Icon name="addFile" size={18} />Upload file</button>
            )}
          </div>
        </div>
      }
      <div className="col-head">
        <label className="row-check head-check" onClick={(e) => e.stopPropagation()}>
          <input type="checkbox" checked={allSelected} onChange={onToggleAll} aria-label="Select all" />
          <span className="check-box"><Icon name="check" size={16} /></span>
        </label>
        <div className="cell cell-name" style={{ width: "350px" }}>Name</div>
        {columns.map((c) => <div className={"cell cell-" + c.key} key={c.key} style={{ width: "200px", textAlign: "left" }}>{c.label}</div>)}
        <div className="row-actions-head" />
      </div>
      <div className="rows-scroll">
        {items.length === 0 ?
        (hideEmpty ? null :
        <div className="empty-state">
            <Icon name="folder" size={56} style={{ color: "#DADCE0" }} />
            <p>{emptyText}</p>
          </div>) :
        items.map((it) =>
        <ListRow key={it.id} item={it} columns={columns} selected={selection.has(it.id)}
        anySelected={selCount > 0} unread={it.kind === "file" && it.read === false && !(readSet && readSet.has(it.id))}
        onSelect={onToggleSel} onSingle={onSingle} onDouble={onDouble} onName={onName} onDownloadName={onDownloadName}
        bookmarked={bookmarks.has(it.id)} onToggleBookmark={onToggleBookmark} onMore={onMore} onQuick={onQuick} />
        )}
      </div>
    </div>);

}

// ============ BREADCRUMB ============
function Breadcrumb({ segments, onJump }) {
  return (
    <div className="breadcrumb">
      {segments.map((s, i) => {
        const last = i === segments.length - 1;
        return (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevronRight" size={15} className="bc-sep" />}
            {last ? <span className="bc-current">{s.label}</span> :
            <button className="bc-link" onClick={() => onJump(i)}>{s.label}</button>}
          </React.Fragment>);

      })}
    </div>);

}

// ============ PROGRESS BAR COMPONENT ============
function ProgressBar({ current, target }) {
  const isComplete = current >= target;
  return (
    <span className={isComplete ? "progress-label complete" : "progress-label"}>{current}/{target}</span>);

}

// Project completion: aggregate uploaded files vs targets across all folders
function ProjectProgress({ pct }) {
  const complete = pct >= 100;
  return (
    <span className="proj-progress" title={pct + "% complete"}>
      <span className="pp-track"><span className="pp-fill" style={{ width: pct + "%", background: complete ? "#188038" : "var(--blue)" }} /></span>
      <span className={"pp-pct" + (complete ? " complete" : "")}>{pct}%</span>
    </span>);
}

// ============ COLUMN DEFS ============
const ownerCol = { key: "owner", label: "Created by", render: (it) =>
  <span className="owner-cell">{it.owner === "v" ? <><Avatar userKey="v" size={24} /> me</> : <><Avatar userKey={it.owner} size={24} /> {ownerName(it.owner)}</>}</span> };
const modCol = { key: "modified", label: "Last Modified", render: (it) => it.modified };
const progressCol = { key: "progress", label: "Uploaded", render: (it) => it.fileTarget ? <ProgressBar current={it.files.length} target={it.fileTarget} /> : <span className="muted-dash">—</span> };
const projectProgressCol = { key: "completion", label: "Completion", render: (it) => {
    let withFile = 0, total = 0;
    const walk = (list) => (list || []).forEach(f => { if (f.fileNo && String(f.fileNo).trim()) { total++; if ((f.files || []).length > 0) withFile++; } walk(f.subfolders); });
    walk(it.folders);
    const pct = total ? Math.min(100, Math.round((withFile / total) * 100)) : 0;
    return <ProjectProgress pct={pct} />;
  } };

// rough recency rank from a relative-time string, to pick a project's most recently touched file
function recencyRank(s) {
  s = (s || "").toLowerCase();
  if (s.includes("just now")) return 100;
  if (s.includes("today")) return 90;
  if (s.includes("hour")) return 85;
  if (s.includes("yesterday")) return 70;
  if (/\bday/.test(s)) return 60;
  return 10;
}
const lastAccessedCol = { key: "lastfile", label: "Last Accessed File", render: (it) => {
    let best = null, bestRank = -1, bestFolder = null;
    (it.folders || []).forEach(f => (f.files || []).forEach(fl => {
      const r = recencyRank(fl.opened || fl.modified);
      if (r > bestRank) { bestRank = r; best = fl; bestFolder = f; }
    }));
    if (!best) return <span className="muted-dash">—</span>;
    return (
      <span className="laf-cell">
        <FileTypeIcon type={best.type} size={22} />
        <span className="laf-info">
          <span className="laf-name" title={best.name}>{best.name}</span>
          <span className="laf-folder" title={bestFolder.name}>{bestFolder.name}</span>
        </span>
      </span>);
  } };

const PROJECT_STATUS = { p1: "In Progress", p2: "Active", p3: "In Progress", p4: "Hold", p5: "Completed", p6: "Active" };
const PROJECT_STATUS_META = {
  "Active":      { color: "#188038", soft: "#E6F4EA" },
  "In Progress": { color: "#1A73E8", soft: "#E8F0FE" },
  "Hold":        { color: "#B26A00", soft: "#FEF3E0" },
  "Completed":   { color: "#5F6368", soft: "#EEF0F2" },
  "Archived":    { color: "#9AA0A6", soft: "#F1F3F4" },
};
// Persisted Active/Archived overrides set from the project detail panel
try {
  const saved = JSON.parse(localStorage.getItem("dms_proj_status") || "{}");
  Object.assign(PROJECT_STATUS, saved);
} catch (e) {}
function getProjStatus(id) { return PROJECT_STATUS[id] || "Active"; }
function setProjStatus(id, status) {
  PROJECT_STATUS[id] = status;
  try {
    const saved = JSON.parse(localStorage.getItem("dms_proj_status") || "{}");
    saved[id] = status;
    localStorage.setItem("dms_proj_status", JSON.stringify(saved));
  } catch (e) {}
}
const projStatusCol = { key: "pstatus", label: "Status", render: (it) => {
    const st = PROJECT_STATUS[it.id] || "Active";
    const m = PROJECT_STATUS_META[st] || PROJECT_STATUS_META["Active"];
    return <span className="status-pill" style={{ color: m.color, background: m.soft }}><span className="pri-dot" style={{ background: m.color }} />{st}</span>;
  } };

// Per-project highlight badge shown next to the name — flags new uploads / updates / actions the user must address
const PROJECT_BADGES = {
  p1: { label: "Action", tone: "urgent" },
  p2: { label: "New",    tone: "new" },
  p3: { label: "Updated", tone: "info" },
  p6: { label: "New",    tone: "new" },
};
// glyph stamped onto the project folder icon to reflect its status
const STATUS_GLYPH = { new: "newPlus", info: "recent", urgent: "bell" };

const PROJECT_COLS = [projStatusCol, modCol, lastAccessedCol];
const FOLDER_COLS = [progressCol, modCol];
const assignedToCol = { key: "assignedto", label: "Assigned To", render: (it) => {
    const AS = window.DMS.AssigneeStack;
    const assignees = it.assignees || (it.action && it.action.assignee ? [it.action.assignee] : []);
    if (!assignees.length) return <span className="muted-dash">—</span>;
    return <AS users={assignees} size={26} fileId={it.id} />;
  } };
const uploadedByCol = { key: "uploadedby", label: "Uploaded By", render: (it) =>
  <span className="owner-cell"><Avatar userKey={it.owner} size={24} /> {it.owner === "v" ? "me" : ownerName(it.owner)}</span> };
const uploadedAtCol = { key: "uploadedat", label: "Uploaded At", render: (it) => it.modified };

// short single-line note (latest note on the file), truncated with ellipsis
function fileNoteText(it) {
  if (it.notes && it.notes.length) return it.notes[it.notes.length - 1].text;
  if (it.note) return it.note;
  return null;
}
const noteCol = { key: "note", label: "Note", render: (it) => {
    const t = fileNoteText(it);
    if (!t) return <span className="muted-dash">—</span>;
    return <span className="note-cell" title={t}>{t}</span>;
  } };

// build a minimal valid one-page PDF as a Blob, then trigger a download
function buildCommentPdf(fileName, noteText) {
  const esc = (s) => String(s || "").replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
  const lines = [
    "BT /F1 18 Tf 60 760 Td (Comment) Tj ET",
    "BT /F1 12 Tf 60 730 Td (File: " + esc(fileName) + ") Tj ET",
    "BT /F1 11 Tf 60 700 Td (" + esc(noteText || "No note recorded for this document.") + ") Tj ET"
  ].join("\n");
  const objs = [
    "<</Type/Catalog/Pages 2 0 R>>",
    "<</Type/Pages/Kids[3 0 R]/Count 1>>",
    "<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Resources<</Font<</F1 5 0 R>>>>/Contents 4 0 R>>",
    "<</Length " + lines.length + ">>\nstream\n" + lines + "\nendstream",
    "<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>"
  ];
  let pdf = "%PDF-1.4\n";
  const offsets = [];
  objs.forEach((body, i) => {
    offsets.push(pdf.length);
    pdf += (i + 1) + " 0 obj\n" + body + "\nendobj\n";
  });
  const xrefStart = pdf.length;
  pdf += "xref\n0 " + (objs.length + 1) + "\n0000000000 65535 f \n";
  offsets.forEach((off) => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
  pdf += "trailer\n<</Size " + (objs.length + 1) + "/Root 1 0 R>>\nstartxref\n" + xrefStart + "\n%%EOF";
  return new Blob([pdf], { type: "application/pdf" });
}
function downloadCommentPdf(it) {
  const base = (it.name || "document").replace(/\.[^.]+$/, "");
  const url = URL.createObjectURL(buildCommentPdf(it.name, fileNoteText(it)));
  const a = document.createElement("a");
  a.href = url;
  a.download = base + " — comment.pdf";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
const commentCol = { key: "comment", label: "Comment", render: (it) =>
  <button className="icon-btn small comment-dl" title="Download comment (PDF)" aria-label={"Download comment PDF for " + it.name}
    onClick={(e) => { e.stopPropagation(); downloadCommentPdf(it); }}><Icon name="comment" size={20} /></button> };

const FILE_COLS = [uploadedByCol, uploadedAtCol, noteCol, assignedToCol, commentCol];
// generic owner column + mixed (subfolders + files) column set for nested folder views
const ownerColGen = { key: "ownergen", label: "Owner", render: (it) =>
  <span className="owner-cell"><Avatar userKey={it.owner} size={24} /> {it.owner === "v" ? "me" : ownerName(it.owner)}</span> };
const MIXED_COLS = [ownerColGen, modCol];
// assigned-users column for nested folder views (folders carry `access`, files carry `assignees`)
const assignedUsersCol = { key: "assignedusers", label: "Assigned To", render: (it) => {
    const AS = window.DMS.AssigneeStack;
    const users = (it.assignees && it.assignees.length ? it.assignees : it.access) || [];
    if (!users.length) return <span className="muted-dash">—</span>;
    return <AS users={users} size={26} fileId={it.id} />;
  } };
const FOLDER_MIX_COLS = [progressCol, modCol, assignedUsersCol];

// project-chip column for unified views
function chipCol(getProj) {
  return { key: "chip", label: "Project", render: (it) => <span className="proj-chip">{getProj(it)}</span> };
}

// ============ RECENT FOLDERS STRIP ============
function RecentFolders({ folders, collapsed, onToggle, onOpen, onMenu, onSeeAll }) {
  if (!folders.length) return null;
  return (
    <div className="recent-folders">
      <div className="rf-head">
        <button className="rf-toggle" onClick={onToggle} aria-expanded={!collapsed}>
          <Icon name={collapsed ? "chevronRight" : "chevronDown"} size={20} />
          <span>Recent folders</span>
        </button>
        {folders.length > 6 && <button className="link-btn" onClick={onSeeAll}>See all</button>}
      </div>
      {!collapsed &&
      <div className="rf-strip">
          {folders.slice(0, 6).map((f) =>
        <div key={f.id} className="rf-card" tabIndex={0} role="button"
        onClick={() => onOpen(f)}
        onKeyDown={(e) => {if (e.key === "Enter") onOpen(f);}} title={f.name}>
              <span className="rf-icon">
                {f.shared ?
            <Icon name="shared" size={24} style={{ color: "#5F6368" }} /> :
            <FileTypeIcon type="folder" size={24} />}
              </span>
              <div className="rf-info">
                <div className="rf-name">{f.name}</div>
                <div className="rf-loc">in {f._proj}</div>
              </div>
              <button className="icon-btn small rf-more" aria-label="Folder actions"
          onClick={(e) => {e.stopPropagation();onMenu(f, e);}}>
                <Icon name="more" size={20} />
              </button>
            </div>
        )}
        </div>
      }
    </div>);

}

Object.assign(window.DMS, { ListCard, Breadcrumb, ListRow, RecentFolders, ProgressBar, PROJECT_COLS, FOLDER_COLS, FOLDER_MIX_COLS, FILE_COLS, MIXED_COLS, ownerCol, modCol, lastAccessedCol, chipCol, projStatusCol, PROJECT_STATUS, PROJECT_STATUS_META, getProjStatus, setProjStatus, downloadCommentPdf });
</script>


<!-- dms-pm.jsx -->
<script type='text/babel'>
const { Icon, FileTypeIcon, USERS, CURRENT_USER, DATA, ownerName, Avatar,
  STATUSES, STATUS_META, PRIORITY_META, APPROVAL_META, ACT_TYPE_ICON, projName, ALL_FOLDERS } = window.DMS;
const { useState, useMemo, useRef } = React;

// ---------- shared badges ----------
function PriorityBadge({ p }) {
  const m = PRIORITY_META[p] || PRIORITY_META.low;

    <span className="pri-dot" style={{ background: m.color }} />{m.label}</span>;
}
function StatusPill({ s }) {
  const m = STATUS_META[s] || STATUS_META.todo;
  return <span className="status-pill" style={{ color: m.color, background: m.soft }}>
    <span className="pri-dot" style={{ background: m.color }} />{m.label}</span>;
}
function ProjChip({ id }) { return <span className="proj-chip">{projName(id)}</span>; }

// ============ APPROVAL CARD (used in Home "My Actions" + full My Actions page) ============
// Detailed card: file, project, submitted-by/time, status pill, and a 3-dot menu to act.
function ApprovalCard({ a, onDecide, onOpen, compact }) {
  const [menu, setMenu] = useState(false);
  const [pos, setPos] = useState(null);
  const btnRef = useRef(null);
  const m = APPROVAL_META[a.status];
  const actionable = a.status === "pending" || a.status === "changes";
  const toggleMenu = () => {
    if (!menu && btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      const W = 200, H = actionable ? 196 : 100;
      let left = Math.max(8, Math.min(r.right - W, window.innerWidth - W - 8));
      let top = r.bottom + 6;
      if (top + H > window.innerHeight - 8) top = Math.max(8, r.top - H - 6);
      setPos({ top, left });
    }
    setMenu(v => !v);
  };
  const menuNode = (
    <div className="anchor appr-card-menu">
      <button ref={btnRef} className="icon-btn small" onClick={toggleMenu} aria-label="Perform action" title="Actions"><Icon name="more" size={20} /></button>
      {menu && pos && (
        <>
          <div className="overlay-transparent" onClick={() => setMenu(false)} />
          <div className="popmenu" style={{ position: "fixed", top: pos.top, left: pos.left, minWidth: 196 }} onClick={e => e.stopPropagation()}>
            {actionable ? (
              <>
                <button className="popmenu-item" onClick={() => { onDecide(a, "approved", "Approved"); setMenu(false); }}><Icon name="approve" size={20} /><span>Approve</span></button>
                <button className="popmenu-item" onClick={() => { onDecide(a, "changes", "Requested changes"); setMenu(false); }}><Icon name="review" size={20} /><span>Request changes</span></button>
                <button className="popmenu-item danger" onClick={() => { onDecide(a, "rejected", "Rejected"); setMenu(false); }}><Icon name="reject" size={20} /><span>Reject</span></button>
                <div className="popmenu-divider" />
              </>
            ) : (
              <button className="popmenu-item" onClick={() => { onDecide(a, "pending", "Reopened"); setMenu(false); }}><Icon name="history" size={20} /><span>Reopen review</span></button>
            )}
            <button className="popmenu-item" onClick={() => { onOpen && onOpen(a); setMenu(false); }}><Icon name="info" size={20} /><span>Open file</span></button>
          </div>
        </>
      )}
    </div>
  );

  if (compact) {
    return (
      <div className={"appr-cardc" + (actionable ? " actionable" : "")}>
        <div className="acc-row1">
          <span className="appr-card-icon"><FileTypeIcon type={a.fileType} size={24} /></span>
          <span className="acc-name" title={a.fileName}>{a.fileName}</span>
          <span className="status-pill" style={{ color: m.color, background: m.soft }}><Icon name={m.icon} size={12} />{m.label}</span>
          {!actionable && menuNode}
        </div>
        <div className="acc-row2">
          <Avatar userKey={a.submittedBy} size={16} />
          <span className="acc-by">{ownerName(a.submittedBy).split(" ")[0]}</span>
          <span className="appr-card-dot">·</span>
          <span className="acc-proj-name" title={projName(a.projectId)}>{projName(a.projectId)}</span>
          <span className="acc-time">{a.submittedOn}</span>
        </div>
        {actionable && (
          <div className="acc-actions">
            <button className="acc-btn approve" onClick={() => onDecide(a, "approved", "Approved")}><Icon name="approve" size={14} />Approve</button>
            <button className="acc-btn" onClick={() => onDecide(a, "changes", "Requested changes")}><Icon name="review" size={14} />Changes</button>
            {menuNode}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="appr-card">
      <span className="appr-card-icon"><FileTypeIcon type={a.fileType} size={34} /></span>
      <div className="appr-card-main">
        <div className="appr-card-name" title={a.fileName}>{a.fileName}</div>
        <div className="appr-card-meta">
          <ProjChip id={a.projectId} />
          <span className="appr-card-by"><Avatar userKey={a.submittedBy} size={20} /> {ownerName(a.submittedBy)}</span>
          <span className="appr-card-dot">·</span>
          <span className="appr-card-time">{a.submittedOn}</span>
        </div>
      </div>
      <span className="status-pill" style={{ color: m.color, background: m.soft }}><Icon name={m.icon} size={14} />{m.label}</span>
      {menuNode}
    </div>
  );
}
function DueText({ task }) {
  return <span className={"due-text" + (task.overdue ? " overdue" : "")}>
    {task.overdue && <Icon name="pending" size={14} />}{task.due}</span>;
}

// Dashboard filter chip (mirrors the Home FilterRow chip)
function DashFilter({ icon, label, value, options, onPick }) {
  const [open, setOpen] = useState(false);
  const active = value !== "all";
  const current = options.find(o => o.id === value);
  return (
    <div className="anchor">
      <button className={"filter-chip" + (active ? " set" : "")} onClick={() => setOpen(o => !o)}>
        <Icon name={icon} size={18} />
        <span>{active && current ? current.label : label}</span>
        <Icon name="chevronDown" size={18} />
      </button>
      {open && (
        <>
          <div className="overlay-transparent" onClick={() => setOpen(false)} />
          <div className="popmenu filter-menu">
            {options.map(o => (
              <button key={o.id} className={"popmenu-item compact" + (o.id === value ? " on" : "")}
                onClick={() => { onPick(o.id); setOpen(false); }}>
                <span>{o.label}</span>
                {o.id === value && <Icon name="check" size={16} style={{ marginLeft: "auto", color: "var(--blue)" }} />}
              </button>

          </div>
        </>
      )}

}

function PMDashboard({ tasks, approvals, activity, onNav, onOpenTask }) {
  const [q, setQ] = useState("");
  const [pf, setPf] = useState("all");   // project filter
  const [who, setWho] = useState("all"); // people filter
  const [pri, setPri] = useState("all"); // priority filter

  const projOptions = [{ id: "all", label: "All projects" }, ...DATA.map(p => ({ id: p.id, label: p.name }))];
  const peopleOptions = [{ id: "all", label: "Anyone" }, ...Object.keys(USERS).map(k => ({ id: k, label: k === "v" ? "Me" : ownerName(k) }))];
  const priOptions = [{ id: "all", label: "Any priority" }, { id: "high", label: "High" }, { id: "med", label: "Medium" }, { id: "low", label: "Low" }];

  const ql = q.trim().toLowerCase();
  const mq = (s) => !ql || (s || "").toLowerCase().includes(ql);
  const mProj = (pid) => pf === "all" || pid === pf;
  const filtersOn = ql || pf !== "all" || who !== "all" || pri !== "all";

  // stats reflect the active project filter
  const scopedTasks = tasks.filter(t => mProj(t.projectId));
  const scopedApprovals = approvals.filter(a => mProj(a.projectId));
  const open = scopedTasks.filter(t => t.status !== "done").length;
  const inProg = scopedTasks.filter(t => t.status === "progress").length;
  const pending = scopedApprovals.filter(a => a.status === "pending").length;
  const overdue = scopedTasks.filter(t => t.overdue && t.status !== "done").length;
  const done = scopedTasks.filter(t => t.status === "done").length;

  const stats = [
    { label: "Open tasks", value: open, icon: "review", color: "var(--blue)", view: "tasks" },
    { label: "In progress", value: inProg, icon: "history", color: "#1A73E8", view: "tasks" },
    { label: "Pending approvals", value: pending, icon: "pending", color: "#B26A00", view: "approvals" },
    { label: "Overdue", value: overdue, icon: "reject", color: "#D93025", view: "tasks" },
    { label: "Completed", value: done, icon: "approve", color: "#188038", view: "tasks" },
  ];

  // tasks card — defaults to "me"; People filter can re-target the assignee
  const taskOwner = who === "all" ? "v" : who;
  const tasksTitle = (who === "all" || who === "v") ? "My tasks" : `${ownerName(who)}'s tasks`;
  const myTasks = tasks.filter(t => t.assignee === taskOwner && t.status !== "done"
    && mProj(t.projectId) && mq(t.title) && (pri === "all" || t.priority === pri)).slice(0, 6);

  const pendingList = approvals.filter(a => a.status === "pending" && mProj(a.projectId)
    && mq(a.fileName) && (who === "all" || a.submittedBy === who)).slice(0, 6);

  // per-project progress
  const progress = DATA.map(p => {
    const ts = tasks.filter(t => t.projectId === p.id);
    const d = ts.filter(t => t.status === "done").length;
    return { id: p.id, name: p.name, total: ts.length, done: d, pct: ts.length ? Math.round(d / ts.length * 100) : 0 };
  }).filter(p => p.total > 0 && mProj(p.id) && mq(p.name)).slice(0, 6);

  const feed = activity.filter(a => mProj(a.projectId) && mq(a.target)
    && (who === "all" || a.user === who)).slice(0, 6);

  return (
    <div className="pm-dash">
      <div className="dash-toolbar">
        <div className="search-box dash-search">
          <Icon name="search" size={20} className="search-icon" />
          <input className="search-input" placeholder="Search tasks, approvals & activity" value={q}
            onChange={e => setQ(e.target.value)} aria-label="Search dashboard" />
          {q && <button className="icon-btn" onClick={() => setQ("")} aria-label="Clear search"><Icon name="close" size={20} /></button>}
        </div>
        <div className="dash-filters">
          <DashFilter icon="project" label="Project" value={pf} options={projOptions} onPick={setPf} />
          <DashFilter icon="people" label="People" value={who} options={peopleOptions} onPick={setWho} />
          <DashFilter icon="type" label="Priority" value={pri} options={priOptions} onPick={setPri} />
          {filtersOn && <button className="clear-filters" onClick={() => { setQ(""); setPf("all"); setWho("all"); setPri("all"); }}>Clear</button>}
        </div>
      </div>

      <div className="stat-row">
        {stats.map(s => (
          <button key={s.label} className="stat-card" onClick={() => onNav(s.view)}>
            <div className="stat-top">
              <span className="stat-icon" style={{ color: s.color, background: s.color + "1F" }}><Icon name={s.icon} size={20} /></span>
            </div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </button>
        ))}
      </div>

      <div className="dash-grid">
        <section className="dash-card">
          <div className="dash-card-head"><h3>{tasksTitle}</h3><button className="link-btn" onClick={() => onNav("tasks")}>View all</button></div>
          <div className="dash-list">
            {myTasks.map(t => (
              <button key={t.id} className="dash-task" onClick={() => onOpenTask(t)}>
                <span className="dt-dot" style={{ background: STATUS_META[t.status].color }} />
                <span className="dt-title">{t.title}</span>
                <ProjChip id={t.projectId} />
                <DueText task={t} />
                <PriorityBadge p={t.priority} />
              </button>
            ))}
            {myTasks.length === 0 && <div className="empty-mini">{filtersOn ? "No matching tasks" : "No open tasks assigned to you 🎉"}</div>}
          </div>
        </section>

        <section className="dash-card">
          <div className="dash-card-head"><h3>Pending approvals</h3><button className="link-btn" onClick={() => onNav("approvals")}>View all</button></div>
          <div className="dash-list">
            {pendingList.map(a => (
              <button key={a.id} className="dash-task" onClick={() => onNav("approvals")}>
                <FileTypeIcon type={a.fileType} size={20} />
                <span className="dt-title">{a.fileName}</span>
                <ProjChip id={a.projectId} />
                <span className="dt-meta">by {ownerName(a.submittedBy)}</span>
              </button>
            ))}
            {pendingList.length === 0 && <div className="empty-mini">{filtersOn ? "No matching approvals" : "Nothing awaiting review"}</div>}
          </div>
        </section>

        <section className="dash-card">
          <div className="dash-card-head"><h3>Project progress</h3></div>
          <div className="dash-list">
            {progress.map(p => (
              <div key={p.id} className="prog-row">
                <span className="prog-name">{p.name}</span>
                <div className="prog-bar"><div className="prog-fill" style={{ width: p.pct + "%" }} /></div>
                <span className="prog-pct">{p.pct}%</span>
              </div>
            ))}
            {progress.length === 0 && <div className="empty-mini">No matching projects</div>}
          </div>
        </section>

        <section className="dash-card">
          <div className="dash-card-head"><h3>Recent activity</h3><button className="link-btn" onClick={() => onNav("activity")}>View all</button></div>
          <div className="dash-list">
            {feed.length === 0 ? <div className="empty-mini">No matching activity</div> : <ActivityFeed items={feed} compact />}
          </div>
        </section>
      </div>
    </div>
  );
}

// ============ TASKS (List + Kanban) ============
function PMTasks({ tasks, setTasks, mode, setMode, projectFilter, onOpenTask, flash, hideToggle }) {
  const [drag, setDrag] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const shown = projectFilter ? tasks.filter(t => t.projectId === projectFilter) : tasks;

  const move = (id, status) => setTasks(ts => ts.map(t => t.id === id ? { ...t, status, overdue: status === "done" ? false : t.overdue } : t));
  const addTask = (status) => {
    const id = "t" + Date.now();
    setTasks(ts => [...ts, { id, title: "New task", projectId: projectFilter || DATA[0].id, assignee: "v", due: "No date", priority: "med", status }]);
    flash("Task added");
  };

  return (
    <div className="pm-tasks">
      {!hideToggle && (
        <div className="tasks-bar">
          <div className="seg">
            <button className={"seg-btn" + (mode === "board" ? " on" : "")} onClick={() => setMode("board")}><Icon name="grid" size={18} />Board</button>
            <button className={"seg-btn" + (mode === "list" ? " on" : "")} onClick={() => setMode("list")}><Icon name="list" size={18} />List</button>
          </div>
          <button className="btn-primary" onClick={() => addTask("todo")}><Icon name="newPlus" size={18} />Add task</button>
        </div>
      )}

      {mode === "board" ? (
        <div className="kanban">
          {STATUSES.map(col => {
            const items = shown.filter(t => t.status === col.id);
            return (
              <div key={col.id} className={"kcol" + (dragOver === col.id ? " over" : "")}
                onDragOver={e => { e.preventDefault(); setDragOver(col.id); }}
                onDragLeave={() => setDragOver(d => d === col.id ? null : d)}
                onDrop={() => { if (drag) move(drag, col.id); setDrag(null); setDragOver(null); }}>
                <div className="kcol-head">
                  <span className="kcol-title"><span className="pri-dot" style={{ background: col.color }} />{col.label}</span>
                  <span className="kcol-count">{items.length}</span>
                </div>
                <div className="kcol-body">
                  {items.map(t => (
                    <div key={t.id} className={"kcard" + (drag === t.id ? " dragging" : "")} draggable
                      onDragStart={() => setDrag(t.id)} onDragEnd={() => { setDrag(null); setDragOver(null); }}
                      onClick={() => onOpenTask(t)} style={{ "--pri": (PRIORITY_META[t.priority] || {}).color }}>
                      <div className="kcard-title">{t.title}</div>
                      <div className="kcard-mid"><ProjChip id={t.projectId} /></div>
                      <div className="kcard-foot">
                        <DueText task={t} />
                        <Avatar userKey={t.assignee} size={24} />
                      </div>
                    </div>
                  ))}
                  <button className="kcol-add" onClick={() => addTask(col.id)}><Icon name="newPlus" size={16} />Add</button>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="list-card" style={{ "--cols": 4 }}>
          <div className="col-head tasks-head">
            <div className="cell cell-check" />
            <div className="cell cell-name">Task</div>
            <div className="cell">Project</div>
            <div className="cell">Assignee</div>
            <div className="cell">Due</div>
            <div className="cell">Priority</div>
            <div className="cell">Status</div>
          </div>
          <div className="rows-scroll">
            {shown.map(t => (
              <div key={t.id} className="list-row task-row" onClick={() => onOpenTask(t)}>
                <label className="row-check" onClick={e => e.stopPropagation()}>
                  <input type="checkbox" checked={t.status === "done"} onChange={() => move(t.id, t.status === "done" ? "todo" : "done")} aria-label="Complete" />
                  <span className="check-box"><Icon name="check" size={16} /></span>
                </label>
                <div className="cell cell-name"><span className={t.status === "done" ? "task-done" : ""}>{t.title}</span></div>
                <div className="cell"><ProjChip id={t.projectId} /></div>
                <div className="cell"><span className="owner-cell"><Avatar userKey={t.assignee} size={24} /> {ownerName(t.assignee)}</span></div>
                <div className="cell"><DueText task={t} /></div>
                <div className="cell"><PriorityBadge p={t.priority} /></div>
                <div className="cell" onClick={e => e.stopPropagation()}>
                  <select className="status-select" value={t.status} onChange={e => move(t.id, e.target.value)}
                    style={{ color: STATUS_META[t.status].color }}>
                    {STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                  </select>
                </div>
              </div>
            ))}
            {shown.length === 0 && <div className="empty-state"><Icon name="review" size={56} style={{ color: "#DADCE0" }} /><p>No tasks yet</p></div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ============ APPROVALS ============
function PMApprovals({ approvals, setApprovals, projectFilter, flash, onActivity }) {
  const [filter, setFilter] = useState("pending");
  const tabs = [["pending", "Pending"], ["approved", "Approved"], ["changes", "Changes"], ["rejected", "Rejected"], ["all", "All"]];
  let shown = projectFilter ? approvals.filter(a => a.projectId === projectFilter) : approvals;
  if (filter !== "all") shown = shown.filter(a => a.status === filter);

  const decide = (a, status, verb) => {
    setApprovals(list => list.map(x => x.id === a.id ? { ...x, status } : x));
    flash(`${verb}: ${a.fileName}`);
    onActivity && onActivity(a, status);
  };

  return (
    <div className="pm-approvals">
      <div className="appr-tabs">
        {tabs.map(([id, lbl]) => {
          const n = id === "all" ? approvals.length : approvals.filter(a => a.status === id).length;
          return <button key={id} className={"appr-tab" + (filter === id ? " on" : "")} onClick={() => setFilter(id)}>
            {lbl}<span className="appr-tab-n">{n}</span></button>;
        })}
      </div>
      <div className="appr-list">
        {shown.map(a => {
          const m = APPROVAL_META[a.status];
          return (
            <div key={a.id} className="appr-row">
              <FileTypeIcon type={a.fileType} size={32} />
              <div className="appr-main">
                <div className="appr-name">{a.fileName}</div>
                <div className="appr-sub"><ProjChip id={a.projectId} /><span>· Submitted by {ownerName(a.submittedBy)} · {a.submittedOn}</span></div>
              </div>
              <div className="appr-reviewer">
                <span className="appr-rv-label">Reviewer</span>
                <span className="owner-cell"><Avatar userKey={a.reviewer} size={24} /> {ownerName(a.reviewer)}</span>
              </div>
              <span className="status-pill" style={{ color: m.color, background: m.soft }}><Icon name={m.icon} size={14} />{m.label}</span>
              {a.status === "pending" || a.status === "changes" ? (
                <div className="appr-actions">
                  <button className="btn-ok" onClick={() => decide(a, "approved", "Approved")}><Icon name="approve" size={16} />Approve</button>
                  <button className="btn-warn" onClick={() => decide(a, "changes", "Requested changes")} title="Request changes"><Icon name="review" size={16} /></button>
                  <button className="btn-bad" onClick={() => decide(a, "rejected", "Rejected")} title="Reject"><Icon name="reject" size={16} /></button>
                </div>
              ) : (
                <button className="btn-ghost" onClick={() => decide(a, "pending", "Reopened")}>Reopen</button>
              )}
            </div>
          );
        })}
        {shown.length === 0 && <div className="empty-state"><Icon name="approve" size={56} style={{ color: "#DADCE0" }} /><p>Nothing here</p></div>}
      </div>
    </div>
  );
}

function actColor(type) {
  return { upload: "#1A73E8", approve: "#188038", reject: "#D93025", task: "#7A5AE0",
    comment: "#B26A00", folder: "#1A73E8", move: "#5F6368", share: "#0F766E", create: "#1A73E8",
    download: "#0F766E", delete: "#D93025", rename: "#B26A00", permission: "#7A5AE0",
    login: "#5F6368", version: "#1A73E8" }[type] || "#5F6368";
}

// classify each activity event by the level it concerns: project / folder / file
const ACTIVITY_SCOPE = {
  create: "project", permission: "project", login: "project", task: "project",
  folder: "folder",
  upload: "file", review: "file", view: "file", download: "file", comment: "file",
  approve: "file", reject: "file", share: "file", revise: "file", submit: "file",
  version: "file", move: "file", rename: "file", delete: "file",
};
const activityScope = (a) => (a && ACTIVITY_SCOPE[a.type]) || "file";

function PMActivity({ activity, projectFilter, scope, onAction, lockProject, accessKeys, hideActions, folderChoices, folderLabel }) {
  const [proj, setProj] = useState(projectFilter || "all");
  const [user, setUser] = useState("all");
  const [folder, setFolder] = useState("all");
  const [actionF, setActionF] = useState("all");
  // map each selectable action label to the underlying activity type(s)
  const ACTION_FILTERS = [
    ["downloaded", "Downloaded", ["download"]],
    ["viewed", "Viewed", ["view"]],
    ["reviewed", "Reviewed", ["review"]],

function npComputePos(rect, W, H, align) {

    const pos = npComputePos(pop.rect, 400, 360, "left");

  const calPop = () => {

    const min = key === "due" ? start : "";
    const y = calView.getFullYear(), m = calView.getMonth();
    const startDow = new Date(y, m, 1).getDay();
    const grid = new Date(y, m, 1); grid.setDate(1 - startDow);
    const cells = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(grid); d.setDate(grid.getDate() + i);
      const di = npCalISO(d);
      const out = d.getMonth() !== m;
      const isSel = cur === di;
      const today = npCalISO(new Date()) === di;
      const disabled = min && di < min;
      cells.push(
        <span className="np-cal-cell" key={i}>
          <button className={"np-cal-day" + (out ? " out" : "") + (today ? " today" : "") + (isSel ? " sel" : "") + (disabled ? " disabled" : "")} disabled={!!disabled} onClick={() => pickDate(key, di)}>{d.getDate()}</button>
        </span>
      );
    }
    const pos = npComputePos(pop.rect, 300, 376, "left");
    return (
      <div className="np-cal" style={{ top: pos.top, left: pos.left }} onClick={e => e.stopPropagation()}>
        <div className="np-cal-head">
          <span className="np-cal-title">{NP_MONTHS[m]} {y}</span>
          <button className="np-cal-nav" title="Previous month" onClick={() => setCalView(new Date(y, m - 1, 1))}><NPIcon name="chevronLeft" size={18} /></button>
          <button className="np-cal-nav" title="Next month" onClick={() => setCalView(new Date(y, m + 1, 1))}><NPIcon name="chevronRight" size={18} /></button>
        </div>
        <div className="np-cal-grid">
          {NP_DOW.map(x => <span className="np-cal-dow" key={x}>{x}</span>)}

        </div>
        <div className="np-cal-foot">
          <button className="np-cal-link muted" onClick={() => { if (key === "start") setStart(""); else setDue(""); setPop(null); }}>Clear</button>
          <button className="np-cal-link" onClick={() => { const t = npCalISO(new Date()); if (!(min && t < min)) pickDate(key, t); }}>Today</button>
        </div>
      </div>
    );
  };

  return (
    <div className="np-overlay" onClick={onClose}>
      <div className="np-modal" onClick={e => e.stopPropagation()}>
        {/* header */}
        <div className="np-head">
          <span className="np-mark"><NPIcon name="project" size={22} /></span>
          <span className="np-titles">
            <span className="np-kicker">New Project</span>
            <span className="np-title">Set up project details</span>
          </span>
          <button className="np-x" title="Close" onClick={onClose}><NPIcon name="close" size={20} /></button>
        </div>

        {/* body */}
        <div className="np-body">
          {/* LEFT */}
          <div className="np-pane np-pane-l">
            <div className="np-pane-head">
              <span className="np-ph-ic" style={{ background: "var(--blue-light)", color: "var(--blue)" }}><NPIcon name="info" size={17} /></span>
              <h2>Project Details</h2>
            </div>
            <div className="np-form">
              <div className="np-field">
                <label className="np-field-lbl">Project name <span className="np-req">*</span></label>
                <input className="np-inp" autoFocus value={name} placeholder="Enter project name" onChange={e => setName(e.target.value)} />
              </div>
              <div className="np-date-row">
                <div className="np-field">
                  <label className="np-field-lbl">Start date <span className="np-opt">optional</span></label>
                  <DateField value={start} onClick={e => openPop("calStart", null, e)} />
                </div>
                <div className="np-field">
                  <label className="np-field-lbl">Due date <span className="np-opt">optional</span></label>
                  <DateField value={due} onClick={e => openPop("calDue", null, e)} />
                </div>
              </div>
              <div className="np-field">
                <label className="np-field-lbl">Granted To: <span className="np-req">*</span>{admins.length > 0 && <span className="np-opt">{admins.length} selected</span>}</label>
                <button className={"np-picker-btn" + (pop && pop.kind === "admins" ? " open" : "")} onClick={e => openPop("admins", null, e)}>
                  {admins.length === 0
                    ? <span className="np-picker-ph">Select users…</span>
                    : <span className="np-picker-stack">
                        {admins.slice(0, 2).map(uk => (
                          <span className="np-chip" key={uk}>
                            <NPAvatar uk={uk} size={20} />
                            <span className="np-chip-name">{USERS[uk].name.split(" ")[0]}</span>
                            <span className="np-chip-x" onClick={e => { e.stopPropagation(); toggleAdmin(uk); }}><NPIcon name="close" size={12} /></span>
                          </span>
                        ))}
                        {admins.length > 2 && <span className="np-chip-more">+{admins.length - 2}</span>}
                      </span>}
                  <NPIcon name="chevronDown" size={16} style={{ color: "var(--g400)", marginLeft: "auto" }} />
                </button>
              </div>
            </div>
          </div>

        </div>

        {/* footer */}
        <div className="np-foot">
          <span className="np-foot-info"><NPIcon name="info" size={16} /><span>You can build the folder structure after creating the project.</span></span>
          <span className="np-foot-acts">
            <button className="np-btn np-btn-ghost" onClick={onClose}>Cancel</button>
            <button className="np-btn np-btn-primary" disabled={!canCreate} onClick={create}><NPIcon name="check" size={18} />Create project</button>
          </span>
        </div>
      </div>

      {/* popovers */}
      {pop && <div className="np-pop-clear" onClick={(e) => { e.stopPropagation(); setPop(null); }} />}
      {pop && (pop.kind === "admins" || pop.kind === "members") && userPop(pop.kind)}
      {pop && pop.kind === "color" && colorPop()}
      {pop && (pop.kind === "calStart" || pop.kind === "calDue") && calPop()}
    </div>
  );
}

// Fixed-width select whose long selected label scrolls (marquee) on hover,
// so a long project name never compresses the neighbouring folder dropdown.
// Fixed-width select whose long selected label wraps to two lines,
// so a long project name never compresses the neighbouring folder dropdown and the UI stays consistent.
function MarqueeSelect({ value, options, placeholder, disabled, onChange, ariaLabel }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState(null);
  const rootRef = React.useRef(null);
  const btnRef = React.useRef(null);

  const selected = options.find(o => o.value === value);
  const label = selected ? selected.label : placeholder;

  // position the menu as a fixed popover anchored to the button so it escapes
  // the dialog's overflow (never clipped, never forces the dialog to scroll)
  const place = React.useCallback(() => {
    const btn = btnRef.current;
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const GAP = 6, M = 8, MAX_H = 280;
    const below = window.innerHeight - r.bottom;
    const openUp = below < Math.min(MAX_H, 220) + GAP && r.top > below;
    setPos({
      left: r.left,
      width: r.width,
      top: openUp ? undefined : r.bottom + GAP,
      bottom: openUp ? (window.innerHeight - r.top + GAP) : undefined,
      maxHeight: Math.min(MAX_H, (openUp ? r.top : below) - GAP - M),
    });
  }, []);

  // close on outside click / Escape; reposition on scroll/resize
  useEffect(() => {
    if (!open) return;
    place();
    const onDoc = (e) => { if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    const reposition = () => place();
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    window.addEventListener("scroll", reposition, true);
    window.addEventListener("resize", reposition);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      document.removeEventListener("keydown", onKey);
      window.removeEventListener("scroll", reposition, true);
      window.removeEventListener("resize", reposition);
    };
  }, [open, place]);

  return (
    <div className={"msel" + (open ? " open" : "") + (disabled ? " disabled" : "")} ref={rootRef}>
      <button ref={btnRef} type="button" className="msel-btn field-input" disabled={disabled}
        onClick={() => !disabled && setOpen(o => !o)}
        aria-label={ariaLabel} aria-haspopup="listbox" aria-expanded={open}>
        <span className={"msel-val" + (selected ? "" : " placeholder")} title={label}>{label}</span>
        <Icon name="chevronDown" size={18} className="msel-caret" />
      </button>
      {open && !disabled && pos && (
        <div className="msel-menu" role="listbox"
          style={{ position: "fixed", left: pos.left, top: pos.top, bottom: pos.bottom, width: pos.width, maxHeight: pos.maxHeight }}>
          {options.map(o => (
            <button type="button" key={o.value} role="option" aria-selected={o.value === value}
              className={"msel-opt" + (o.value === value ? " on" : "")}
              onClick={() => { onChange(o.value); setOpen(false); }}>
              <span className="msel-opt-label">{o.label}</span>
              {o.value === value && <Icon name="check" size={16} className="msel-opt-check" />}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// Read-only breadcrumb path showing where a folder/file will be created.
// `pending` (optional) appends a dashed chip for the not-yet-created folder name.
function PathDisplay({ names, pending }) {
  const segs = (names || []).filter(Boolean);
  if (!segs.length) return null;
  return (
    <div className="pathbox">
      {segs.map((nm, i) => (
        <React.Fragment key={i}>
          {i > 0 && <Icon name="chevronRight" size={14} className="pathbox-sep" />}
          <span className={"pathbox-seg" + (i === 0 ? " is-root" : "") + (!pending && i === segs.length - 1 ? " is-leaf" : "")}>
            <Icon name={i === 0 ? "project" : "folder"} size={15} />
            <span className="pathbox-name">{nm}</span>
          </span>
        </React.Fragment>
      ))}
      {pending && (
        <>
          <Icon name="chevronRight" size={14} className="pathbox-sep" />
          <span className="pathbox-pending"><Icon name="addFolder" size={15} />{pending}</span>
        </>
      )}
    </div>
  );
}

// ============ UPLOAD FILE MODAL ============
const UPLOAD_ACTIONS = ["review", "revise", "approve", "submit"];
function UploadModal({ context, onClose, onUpload }) {
  const [fileName, setFileName] = useState("");
  const [fileSize, setFileSize] = useState("");
  const [userActions, setUserActions] = useState({}); // per-user action map { userKey: actionType }
  const [assignees, setAssignees] = useState([]);
  const [uploadAction, setUploadAction] = useState("review");
  const [note, setNote] = useState("");
  const [desc, setDesc] = useState("");
  const [noteUsers, setNoteUsers] = useState(Object.keys(USERS));
  const [noteSelOpen, setNoteSelOpen] = useState(false);
  const [due, setDue] = useState("");
  const [projectId, setProjectId] = useState((context && context.projectId) || "");
  const [folderId, setFolderId] = useState((context && context.folderId) || "");
  const lockProject = !!(context && context.projectId);
  const lockFolder = !!(context && context.folderId);
  // when we know the exact destination (incl. nested sub-folders) show a read-only path
  const hasPath = !!(context && context.pathNames && context.pathNames.length >= 2 && context.folderId);
  const inputRef = React.useRef(null);

  const proj = DATA.find(p => p.id === projectId);
  const folders = proj ? proj.folders : [];
  // recursively find a folder by id across any nesting depth
  const findDeep = (list, fid) => { for (const f of (list || [])) { if (f.id === fid) return f; const d = findDeep(f.subfolders, fid); if (d) return d; } return null; };
  // when project changes, keep folder valid (default to first folder) — but never override a locked destination (e.g. uploading inside a sub-folder)
  useEffect(() => {
    if (lockFolder) return;
    if (!proj) { if (folderId) setFolderId(""); return; }
    if (!findDeep(proj.folders, folderId)) setFolderId(folders[0] ? folders[0].id : "");
  }, [projectId]); // eslint-disable-line

  const onPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setFileName(f.name);
    const kb = f.size / 1024;
    setFileSize(kb >= 1024 ? (kb / 1024).toFixed(1) + " MB" : Math.max(1, Math.round(kb)) + " KB");
  };
  const clearFile = () => { setFileName(""); setFileSize(""); if (inputRef.current) inputRef.current.value = ""; };

  const candidates = Object.keys(USERS);
  const toggleUser = (k) => setAssignees(a => a.includes(k) ? a.filter(x => x !== k) : [...a, k]);
  const toggleNoteUser = (k) => setNoteUsers(a => a.includes(k) ? a.filter(x => x !== k) : [...a, k]);

  const ext = fileName.split(".").pop().toLowerCase();
  const ftype = ({ pdf: "pdf", doc: "doc", docx: "doc", xls: "xls", xlsx: "xls", png: "image", jpg: "image", jpeg: "image", gif: "image" })[ext] || "doc";

  const fol = findDeep(proj ? proj.folders : [], folderId);
  // keep the per-user action map in sync with the accessible-to list
  useEffect(() => {
    setUserActions(prev => {
      const next = {};
      assignees.forEach(k => { next[k] = prev[k] || "review"; });
      return next;
    });
  }, [assignees]); // eslint-disable-line
  const valid = fileName && projectId && folderId;
  const submit = () => {
    if (!valid) return;
    const ua = {};
    assignees.forEach(k => { ua[k] = uploadAction; });
    const primary = assignees[0] || null;
    onUpload({ fileName, fileSize, ftype, action: assignees.length ? uploadAction : null, primary,
      assignees, userActions: ua, note: note.trim(), description: desc.trim(),
      noteFor: note.trim() ? noteUsers : [], due: due.trim(),
      context: { projectId, projectName: proj ? proj.name : null, folderId, folderName: fol ? fol.name : null } });
  };

  const footer = (
    <div className="wiz-foot-right">
      <button className="btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn-primary" disabled={!valid} onClick={submit}>
        <Icon name="download" size={18} />Upload file</button>
    </div>
  );

  return (
    <Modal title="Upload File" sub="Choose where the file lives and who can access it" onClose={onClose} footer={footer} wide>
      <div className="form-grid">
        {/* destination: read-only path when we know where the file goes, else picker */}
        <div className="field">
          <span className="field-label"><span className="pl-left"><Icon name="folder" size={15} />Destination</span></span>
          {hasPath ? (
            <PathDisplay names={context.pathNames} />
          ) : (
            <div className="au-row2">
              <MarqueeSelect value={projectId} disabled={lockProject} onChange={setProjectId} ariaLabel="Project"
                placeholder="Select a project…"
                options={DATA.map(p => ({ value: p.id, label: p.name }))} />
              <MarqueeSelect value={folderId} disabled={!proj || lockFolder} onChange={setFolderId} ariaLabel="Folder"
                placeholder={proj ? "Select a folder…" : "Select a project first"}
                options={folders.map(f => ({ value: f.id, label: f.name }))} />
            </div>
          )}
        </div>

        {/* file dropzone */}
        <div className="field">
          <span className="field-label"><span className="pl-left"><Icon name="addFile" size={15} />File</span></span>
          <input ref={inputRef} type="file" hidden onChange={onPick} />
          {!fileName ? (
            <button className="upload-drop" onClick={() => inputRef.current && inputRef.current.click()}>
              <span className="ud-icon"><Icon name="download" size={28} /></span>
              <span className="ud-main">Click to browse or drag a file here</span>
              <span className="ud-sub">PDF, Word, Excel or image · up to 25 MB</span>
            </button>
          ) : (
            <div className="upload-file">
              <FileTypeIcon type={ftype} size={32} />
              <div className="uf-info"><div className="uf-name">{fileName}</div><div className="uf-size">{fileSize}</div></div>
              <button className="icon-btn small" onClick={clearFile} aria-label="Remove file"><Icon name="close" size={20} /></button>
            </div>
          )}
        </div>

        {/* description */}
        <div className="field">
          <span className="field-label"><span className="pl-left"><Icon name="rename" size={15} />Description <em>(optional)</em></span></span>
          <textarea className="field-input" rows={3} value={desc} onChange={e => setDesc(e.target.value)}
            placeholder="Briefly describe what this file contains…" />
        </div>

        {/* assign action — optional */}
        <div className="field assign-section">
          <span className="field-label"><span className="pl-left"><Icon name="assignUser" size={15} />Assign Action <em>(optional)</em></span></span>
          <div className="assign-row">
            <div className="assign-field">
              <div className="seg-toggle assign-seg" role="tablist">
                {[{ id: "submit", label: "Submit", icon: "addFile" }, { id: "review", label: "Review", icon: "review" }].map(o => (
                  <button key={o.id} type="button" role="tab" aria-selected={uploadAction === o.id}
                    className={"seg-opt" + (uploadAction === o.id ? " on" : "")} onClick={() => setUploadAction(o.id)}>
                    <Icon name={o.icon} size={16} />{o.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="assign-field assign-field-grow">
              <UserPicker value={assignees}
                triggerLabel="Assigned users"
                allOption allLabel="All"
                onChange={setAssignees}
                candidates={candidates}
                placeholder="Select Users" youKey="v" />
            </div>
          </div>
        </div>

        {/* due date — hidden */}
