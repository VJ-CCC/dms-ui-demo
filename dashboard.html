  const toggleBookmark = (id) => {
    setBookmarks(prev => {
      const n = new Set(prev);
      if (n.has(id)) { n.delete(id); flash("Removed from bookmarks"); }
      else { n.add(id); flash("Added to bookmarks"); }
      return n;
    });
  };

  const toggleSel = (item) => setSelection(prev => { const n = new Set(prev); n.has(item.id) ? n.delete(item.id) : n.add(item.id); return n; });
  const unread = notifs.filter(n => n.unread).length;

  // recent folders (most-recently-opened across projects)
  const recentFolders = useMemo(() => {
    const out = [];
    DATA.forEach(p => p.folders.forEach(f => out.push({ ...f, _proj: p.name, _projId: p.id })));
    const times = ["Today, 10:23 AM", "Today, 9:45 AM", "Yesterday, 6:12 PM", "Yesterday, 2:30 PM", "28 May, 4:10 PM", "12 May, 11:00 AM"];
    return out.slice(0, 6).map((f, i) => ({ ...f, lastOpened: times[i] }));
  }, []);

  const openFolder = (f) => { setView("home"); setBreadcrumb(["home", f._projId, f.id]); setDetail(null); };

  // ---- navigate from global search results ----
  const onSearchPick = (nav) => {
    if (!nav) return;
    if (nav.type === "user") { setPendingUserKey(nav.userKey); setView("users"); setDetail(null); return; }
    if (nav.type === "project") { setView("home"); setBreadcrumb(["home", nav.projId]); setProjTab("wizard"); setDetail(null); return; }
    if (nav.type === "folder") { setView("home"); setBreadcrumb(["home", nav.projId, ...(nav.path || [])]); setProjTab("wizard"); setDetail(null); return; }
    if (nav.type === "file") {
      setView("home"); setBreadcrumb(["home", nav.projId, ...(nav.path || [])]); setProjTab("wizard");
      setDetail(nav.file); markRead(nav.file); return;
    }
  };

  // ---- nested-folder helpers ----
  // walk from a project's top-level folders down a chain of ids → return the deepest folder node
  const resolveFolderPath = (proj, ids) => {
    let list = (proj && proj.folders) || [];
    let node = null;
    for (const id of ids) {
      node = list.find(f => f.id === id);
      if (!node) return null;
      list = node.subfolders || [];
    }
    return node;
  };
  // names along a folder-id chain from project root → ["Folder", "Sub", …]
  const folderPathNames = (proj, ids) => {
    const out = []; let list = (proj && proj.folders) || [];
    for (const id of (ids || [])) {
      const n = (list || []).find(f => f.id === id);
      if (!n) break;
      out.push(n.name); list = n.subfolders || [];
    }
    return out;
  };
  // full path (incl. project) to a folder anywhere in a project → [proj, …folders]
  const pathNamesToFolderId = (proj, id) => {
    let found = null;
    const walk = (list, trail) => {
      for (const f of (list || [])) {
        const t = [...trail, f.name];
        if (f.id === id) { found = t; return; }
        walk(f.subfolders, t);
        if (found) return;
      }
    };
    walk(proj && proj.folders, []);
    return proj ? [proj.name, ...(found || [])] : [];
  };
  // recursively search a project for a folder by id (any depth)
  const findFolderDeep = (proj, id) => {
    let res = null;
    const walk = (list) => (list || []).forEach(f => { if (f.id === id) res = f; walk(f.subfolders); });
    walk(proj && proj.folders);
    return res;
  };
  // recursively find the folder that directly contains a file id, across all projects
  const findFolderOfFile = (fileId) => {
    for (const p of DATA) {
      let hit = null;
      const walk = (list) => (list || []).forEach(f => { if ((f.files || []).some(x => x.id === fileId)) hit = f; walk(f.subfolders); });
      walk(p.folders);
      if (hit) return hit;
    }
    return null;
  };

  // ---- resolve current list ----
  const current = useMemo(() => {
    if (view === "shared") {
      const items = [...DATA.filter(p => p.shared), ...allFiles().filter(f => ["file5", "file11"].includes(f.id))];
      return { kind: "shared", title: "Shared with me", count: items.length, countLabel: "Items", items,
        columns: [chipCol(it => it._proj || projectOf(it.id)), { key: "sharedby", label: "Shared By", render: it => ownerName(it.sharedBy || it.owner) }, { key: "shon", label: "Shared On", render: it => it.sharedOn || "Recently" }],
        empty: "Nothing has been shared with you yet" };
    }
    if (view === "recent") {
      const items = [...allFiles()].slice(0, 9);
      return { kind: "recent", title: "Recent", count: items.length, countLabel: "Items", items,
        columns: [chipCol(it => it._proj), { key: "opened", label: "Last Opened", render: it => it.modified }, { key: "type", label: "Type", render: it => ({ pdf: "PDF", doc: "Word", xls: "Excel", image: "Image" }[it.type] || "File") }],
        empty: "No recent activity" };
    }
    if (view === "bookmarked") {
      const items = [...allFolders(), ...allFiles(), ...DATA].filter(i => bookmarks.has(i.id));
      return { kind: "bookmarked", title: "Bookmarks", count: items.length, countLabel: "Items", items,
        columns: [chipCol(it => it._proj || projectOf(it.id)), { key: "type", label: "Type", render: it => it.kind === "folder" ? "Folder" : it.kind === "project" ? "Project" : ({ pdf: "PDF", doc: "Word", xls: "Excel", image: "Image" }[it.type] || "File") }, modCol, ownerCol],
        empty: "No bookmarks yet — star a file or folder to pin it here" };
    }
    // home navigation depth
    if (breadcrumb.length === 1) {
      return { kind: "project", title: "My Projects", count: DATA.length, countLabel: "Projects", items: DATA, columns: PROJECT_COLS, empty: "No projects found" };
    }
    const proj = DATA.find(p => p.id === breadcrumb[1]);
    if (breadcrumb.length === 2) {
      return { kind: "folder", title: proj.name + " · Folders", count: proj.folders.length, countLabel: "Folders", items: proj.folders, columns: FOLDER_COLS, empty: "No folders yet", proj };
    }
    // descend through nested subfolders following the breadcrumb path
    const folder = resolveFolderPath(proj, breadcrumb.slice(2));
    if (!folder) {
      return { kind: "file", title: "Not found", count: 0, countLabel: "Items", items: [], columns: FILE_COLS, empty: "This folder no longer exists", proj };
    }
    const subs = folder.subfolders || [];
    const files = folder.files || [];
    const items = [...subs, ...files];
    if (subs.length > 0) {
      return { kind: "mixed", title: folder.name, count: items.length, countLabel: "Items", items, columns: FOLDER_MIX_COLS, empty: "This folder is empty", proj, folder };
    }
    return { kind: "file", title: folder.name, count: files.length, countLabel: "Files", items: files, columns: FILE_COLS, empty: "No files yet", proj, folder };
  }, [view, breadcrumb, bookmarks, projVersion]);

  const filtered = useMemo(() => {
    if (!cardSearch.trim()) return current.items;
    const q = cardSearch.toLowerCase();
    return current.items.filter(i => i.name.toLowerCase().includes(q));
  }, [current, cardSearch]);

  // full breadcrumb path to a project/folder item: ["home", projId, ...folderIdChain]
  const findItemPath = (item) => {
    if (item.kind === "project") return ["home", item.id];
    for (const p of DATA) {
      const stack = [];
      let found = null;
      const walk = (list) => {
        for (const f of (list || [])) {
          stack.push(f.id);
          if (f.id === item.id) { found = ["home", p.id, ...stack]; return true; }
          if (walk(f.subfolders)) return true;
          stack.pop();
        }
        return false;
      };
      if (walk(p.folders)) return found;
    }
    return null;
  };

  // ---- row interactions ----
  const onSingle = (item) => {
    // Bookmarked view: clicking a row navigates into the item's location.
    // project → its folder screen · folder/subfolder → into that folder · file → detail panel
    if (view === "bookmarked") {
      if (item.kind === "file") { setDetail(item); markRead(item); return; }
      const path = findItemPath(item);
      if (path) { navigate(path); setProjTab("wizard"); return; }
      setDetail(item); markRead(item); return;
    }
    if (view === "home") {
      if (item.kind === "project") { setBreadcrumb(["home", item.id]); setProjTab("wizard"); setDetail(null); return; }
      // folders & subfolders: single-click opens the detail panel; double-click navigates in
    }
    setDetail(item); markRead(item);
  };
  const onDouble = (item) => {
    if (view === "bookmarked") { onSingle(item); return; }
    if (view !== "home") { setDetail(item); markRead(item); return; }
    if (item.kind === "project") { setBreadcrumb(["home", item.id]); setProjTab("wizard"); }
    else if (item.kind === "folder") setBreadcrumb([...breadcrumb, item.id]);
    else { flash("Opening " + item.name + "…"); markRead(item); }
    setDetail(null);
  };

  const onMore = (item, e) => { setDetail(item); markRead(item); };

  // hover quick-actions (spec v3 §3.6)
  const onQuick = (item, q) => {
    if (q.id === "star") { toggleBookmark(item.id); return; }
    if (q.id === "download") { downloadItem(item); return; }
    if (q.id === "addFolder") { setFolderModal({ projectId: item.id, pathNames: [item.name] }); return; }
    if (q.id === "addFile") {
      if (item.kind === "folder") {
        const pr = DATA.find(p => p.id === breadcrumb[1]);
        const parentNames = pr ? [pr.name, ...folderPathNames(pr, breadcrumb.slice(2))] : [];
        openUpload({ projectId: breadcrumb[1], projectName: pr ? pr.name : "", folderId: item.id, folderName: item.name, pathNames: [...parentNames, item.name] });
      }
      else openUpload();
      return;
    }
    const verbs = { addFolder: "Add folder in", addFile: "Upload file to", comment: "Add comment on", review: "Opening review for" };
    flash(`${verbs[q.id] || q.label}: ${item.name}`);
  };

  const onBulk = (action) => {
    if (action === "clear") { setSelection(new Set()); return; }
    const n = selection.size, plural = n > 1 ? "s" : "";
    if (action === "star") { setBookmarks(prev => { const s = new Set(prev); selection.forEach(id => s.add(id)); return s; }); flash(`Bookmarked ${n} item${plural}`); setSelection(new Set()); return; }
    if (action === "pending") { flash(`Showing pending updates for ${n} item${plural}`); return; }
    const label = { review: "Reviewing", approve: "Approved", move: "Moving", trash: "Deleted" }[action] || "Updated";
    flash(`${label} ${n} item${plural}`);
    setSelection(new Set());
  };

  const toggleAll = () => {
    setSelection(prev => {
      if (filtered.every(i => prev.has(i.id))) return new Set();
      return new Set(filtered.map(i => i.id));
    });
  };

  // breadcrumb segments
  const bcSegs = [{ label: "Projects" }];
  if (view === "home" && breadcrumb.length >= 2) {
    const proj = DATA.find(p => p.id === breadcrumb[1]);
    if (proj) {
      bcSegs.push({ label: proj.name });
      let list = proj.folders || [];
      for (let i = 2; i < breadcrumb.length; i++) {
        const node = list.find(f => f.id === breadcrumb[i]);
        if (!node) break;
        bcSegs.push({ label: node.name });
        list = node.subfolders || [];
      }
    }
  }

  const isPM = PM_VIEWS.includes(view);
  const atProject = view === "home" && breadcrumb.length === 2;
  // subfolder screen: a depth-3 (root folder) view that lists its subfolders — mirrors the project Folders screen.
  // One level deeper (a subfolder) falls through to the file-listing ListCard.
  const folderScopeFolder = (view === "home" && breadcrumb.length === 3)
    ? (() => { const p = DATA.find(x => x.id === breadcrumb[1]); return p ? resolveFolderPath(p, breadcrumb.slice(2)) : null; })()
    : null;
  const atFolder = !!folderScopeFolder;
  // file-listing screen: inside a subfolder (depth >= 4)
  const atFiles = view === "home" && breadcrumb.length >= 4;
  // which level of activity to show on the per-screen Activity tab
  const activityScopeForView = breadcrumb.length >= 4 ? "file" : breadcrumb.length === 3 ? "folder" : "project";

  return (
    <div className={"app" + (detail ? " panel-open" : "")}
      data-sidebar={t.sidebar} data-density={t.density} data-corners={t.corners}>
      <Sidebar collapsed={collapsed} onToggle={() => setCollapsed(c => !c)} view={view} breadcrumb={breadcrumb}
        onNavigate={navigate} onNewAction={(a) => { if (a === "New Project") setWizardOpen(true); else if (a === "New User") { setAddUser({ ...locationCtx(), inviteOnly: true }); } else if (a === "Upload File") openUpload(); else if (a === "New Folder") { const pid = breadcrumb[1]; const pr = DATA.find(p => p.id === pid); if (view === "home" && pr) { const parentPath = breadcrumb.slice(2); setFolderModal({ projectId: pid, parentPath, pathNames: [pr.name, ...folderPathNames(pr, parentPath)] }); } else setFolderModal({ projectId: "" }); } else flash(a + " — dialog would open"); }}
        storageUsed={25} pendingApprovals={pendingApprovals} myActions={myActions} canManageUsers={canManageUsers} />

      <div className="main">
        <TopBar onProfile={() => { setShowProfile(s => !s); setShowBell(false); }}
          onBell={() => { setShowBell(s => !s); setShowProfile(false); }}
          unread={unread}
          showProfile={showProfile} showBell={showBell}
          profileMenu={<ProfileMenu onClose={() => setShowProfile(false)} onProfile={() => { setShowProfile(false); setProfilePanel(true); }} onLogout={() => { setShowProfile(false); flash("Logout — confirmation dialog"); }} />}
          searchSlot={<GlobalSearch onPick={onSearchPick} />}
          bellPopup={<NotificationPopup onClose={() => setShowBell(false)} notifs={notifs} onMarkAll={() => setNotifs(ns => ns.map(n => ({ ...n, unread: false })))} />} />

        <div className="content-scroll">
          {isPM ? (
            <div className="pm-page">
              {view !== "dashboard" && view !== "users" && view !== "trash" && (
                <div className="page-head">
                  <div className="page-head-main">
                    <h1 className="page-title">
                      <span className="page-title-ic"><Icon name={VIEW_ICONS[view] || "project"} size={22} /></span>
                      {PAGE_HEAD_TITLES[view] || PM_TITLES[view]}
                    </h1>
                    {PM_SUBS[view] && <p className="page-sub">{PM_SUBS[view]}</p>}
                  </div>
                </div>
              )}
              {view === "dashboard" && <AdminDashboard onNav={(v) => navigate([v])} flash={flash}
                q={dashQ} setQ={setDashQ} onAddProject={() => setWizardOpen(true)}
                onCreateMaster={() => setCreateMaster(true)} doneActions={actionDone} onAct={handleActionAct}
                onOpenDetail={(item) => { setDetail(item); markRead(item); }}
                onOpenProject={(p) => { navigate(["home", p.id]); setProjTab("wizard"); }}
                onOpenAction={openActionDetail} />}
              {view === "users-board" && <UsersBoard flash={flash} />}
              {view === "projects-board" && <ProjectsBoard flash={flash}
                onOpenProject={(p) => { navigate(["home", p.id]); setProjTab("wizard"); }}
                onOpenDetail={(item) => { setDetail(item); markRead(item); }} />}
              {view === "actions-board" && <ActionsBoard flash={flash} doneActions={actionDone} onAct={handleActionAct} />}
              {view === "tasks" && <PMTasks tasks={tasks} setTasks={setTasks} mode={taskMode} setMode={setTaskMode}
                onOpenTask={(t) => flash("Open task: " + t.title)} flash={flash} />}
              {view === "approvals" && <PMApprovals approvals={approvals} setApprovals={setApprovals}
                flash={flash} onActivity={onApprovalActivity} />}
              {view === "activity" && <PMActivity activity={activity} onAction={(a) => flash(a.pending.label + " — " + a.target)} />}
              {view === "myactions" && <MyActionsView flash={flash} doneActions={actionDone} onAct={handleActionAct} onRowClick={openActionDetail} />}
              {view === "users" && <UserManagement users={users} setUsers={setUsers} onInvite={() => setAddUser({ inviteOnly: true })} flash={flash}
                openUserKey={pendingUserKey} onOpenedUser={() => setPendingUserKey(null)} />}
              {view === "trash" && <TrashView flash={flash} />}
            </div>
          ) : (
            <>
              {view === "home" && breadcrumb.length === 1 && (
                <div className="welcome">
                  <h1>Welcome to DocuVault DMS</h1>
                  <p>Manage, organise and collaborate on your documents</p>
                </div>
              )}

              {view === "home" && breadcrumb.length === 1 && (() => {
                const myApprovals = approvals.filter(a => a.reviewer === "v" && (a.status === "pending" || a.status === "changes"));
                return (
                  <div className="my-actions-strip">
                    <div className="mas-head">
                      <h2>My Actions</h2>
                      {myApprovals.length > 0 && <button className="link-btn" onClick={() => navigate(["myactions"])}>View all</button>}
                    </div>
                    <div className="appr-strip">
                      {myApprovals.map(a => (
                        <ApprovalCard key={a.id} a={a} compact onDecide={decideApproval} onOpen={(x) => flash("Opening " + x.fileName + "…")} />
                      ))}
                      {myApprovals.length === 0 && <div className="ma-empty">All caught up! No documents waiting for your action.</div>}
                    </div>
                  </div>
                );
              })()}

              {view === "home" && breadcrumb.length >= 2 ? (
                <Breadcrumb segments={bcSegs} onJump={(i) => {
                  if (i === 0) navigate(["dashboard"]);
                  else { setBreadcrumb(breadcrumb.slice(0, i + 1)); setProjTab("wizard"); }
                }} />
              ) : (
                <div className="page-head">
                  <h2 className="page-title">
                    <span className="page-title-ic"><Icon name={VIEW_ICONS[view] || "project"} size={22} /></span>
                    {current.title}<span className="count-badge">{current.count} {current.countLabel}</span>
                  </h2>
                </div>
              )}

              {(atProject || atFolder || atFiles) && (
                <div className="proj-tabs">
                  {[["wizard", atFiles ? "Files" : atFolder ? "Subfolder" : "Folders", atFiles ? "doc" : "folder"], ["activity", "Activity", "history"], ["users", "Users", "people"]].map(([id, lbl, ic]) => (
                    <button key={id} className={"proj-tab" + (projTab === id ? " on" : "")} onClick={() => setProjTab(id)}>
                      <Icon name={ic} size={18} />{lbl}
                      {id === "tasks" && <span className="tab-count">{tasks.filter(tk => tk.projectId === breadcrumb[1]).length}</span>}
                      {id === "users" && <span className="tab-count">{users.length}</span>}
                    </button>
                  ))}
                </div>
              )}

              {atProject && projTab === "tasks" && (
                <PMTasks tasks={tasks} setTasks={setTasks} mode="list" hideToggle
                  projectFilter={breadcrumb[1]} onOpenTask={(t) => flash("Open task: " + t.title)} flash={flash} />
              )}
              {atProject && projTab === "board" && (
                <PMTasks tasks={tasks} setTasks={setTasks} mode="board" hideToggle
                  projectFilter={breadcrumb[1]} onOpenTask={(t) => flash("Open task: " + t.title)} flash={flash} />
              )}
              {(atProject || atFolder || atFiles) && projTab === "activity" && (() => {
                const aProj = DATA.find(p => p.id === breadcrumb[1]);
                const aProjKeys = aProj ? (aProj.members || []).map(m => m.key) : [];
                const aFolder = breadcrumb.length >= 3 && aProj ? resolveFolderPath(aProj, breadcrumb.slice(2)) : null;
                const aAccessKeys = aFolder ? [...new Set([...aProjKeys, ...(aFolder.access || [])])] : aProjKeys;
                // inside a folder, the folder dropdown lists that folder's subfolders (recursively), not the parent
                const collectSubs = (f) => (f.subfolders || []).flatMap(s => [{ id: s.id, name: s.name }, ...collectSubs(s)]);
                const aFolderChoices = aFolder ? collectSubs(aFolder) : null;
                return <PMActivity activity={activity} projectFilter={breadcrumb[1]} scope={activityScopeForView}
                  lockProject accessKeys={aAccessKeys} hideActions
                  folderChoices={aFolderChoices} folderLabel={aFolder ? "All subfolders" : undefined} />;
              })()}
              {(atProject || atFolder || atFiles) && projTab === "users" && (
                <div className="proj-users-card">
                  <div className="pu-head">
                    <h3>Project Members</h3>
                    {(() => {
                      const projObj = DATA.find(p => p.id === breadcrumb[1]);
                      if (!projObj) return null;
                      return <FwAccess triggerLabel="Add member" candidates={Object.keys(USERS)}
                        lockedKeys={(projObj.members || []).map(m => m.key)}
                        value={(projObj.members || []).map(m => m.key)}
                        onChange={(keys) => {
                          const set = new Set([projObj.owner, ...keys]);
                          projObj.members = [...set].map(k => (projObj.members || []).find(m => m.key === k) || { key: k, role: k === projObj.owner ? "Owner" : "Editor" });
                          setProjVersion(v => v + 1);
                        }} />;
                    })()}
                  </div>
                  <div className="pu-list">
                    {(() => {
                      const projObj = DATA.find(p => p.id === breadcrumb[1]);
                      const mem = (projObj && projObj.members) || [];
                      if (mem.length === 0) return <div className="pu-empty">No members yet — add existing users to this project.</div>;
                      return mem.map(m => {
                        const ur = users.find(u => u.key === m.key) || {};
                        const status = ur.status || "Active";
                        const isOwner = m.key === projObj.owner;
                        return (
                          <div key={m.key} className="pu-row">
                            <Avatar userKey={m.key} size={36} />
                            <div className="pu-info">
                              <div className="pu-name">{USERS[m.key]?.name}</div>
                              <div className="pu-role">{userRole(m.key)}</div>
                            </div>
                            <div className="pu-row-end">
                              <span className="pu-status" style={{ color: STATUS_USER[status]?.color, background: STATUS_USER[status]?.soft }}>
                                <span className="pu-dot" style={{ background: STATUS_USER[status]?.color }} />{status}</span>
                              {!isOwner
                                ? <button className="icon-btn small" title="Remove from project" onClick={() => removeMember(projObj, m.key)}><Icon name="close" size={20} /></button>
                                : <span className="pu-action-spacer" aria-hidden="true" />}
                            </div>
                          </div>
                        );
                      });
                    })()}
                  </div>
                </div>
              )}

              {(atProject || atFolder) && projTab === "wizard" && (() => {
                const proj = DATA.find(p => p.id === breadcrumb[1]);
                if (!proj) return null;
                const curFolder = atFolder ? folderScopeFolder : null;
                const rootList = curFolder ? (curFolder.subfolders || []) : proj.folders;
                let totalFolders = 0, totalFiles = 0;
                const walk = (list) => (list || []).forEach(f => { totalFolders++; totalFiles += (f.files || []).length; walk(f.subfolders); });
                walk(rootList);
                // count files (recursively) with a pending action assigned to the current user — these are "updates" for them
                const updateCountFor = (folder) => {
                  let n = 0;
                  const dig = (fl) => {
                    (fl.files || []).forEach(file => {
                      if (file.action && !doneActions.has(file.id) &&
                          (file.action.assignee === CURRENT_USER.key || (file.assignees || []).includes(CURRENT_USER.key))) n++;
                    });
                    (fl.subfolders || []).forEach(dig);
                  };
                  dig(folder);
                  return n;
                };
                const renderTree = (folders, depth, parentIds) => (folders || []).map(f => {
                  const subN = (f.subfolders || []).length, fileN = (f.files || []).length;
                  const meta = subN > 0 ? subN + " subfolder" + (subN > 1 ? "s" : "") + (fileN > 0 ? " · " + fileN + " file" + (fileN > 1 ? "s" : "") : "")
                    : fileN > 0 ? fileN + " file" + (fileN > 1 ? "s" : "") : "";
                  const fullPath = [...parentIds, f.id];
                  const expanded = !!fwOpen[f.id];
                  const hasSubs = subN > 0;
                  const AS = window.DMS.AssigneeStack;
                  const updates = updateCountFor(f);
                  return (
                    <React.Fragment key={f.id}>
                      <div className={"fw-node fw-node-click" + (updates > 0 ? " fw-node-updates" : "")}
                        onClick={() => { setBreadcrumb(["home", proj.id, ...fullPath]); setDetail(null); }}>
                        <div className="fw-cell-name" style={{ paddingLeft: depth * 22 }}>
                          {hasSubs
                            ? <button className="fw-chev" title={expanded ? "Collapse" : "Expand"} onClick={e => { e.stopPropagation(); setFwOpen(o => ({ ...o, [f.id]: !o[f.id] })); }}><Icon name={expanded ? "chevronDown" : "chevronRight"} size={16} /></button>
                            : <span className="fw-chev-spacer" />}
                          <Icon name="folder" size={40} className="fw-edit-fic" />
                          <span className="fw-node-txt">
                            <span className="fw-node-name">{f.name}</span>
                            {f.fileNo && <span className="fw-node-fileno">{f.fileNo}</span>}
                          </span>
                          {updates > 0 && (
                            <span className="fw-update-badge" title={updates + " new file" + (updates > 1 ? "s" : "") + " awaiting your action"}>
                              <span className="fw-upd-dot" />{updates}
                            </span>
                          )}
                        </div>
                        <div className="fw-cell">{fileN > 0 ? fileN + " file" + (fileN > 1 ? "s" : "") : <span className="muted-dash">—</span>}</div>
                        <div className="fw-cell">{f.modified || <span className="muted-dash">—</span>}</div>

            if (i >= 0) DATA.splice(i, 1);
          } else if (it.kind === "folder") {
            const proj = DATA.find(p => findFolderDeep(p, it.id));
            if (proj) {
              const removeFrom = (list) => {
                const i = list.findIndex(f => f.id === it.id);
                if (i >= 0) { list.splice(i, 1); return true; }
                return (list || []).some(f => f.subfolders && removeFrom(f.subfolders));
              };
              removeFrom(proj.folders);
            }
          } else {
            const folder = findFolderOfFile(it.id);
            if (folder) folder.files = folder.files.filter(x => x.id !== it.id);
          }
          setProjVersion(v => v + 1);
          setDetail(null);
          setDeleteItem(null);
          flash(`Deleted “${it.name}”`);
        }} />}

      {toast && (
        <div className="toast">
          <span>{toast.msg}</span>
          <button className="link-btn" onClick={() => setToast(null)}>Undo</button>
        </div>
      )}

      {wizardOpen && <ProjectWizard onClose={() => setWizardOpen(false)} onCreate={createProject} />}
      {addUser && <AddUserModal context={addUser} onClose={() => setAddUser(null)} onAdd={handleAddUser} />}
      {folderModal && <NewFolderModal context={folderModal} onClose={() => setFolderModal(null)} onCreate={createFolder} />}
      {createMaster && <CreateMasterModal onClose={() => setCreateMaster(false)} onCreate={createMasterFolder} />}
      {uploadCtx && <UploadModal context={uploadCtx} onClose={() => setUploadCtx(null)} onUpload={handleUpload} />}
      {renameItem && <RenameModal item={renameItem} onClose={() => setRenameItem(null)}
        onSave={(it, newName) => {
          const old = it.name;
          it.name = newName;
          setProjVersion(v => v + 1);
          setRenameItem(null);
          if (detail && detail.id === it.id) setDetail({ ...it });
          setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "rename", action: `renamed “${old}” to`, target: newName, projectId: breadcrumb[1] || it.projectId || null, time: "Just now", date: "Today" }, ...list]);
          flash(`Renamed to “${newName}”`);
        }} />}

      <TweaksPanel>
        <TweakSection label="Theme color" />
        <TweakColor label="Accent" value={THEME_SWATCHES[t.theme]}
          options={["#1A73E8", "#2C5282", "#0F766E", "#4F46E5", "#334155"]}
          onChange={(hex) => {
            const key = Object.keys(THEME_SWATCHES).find(k => THEME_SWATCHES[k].toLowerCase() === hex.toLowerCase()) || "blue";
            setTweak("theme", key);
          }} />
        <TweakRadio label="Preset" value={t.theme}
          options={["blue", "navy", "emerald", "indigo", "graphite"]}
          onChange={(v) => setTweak("theme", v)} />

        <TweakSection label="Controls" />
        <TweakRadio label="Navigation" value={t.sidebar}
          options={["light", "dark"]} onChange={(v) => setTweak("sidebar", v)} />
        <TweakRadio label="Density" value={t.density}
          options={["comfortable", "compact"]} onChange={(v) => setTweak("density", v)} />
        <TweakRadio label="Corners" value={t.corners}
          options={["rounded", "sharp"]} onChange={(v) => setTweak("corners", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>



</body>
</html>
