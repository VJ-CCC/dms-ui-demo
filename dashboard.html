// ============ ADD USER MODAL (with project + folder access scope) ============
function AddUserModal({ context, onClose, onAdd }) {
  const inviteOnly = !!(context && context.inviteOnly);
  const [mode, setMode] = useState(inviteOnly ? "invite" : "existing"); // existing | invite
  const [picked, setPicked] = useState([]);
  const [name, setName] = useState("");
  const [mobile, setMobile] = useState("");
  const [email, setEmail] = useState("");
  const [role, setRole] = useState("User");
  const [projectId, setProjectId] = useState((context && context.projectId) || "");
  const [folderId, setFolderId] = useState((context && context.folderId) || "");

  const proj = DATA.find(p => p.id === projectId);
  const folders = proj ? proj.folders : [];
  // keep folder valid when the project changes
  useEffect(() => {
    if (folderId && !folders.find(f => f.id === folderId)) setFolderId("");
  }, [projectId]); // eslint-disable-line

  const fol = folders.find(f => f.id === folderId);
  // existing users who don't already have access at the chosen scope
  const already = fol ? (fol.access || []) : proj ? (proj.members || []).map(m => m.key) : [];
  const candidates = Object.keys(USERS).filter(k => !already.includes(k));
  // drop anyone picked who is no longer a valid candidate after a scope change
  useEffect(() => { setPicked(p => p.filter(k => candidates.includes(k))); }, [projectId, folderId]); // eslint-disable-line

  const valid = mode === "existing" ? picked.length > 0 : /\S+@\S+\.\S+/.test(email);
  const submit = () => {
    if (!valid) return;
    if (mode === "existing") onAdd({ mode: "existing", userKeys: picked, projectId: projectId || null, folderId: folderId || null });
    else onAdd({ mode: "invite", name: name.trim(), mobile: mobile.trim(), email: email.trim(), role, projectId: projectId || null, folderId: folderId || null });
  };

  const footer = (
    <div className="wiz-foot-right">
      <button className="btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn-primary" disabled={!valid} onClick={submit}>
        <Icon name={mode === "existing" ? "newPlus" : "shared"} size={18} />{mode === "existing" ? "Add to access" : "Send invite"}</button>
    </div>
  );

  return (
    <Modal title={inviteOnly ? "Invite User" : "Add User"} sub={inviteOnly ? "Invite a new person to the workspace" : "Grant existing people access, or invite someone new"} onClose={onClose} footer={footer} wide>
      <div className="form-grid">
        {!inviteOnly && (
        <div className="field">
          <span className="field-label">Add</span>
          <div className="seg-toggle">
            <button className={"seg-opt" + (mode === "existing" ? " on" : "")} onClick={() => setMode("existing")}>
              <Icon name="people" size={16} />Existing user</button>
            <button className={"seg-opt" + (mode === "invite" ? " on" : "")} onClick={() => setMode("invite")}>
              <Icon name="shared" size={16} />Invite new</button>
          </div>
        </div>
        )}

        {mode === "existing" ? (
          <div className="field">
            <span className="field-label">Select users <em>({candidates.length} available)</em></span>
            <UserPicker value={picked} onChange={setPicked} candidates={candidates}
              placeholder="Search existing people…" youKey="v" />
          </div>
        ) : (
          <>
          <div className="au-row2">
            <label className="field"><span className="field-label">User name</span>
              <input className="field-input" autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="Full name" /></label>
            <label className="field"><span className="field-label">Mobile number</span>
              <input className="field-input" type="tel" inputMode="tel" value={mobile} onChange={e => setMobile(e.target.value)} placeholder="98765 43210" /></label>
          </div>
          <div className="au-row2">
            <label className="field"><span className="field-label">Email address</span>
              <input className="field-input" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@cybercom.io" /></label>
            <label className="field"><span className="field-label">Role</span>
              <select className="field-input" value={role} onChange={e => setRole(e.target.value)}>{ROLES.map(r => <option key={r}>{r}</option>)}</select></label>
          </div>
          </>
        )}

        <div className="au-access">
          <div className="au-access-head"><Icon name="folder" size={16} />Grant access</div>

          <div className="au-row2">
            <div className="field"><span className="field-label">Project</span>
              <MarqueeSelect value={projectId} onChange={setProjectId} ariaLabel="Project"
                placeholder="Whole workspace (all projects)"
                options={[{ value: "", label: "Whole workspace (all projects)" }, ...DATA.map(p => ({ value: p.id, label: p.name }))]} />
            </div>
            <div className="field"><span className="field-label">Folder <em>{proj ? "(optional)" : ""}</em></span>
              <MarqueeSelect value={folderId} disabled={!proj} onChange={setFolderId} ariaLabel="Folder"
                placeholder={proj ? "All folders in project" : "Select a project first"}
                options={[{ value: "", label: proj ? "All folders in project" : "Select a project first" }, ...folders.map(f => ({ value: f.id, label: f.name }))]} />

// ============ NEW FOLDER MODAL ============
function NewFolderModal({ context, onClose, onCreate }) {
  const [projectId, setProjectId] = useState((context && context.projectId) || "");
  const [name, setName] = useState("");
  const [subs, setSubs] = useState([]); // optional subfolder names for a new top-level folder
  const [members, setMembers] = useState([]); // optional folder access members
  const lockProject = !!(context && context.projectId);
  const parentPath = (context && context.parentPath) || [];
  const proj = DATA.find(p => p.id === projectId);
  // resolve the folder we're creating inside (for nested), else project root
  const parentFolder = (() => {
    if (!proj || !parentPath.length) return null;
    let list = proj.folders || [], node = null;
    for (const id of parentPath) { node = list.find(f => f.id === id); if (!node) return null; list = node.subfolders || []; }
    return node;
  })();
  const siblings = parentFolder ? (parentFolder.subfolders || []) : (proj ? proj.folders : []);
  const dupe = siblings.some(f => f.name.trim().toLowerCase() === name.trim().toLowerCase());
  const cleanSubs = subs.map(s => ({ name: (s.name || "").trim(), fileNo: (s.fileNo || "").trim() })).filter(s => s.name);
  const subDupe = cleanSubs.some((s, i) => cleanSubs.findIndex(x => x.name.toLowerCase() === s.name.toLowerCase()) !== i);
  const subMissingFileNo = cleanSubs.some(s => !s.fileNo);
  const valid = name.trim() && projectId && !dupe && !subDupe && !subMissingFileNo;
  const addSub = () => setSubs(arr => [...arr, { name: "", fileNo: "" }]);
  const submit = () => { if (valid) onCreate({ projectId, name: name.trim(), parentPath, subfolders: parentFolder ? [] : cleanSubs, members }); };
  // full path to the location the (sub)folder will be created in
  const locPath = (context && context.pathNames && context.pathNames.length) ? context.pathNames : (proj ? [proj.name] : []);
  const hasPath = !!(context && context.projectId) && locPath.length >= 1;

  const footer = (
    <div className="wiz-foot-right">
      <button className="btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn-primary" disabled={!valid} onClick={submit}>
        <Icon name="addFolder" size={18} />Create folder</button>
    </div>
  );

  return (
    <Modal title={parentFolder ? "New Subfolder" : "New Folder"} sub={parentFolder ? "Create a folder inside this folder" : "Create a folder inside a project"} onClose={onClose} footer={footer}>
      <div className="form-grid">
        <div className="field">
          <span className="field-label">{parentFolder ? "Creating subfolder in" : "Creating folder in"}</span>
          {hasPath ? (
            <PathDisplay names={locPath} pending={name.trim() || (parentFolder ? "New subfolder" : "New folder")} />
          ) : (
            <select className="field-input" value={projectId} disabled={lockProject} onChange={e => setProjectId(e.target.value)} autoFocus={!projectId}>
              <option value="">Select a project…</option>
              {DATA.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          )}
        </div>
        <label className="field"><span className="field-label">Folder name</span>
          <input className="field-input" autoFocus={!!projectId} value={name} onChange={e => setName(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !subs.length) submit(); }} placeholder="e.g. Contracts" />
          {dupe && <span className="field-err"><Icon name="info" size={13} />A folder with this name already exists here.</span>}
        </label>
        {!parentFolder && (
          <div className="field">
            <span className="field-label">Subfolders <em>(optional)</em></span>
            {subs.length > 0 && (
              <div className="nf-sublist">
                {subs.map((s, i) => (
                  <div className="nf-subrow" key={i}>
                    <Icon name="folder" size={16} className="nf-subic" />
                    <input className="field-input" value={s.name} placeholder={"Subfolder " + (i + 1) + " name"} autoFocus
                      onChange={e => setSubs(arr => arr.map((x, j) => j === i ? { ...x, name: e.target.value } : x))}
                      onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addSub(); } }} />
                    <input className={"field-input nf-subfileno" + (s.name.trim() && !s.fileNo.trim() ? " nf-fileno-err" : "")} value={s.fileNo} placeholder="File No."
                      onChange={e => setSubs(arr => arr.map((x, j) => j === i ? { ...x, fileNo: e.target.value } : x))}
                      onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addSub(); } }} />
                    <button className="icon-btn small" onClick={() => setSubs(arr => arr.filter((_, j) => j !== i))} aria-label="Remove subfolder"><Icon name="close" size={18} /></button>
                  </div>
                ))}
              </div>
            )}
            <button className="nf-addsub" onClick={addSub}><Icon name="addFolder" size={16} />Add subfolder</button>
            {subDupe && <span className="field-err"><Icon name="info" size={13} />Two subfolders have the same name.</span>}
            {!subDupe && subMissingFileNo && <span className="field-err"><Icon name="info" size={13} />File No. is required for each subfolder.</span>}
            {cleanSubs.length > 0 && !subDupe && !subMissingFileNo && <span className="nf-subhint"><Icon name="info" size={13} />{cleanSubs.length} subfolder{cleanSubs.length > 1 ? "s" : ""} will be created inside “{name.trim() || "the new folder"}”.</span>}
          </div>
        )}
        <div className="field">
          <span className="field-label">Members <em>(optional)</em></span>
          <UserPicker value={members} onChange={setMembers} candidates={Object.keys(USERS)}
            placeholder="Search and select people…" youKey="v" triggerLabel="Project users" />
        </div>
      </div>
    </Modal>
  );
}

// Slides in when a user row is clicked: profile, actions, projects/folders they belong to, and private notes addressed to them.
function UserDetailPanel({ user, onClose, onEdit, onDelete, onToggleStatus, flash }) {
  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);
  if (!user) return null;
  const k = user.key;
  const u = USERS[k] || {};
  const sm = STATUS_USER[user.status] || {};
  const isYou = k === "v";

  const projects = DATA.filter(p => (p.members || []).some(m => m.key === k) || p.owner === k);
  const folders = [];
  DATA.forEach(p => p.folders.forEach(f => { if ((f.access || []).includes(k) || f.owner === k) folders.push({ folder: f, project: p }); }));
  const notes = [];
  DATA.forEach(p => p.folders.forEach(f => f.files.forEach(fl => (fl.notes || []).forEach(n => {
    if ((n.for || []).includes(k)) notes.push({ file: fl, project: p, folder: f, note: n, viewed: (n.seenBy || []).includes(k) });
  }))));

  return (
    <>
      <div className="panel-backdrop" onClick={onClose} />
      <aside className="detail-panel" role="dialog" aria-label="User details">
        <div className="detail-head">
          <div className="detail-id">

            <div className="detail-titles">
              <div className="detail-name" title={u.name}>{u.name}{isYou && " (you)"}</div>

                {u.mobile && <span className="dc-item"><Icon name="phone" size={13} />{u.mobile}</span>}
                {u.email && <span className="dc-item"><Icon name="mail" size={13} />{u.email}</span>}
              </div>
            </div>
          </div>
          <button className="icon-btn detail-close" onClick={onClose} aria-label="Close"><Icon name="close" size={22} /></button>
        </div>

        <div className="detail-actions-row ud-actions">
          <button className="ud-act" onClick={() => onEdit(user)}><Icon name="rename" size={15} />Edit</button>
          {!isYou && (user.status !== "Suspended"
            ? <button className="ud-act" onClick={() => onToggleStatus(k, "Suspended")}><Icon name="reject" size={15} />Suspend</button>
            : <button className="ud-act" onClick={() => onToggleStatus(k, "Active")}><Icon name="approve" size={15} />Reactivate</button>)}
          <button className="ud-act" onClick={() => flash(`Password reset link sent to ${u.email}`)}><Icon name="settings" size={15} />Reset password</button>
          {!isYou && <button className="ud-act danger" onClick={() => onDelete(user)}><Icon name="trash" size={15} />Delete</button>}
        </div>

        <div className="detail-body">
          <div className="meta-list">
            <div className="meta-row"><div className="meta-label">Role</div><div className="meta-value">{user.role}</div></div>
            <div className="meta-row"><div className="meta-label">Status</div><div className="meta-value"><span className="status-pill" style={{ color: sm.color, background: sm.soft }}><span className="pri-dot" style={{ background: sm.color }} />{user.status}</span></div></div>
            <div className="meta-row"><div className="meta-label">Last active</div><div className="meta-value">{user.last}</div></div>
          </div>

          <div className="ud-sec">
            <div className="ud-sec-head"><Icon name="project" size={14} />Projects<span className="ud-count">{projects.length}</span></div>
            {projects.length === 0
              ? <div className="ud-empty">Not a member of any project.</div>
              : projects.map(p => {
                  const m = (p.members || []).find(mm => mm.key === k);
                  return (
                    <div className="ud-row" key={p.id}>

                      <div className="ud-row-info">
                        <div className="ud-row-name">{p.name}</div>
                        <div className="ud-row-sub">{p.owner === k ? userRole(k) : (m ? m.role : "Member")}</div>

    ["rejected", "Rejected", mine.filter(a => a.status === "rejected").length],
    ["all", "All", mine.length],

  const shown = filter === "open"
    ? mine.filter(a => a.status === "pending" || a.status === "changes")

function ProjectsWidget({ items, loaded, onViewAll, flash, onRowDetail, onOpenName, onAddProject }) {
  const ListCard = window.DMS.ListCard;
  // Status: only Active / Archived. Progress: uploaded vs total target files (nested).
  const ARCHIVED_PROJECTS = { p5: true };
  // A subfolder is logically a single file (its files are revisions of that one document).
  // Progress = subfolders that have at least one file uploaded / total subfolders.
  const tallySubfolders = (folders) => {
    let withFile = 0, total = 0;
    const walk = (list) => (list || []).forEach(f => {
      const isSub = !!(f.fileNo && String(f.fileNo).trim());
      if (isSub) { total++; if ((f.files || []).length > 0) withFile++; }
      walk(f.subfolders);
    });
    walk(folders);
    return { withFile, total };
  };
  const statusActiveCol = { key: "pstatus", label: "Status", render: (it) => {
    const archived = !!ARCHIVED_PROJECTS[it.id];
    const m = archived ? { color: "#5F6368", soft: "#EEF0F2" } : { color: "#188038", soft: "#E6F4EA" };
    return <span className="status-pill" style={{ color: m.color, background: m.soft }}><span className="pri-dot" style={{ background: m.color }} />{archived ? "Archived" : "Active"}</span>;
  } };
  const uploadProgressCol = { key: "progress", label: "Files", render: (it) => {
    const { withFile, total } = tallySubfolders(it.folders);
    const pct = total ? Math.min(100, Math.round((withFile / total) * 100)) : 0;
    const complete = total > 0 && withFile >= total;
    return <span className="proj-progress" title={withFile + " of " + total + " subfolders have a file uploaded"}>
      <span className="pp-track"><span className="pp-fill" style={{ width: pct + "%", background: complete ? "#188038" : "var(--blue)" }} /></span>
      <span className={"pp-pct" + (complete ? " complete" : "")}>{withFile}/{total}</span>
    </span>;
  } };
  const usersCol = { key: "pusers", label: "Users", render: (it) => {
    const AS = window.DMS.AssigneeStack;
    const keys = (it.members || []).map(m => m.key);
    if (!keys.length) return <span className="muted-dash">—</span>;
    return <AS users={keys} size={22} simple />;
  } };
  const PROJECT_COLS = [statusActiveCol, uploadProgressCol, usersCol, window.DMS.modCol];
  const projs = items.map(x => x.p);

  const [selection, setSelection] = useState(new Set());
  const [bookmarks, setBookmarks] = useState(new Set());
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("name-asc"); // default: Name A–Z
  const [statusFilter, setStatusFilter] = useState("active"); // active (default) | all | archived

  const toggleSel = (it) => setSelection(s => { const n = new Set(s); n.has(it.id) ? n.delete(it.id) : n.add(it.id); return n; });
  const toggleAll = () => setSelection(s => s.size === projs.length ? new Set() : new Set(projs.map(p => p.id)));
  const toggleBookmark = (id) => setBookmarks(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const onBulk = (a) => { if (a === "clear") setSelection(new Set()); else flash("Bulk: " + a); };

  const ql = search.trim().toLowerCase();
  const statusMatch = (p) => statusFilter === "all" ? true
    : statusFilter === "archived" ? !!ARCHIVED_PROJECTS[p.id] : !ARCHIVED_PROJECTS[p.id];
  const filtered = projs.filter(p => (!ql || p.name.toLowerCase().includes(ql)) && statusMatch(p));

  // ---- sorting (one option per Project-table column) ----
  const SORT_OPTIONS = [
    { id: "name-asc",  label: "Name (A–Z)" },
    { id: "status",    label: "Status" },
    { id: "files",     label: "Files (most uploaded)" },
    { id: "users",     label: "Users (most)" },
    { id: "modified",  label: "Last modified (recent)" },
  ];
  const filesOf = (p) => tallySubfolders(p.folders).withFile;
  const usersOf = (p) => (p.members || []).length;
  const modRank = (p) => {
    const s = (p.modified || "").toLowerCase();
    const tm = s.match(/(\d{1,2}):(\d{2})/);
    const mins = tm ? (+tm[1]) * 60 + (+tm[2]) : 0;
    if (s.includes("today")) return 300000 + mins;
    if (s.includes("yesterday")) return 200000 + mins;
    const months = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
    const dm = s.match(/(\d{1,2})\s+([a-z]{3})/);
    if (dm) { const mi = months.indexOf(dm[2]); if (mi >= 0) return 100000 + mi * 31 + (+dm[1]); }
    return 0;
  };
  const byName = (a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" });
  const sorted = [...filtered].sort((a, b) => {
    // when viewing everything, group all Active projects first, Archived after
    if (statusFilter === "all") {
      const grp = (ARCHIVED_PROJECTS[a.id] ? 1 : 0) - (ARCHIVED_PROJECTS[b.id] ? 1 : 0);
      if (grp) return grp;
    }
    switch (sort) {
      case "status":    return ((ARCHIVED_PROJECTS[a.id] ? 1 : 0) - (ARCHIVED_PROJECTS[b.id] ? 1 : 0)) || byName(a, b);

// ---- Hover tooltip: shows full text in a floating bubble (escapes cell clipping via position:fixed) ----
function HoverTip({ text, className, children }) {
  const [pos, setPos] = React.useState(null);
  const ref = React.useRef(null);
  const show = () => {
    const el = ref.current;
    if (!el || !text) return;
    const r = el.getBoundingClientRect();
    const W = 340, M = 10;
    let left = r.left;
    if (left + W > window.innerWidth - M) left = window.innerWidth - W - M;
    setPos({ left: Math.max(M, left), top: r.bottom + 6, width: W });
  };
  const hide = () => setPos(null);
  return (
    <span ref={ref} className={className} onMouseEnter={show} onMouseLeave={hide}>
      {children}
      {pos && text && (
        <span className="hovertip" style={{ left: pos.left, top: pos.top, maxWidth: pos.width }}>{text}</span>
      )}
    </span>
  );
}

        : total === 0 ? <EmptyMini icon={emptyIcon} text={emptyText} />
        : <>{children}<Pager page={page} pages={pages} total={total} onPage={onPage} /></>}
    </div>
  );
}

function usePaged(list) {
  const [page, setPage] = useState(1);
  const pages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
  useEffect(() => { if (page > pages) setPage(1); }, [pages]); // eslint-disable-line
  const slice = list.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  return { page, pages, setPage, slice };
}

function tmplAccent(id) {
  let h = 0;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Confirmation gate for every destructive delete (project / folder / file).
// Requires typing the exact name + acknowledging; projects with content add a second ack.
function DeleteChallengeModal({ item, onCancel, onConfirm }) {
  const M = window.DMS.Modal;
  const [text, setText] = useState("");
  const [ack, setAck] = useState(false);
  const [ack2, setAck2] = useState(false);
  const kind = item.kind === "project" ? "project" : item.kind === "folder" ? "folder" : "file";
  const counts = useMemo(() => {
    let folders = 0, files = 0;
    const walk = (list) => (list || []).forEach(f => { folders++; files += (f.files || []).length; walk(f.subfolders); });
    if (item.kind === "project") walk(item.folders);
    else if (item.kind === "folder") { files += (item.files || []).length; walk(item.subfolders); }
    return { folders, files };
  }, [item]);
  const hasContents = counts.folders > 0 || counts.files > 0;
  const needsSecond = item.kind === "project" && hasContents;
  const nameMatch = text.trim().toLowerCase() === "delete";
  const ready = nameMatch && ack && (!needsSecond || ack2);
  const impactParts = [];
  if (counts.folders) impactParts.push(counts.folders + " folder" + (counts.folders > 1 ? "s" : ""));
  if (counts.files) impactParts.push(counts.files + " file" + (counts.files > 1 ? "s" : ""));
  return (
    <M title={"Delete " + kind} sub={"This permanently removes “" + item.name + "”"} onClose={onCancel}

        <div className="wiz-foot-right">
          <button className="btn-ghost" onClick={onCancel}>Cancel</button>

          <div>
            <div className="del-warn-title">You're about to permanently delete this {kind}.</div>

              ? "Everything inside — " + impactParts.join(" and ") + " — will be destroyed."

          </div>
        </div>
        {hasContents && (
          <div className="del-impact">
            {counts.folders > 0 && <span className="del-impact-item"><Icon name="folder" size={15} />{counts.folders} folder{counts.folders > 1 ? "s" : ""}</span>}
            {counts.files > 0 && <span className="del-impact-item"><Icon name="addFile" size={15} />{counts.files} file{counts.files > 1 ? "s" : ""}</span>}
          </div>
        )}
        <label className="field del-field">
          <span className="field-label">Type <b>delete</b> to confirm</span>
          <input className="field-input" autoFocus value={text} placeholder="delete"
            onChange={e => setText(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && ready) onConfirm(); }} />
          {text.trim() && !nameMatch && <span className="field-err"><Icon name="info" size={13} />Type “delete” to confirm.</span>}
        </label>
        <label className={"del-ack" + (ack ? " on" : "")}>
          <input type="checkbox" checked={ack} onChange={e => setAck(e.target.checked)} />
          <span className="del-ack-box"><Icon name="check" size={14} /></span>
          <span>I understand this {kind} will be permanently deleted and cannot be recovered.</span>
        </label>
        {needsSecond && (
          <label className={"del-ack" + (ack2 ? " on" : "")}>
            <input type="checkbox" checked={ack2} onChange={e => setAck2(e.target.checked)} />
            <span className="del-ack-box"><Icon name="check" size={14} /></span>
            <span>I understand all {impactParts.join(" and ")} inside will be destroyed for every member.</span>
          </label>
        )}
      </div>
    </M>
  );
}

// Compact per-subfolder access picker (Folder Wizard). Toggle users; shows avatar stack.
function FwAccess({ value, onChange, candidates, lockedKeys = [], triggerLabel, triggerIcon = "newPlus" }) {
  const [open, setOpen] = React.useState(false);
  const [q, setQ] = React.useState("");
  const [projOpen, setProjOpen] = React.useState(false);
  const [pos, setPos] = React.useState(null);
  const ref = React.useRef(null);
  const btnRef = React.useRef(null);
  const searchRef = React.useRef(null);
  // Freeze the locked "Project users" group to its membership when the picker opened,
  // so newly-selected users stay in place in the list (just check/uncheck) instead of
  // jumping up into the Project users section until the picker is reopened.
  const [frozenLocked, setFrozenLocked] = React.useState(lockedKeys);
  React.useEffect(() => { if (open) setFrozenLocked(lockedKeys); }, [open]);

  const place = React.useCallback(() => {
    const btn = btnRef.current;
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const MENU_W = 400, MAX_H = 340, GAP = 6, M = 8;
    const left = Math.max(M, Math.min(r.left, window.innerWidth - MENU_W - M));
    const below = window.innerHeight - r.bottom;
    const openUp = below < MAX_H + GAP && r.top > below;
    setPos({
      left,
      top: openUp ? undefined : r.bottom + GAP,
      bottom: openUp ? (window.innerHeight - r.top + GAP) : undefined,
      width: MENU_W,
      maxHeight: Math.min(MAX_H, (openUp ? r.top : below) - GAP - M),
    });
  }, []);

  React.useEffect(() => {
    if (!open) return;
    place();
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const reposition = () => place();
    document.addEventListener("mousedown", h);
    window.addEventListener("scroll", reposition, true);
    window.addEventListener("resize", reposition);
    const t = setTimeout(() => searchRef.current && searchRef.current.focus(), 0);
    return () => {
      document.removeEventListener("mousedown", h);
      window.removeEventListener("scroll", reposition, true);
      window.removeEventListener("resize", reposition);
      clearTimeout(t);
    };
  }, [open, place]);
  React.useEffect(() => { if (!open) { setQ(""); setProjOpen(false); } }, [open]);

  const toggle = (k) => { if (frozenLocked.includes(k)) return; onChange(value.includes(k) ? value.filter(x => x !== k) : [...value, k]); };
  const needle = q.trim().toLowerCase();
  const matches = (k) => {
    if (!needle) return true;
    const u = USERS[k] || {};
    return (u.name + " " + (u.mobile || "") + " " + (u.email || "")).toLowerCase().includes(needle);
  };
  const lockedList = candidates.filter(k => frozenLocked.includes(k) && matches(k));
  const otherList = candidates.filter(k => !frozenLocked.includes(k) && matches(k));
  return (
    <div className="fw-access" ref={ref} onClick={e => e.stopPropagation()}>
      {triggerLabel ? (
        <button ref={btnRef} className="btn-primary fw-access-addbtn" type="button" onClick={() => setOpen(o => !o)}>
          <Icon name={triggerIcon} size={18} />{triggerLabel}
        </button>
      ) : (
        <button ref={btnRef} className="fw-access-btn" type="button" onClick={() => setOpen(o => !o)} title="Subfolder access">
          {value.length > 0
            ? <span className="fw-access-stack">{value.slice(0, 3).map(k => <Avatar key={k} userKey={k} size={20} />)}{value.length > 3 && <span className="fw-access-more">+{value.length - 3}</span>}</span>
            : <span className="fw-access-ph"><Icon name="people" size={14} />Access</span>}
          <Icon name="chevronDown" size={14} className="fw-access-caret" />
        </button>
      )}
      {open && pos && (
        <div className="fw-access-menu" style={{ left: pos.left, top: pos.top, bottom: pos.bottom, width: pos.width, maxHeight: pos.maxHeight }}>
          <div className="fw-access-search">
            <Icon name="search" size={15} />
            <input ref={searchRef} value={q} onChange={e => setQ(e.target.value)} placeholder={"Search " + candidates.length + " people…"} />
            {q && <button type="button" className="icon-btn small fw-access-search-x" onClick={() => setQ("")} aria-label="Clear search"><Icon name="close" size={14} /></button>}
          </div>
          <div className="fw-access-list">
            {lockedList.length > 0 && (
              <div className="fw-access-projgroup">
                <button type="button" className="fw-access-projrow" onClick={() => setProjOpen(o => !o)}
                  title="Project-level users — managed at project level">
                  <span className="fw-access-stack">
                    {lockedList.slice(0, 3).map(k => <Avatar key={k} userKey={k} size={24} />)}
                    {lockedList.length > 3 && <span className="fw-access-more">+{lockedList.length - 3}</span>}
                  </span>
                  <span className="fw-access-projlabel">Project users</span>
                  {lockedList.length > 3 && <span className="fw-access-projcount">{lockedList.length}</span>}
                  <Icon name={projOpen ? "chevronUp" : "chevronDown"} size={16} className="fw-access-caret" />
                </button>
                {projOpen && lockedList.map(k => {
                  const u = USERS[k] || {};
                  return (
                    <div key={k} className="fw-access-row locked" title="Assigned at project level — managed at project level">
                      <Avatar userKey={k} size={28} />
                      <span className="fw-access-info">
                        <span className="fw-access-name">{u.name || k}</span>
                        {(u.mobile || u.email) && <span className="fw-access-sub">{u.mobile ? <>{u.mobile.split(" ")[0]} <span className="ph-acc">{u.mobile.split(" ").slice(1).join(" ")}</span></> : u.email}</span>}
                      </span>
                      <span className="fw-access-role">{userRole(k)}</span>
                      <span className="fw-access-tick on" title="Already has access — managed at project level"><Icon name="check" size={16} /></span>
                    </div>
                  );
                })}
              </div>
            )}
            {otherList.map(k => {
              const on = value.includes(k);
              const u = USERS[k] || {};
              return (
                <button key={k} type="button" className={"fw-access-row" + (on ? " on" : "")} onClick={() => toggle(k)}>
                  <Avatar userKey={k} size={34} />
                  <span className="fw-access-info">
                    <span className="fw-access-name">{u.name || k}</span>
                    {(u.mobile || u.email) && <span className="fw-access-sub">{u.mobile ? <>{u.mobile.split(" ")[0]} <span className="ph-acc">{u.mobile.split(" ").slice(1).join(" ")}</span></> : u.email}</span>}
                  </span>
                  <span className="fw-access-role">{userRole(k)}</span>
                  <span className={"fw-access-tick" + (on ? " on" : "")} aria-hidden="true"><Icon name="check" size={16} /></span>
                </button>
              );
            })}
            {lockedList.length === 0 && otherList.length === 0 && <div className="fw-access-empty">No users match “{q}”</div>}
          </div>
        </div>
      )}
    </div>
  );

  return { color: "#188038" };
}

function TrashView({ flash }) {
  const [data, setData] = useState(INITIAL_TRASH);
  const [tab, setTab] = useState("files");
  const [sel, setSel] = useState(new Set());
  const [confirm, setConfirm] = useState(null); // { mode:"row"|"empty", row?, label, note }

  const rows = data[tab];
  const allSel = rows.length > 0 && rows.every(r => sel.has(r.id));
  const toggle = (id) => setSel(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleAll = () => setSel(allSel ? new Set() : new Set(rows.map(r => r.id)));
  const changeTab = (id) => { setTab(id); setSel(new Set()); };

  const restore = (row) => {
    setData(d => ({ ...d, [tab]: d[tab].filter(r => r.id !== row.id) }));
    setSel(s => { const n = new Set(s); n.delete(row.id); return n; });
    flash(`Restored “${row.name}”`);
  };
  const deleteForever = (row) => {
    setData(d => ({ ...d, [tab]: d[tab].filter(r => r.id !== row.id) }));
    setSel(s => { const n = new Set(s); n.delete(row.id); return n; });
    flash(`“${row.name}” permanently deleted`);
  };
  const emptyTrash = () => {
    const total = data.files.length + data.folders.length + data.projects.length;
    if (total === 0) { flash("Trash is already empty"); return; }
    setData({ files: [], folders: [], projects: [] });
    setSel(new Set());
    flash(`Emptied trash — ${total} item${total > 1 ? "s" : ""} permanently deleted`);
  };
  const askDeleteForever = (row) => setConfirm({
    mode: "row", row,
    label: "Delete forever",
    note: <>“<b>{row.name}</b>” will be permanently deleted. This action <b>cannot be undone</b>.</>,
  });
  const askEmptyTrash = () => {
    const total = data.files.length + data.folders.length + data.projects.length;
    if (total === 0) { flash("Trash is already empty"); return; }
    setConfirm({
      mode: "empty",
      label: "Empty Trash",
      note: <>All <b>{total} item{total > 1 ? "s" : ""}</b> in the trash will be permanently deleted. This action <b>cannot be undone</b>.</>,
    });
  };
  const runConfirm = () => {
    if (!confirm) return;
    if (confirm.mode === "row") deleteForever(confirm.row);
    else emptyTrash();
    setConfirm(null);
  };

  const TABS = [
    { id: "files", label: "Files" },
    { id: "folders", label: "Folders" },
    { id: "projects", label: "Projects" },
  ];

  const nameCell = (row) => {
    if (tab === "files") {
      const b = FILE_BADGE[row.type] || FILE_BADGE.doc;
      return <span className="tr-badge" style={{ background: b.color }}>{b.label}</span>;
    }
    return <span className="tr-badge tr-badge-ic" style={{ background: tab === "folders" ? "#5F6368" : "#1A73E8" }}>
      <Icon name={tab === "folders" ? "folder" : "project"} size={17} />
    </span>;
  };

  return (
    <div className="trash-view">
      <div className="trash-head">
        <div className="trash-head-left">
          <span className="trash-head-ic"><Icon name="trash" size={22} /></span>
          <div className="trash-head-text">
            <h1 className="trash-title">Trash</h1>
            <p className="trash-sub">Manage and recover deleted document specifications, folders, and project scopes</p>
          </div>
        </div>
        <button className="empty-trash-btn" onClick={askEmptyTrash}>Empty Trash</button>
      </div>

      <div className="trash-tabs">
        {TABS.map(tb => (
          <button key={tb.id} className={"trash-tab" + (tab === tb.id ? " active" : "")} onClick={() => changeTab(tb.id)}>
            {tb.label}<span className="trash-tab-count">{data[tb.id].length}</span>
          </button>
        ))}
      </div>

      <div className="trash-card">
        <div className="trash-table">
          <div className="tr-head tr-row">
            <label className="tr-check"><input type="checkbox" checked={allSel} onChange={toggleAll} aria-label="Select all" /></label>
            <span>File Name</span>
            <span>Location Path</span>
            <span>Deleted By</span>
            <span>Date Deleted</span>
            <span>Status</span>
            <span className="tr-actions-head">Actions</span>
          </div>
          {rows.map(row => {
            const sm = trashStatusMeta(row.daysLeft);
            return (
              <div className={"tr-row tr-body" + (sel.has(row.id) ? " sel" : "")} key={row.id}>
                <label className="tr-check"><input type="checkbox" checked={sel.has(row.id)} onChange={() => toggle(row.id)} aria-label={"Select " + row.name} /></label>
                <span className="tr-fname">
                  {nameCell(row)}
                  <span className="tr-fname-text">{row.name}</span>
                </span>
                <span className="tr-path">{row.path.join(" › ")}</span>
                <span className="tr-by">
                  <span className="tr-av" style={{ background: row.by.color }}>{row.by.initials}</span>
                  <span className="tr-by-text">
                    <span className="tr-by-name">{row.by.name}</span>
                    <span className="tr-by-role">{row.by.role}</span>
                  </span>
                </span>
                <span className="tr-date">{row.date}</span>
                <span className="tr-status" style={{ color: sm.color }}>
                  <Icon name="pending" size={15} />{`${row.daysLeft} ${row.daysLeft === 1 ? "day" : "days"} left`}
                </span>
                <span className="tr-actions">
                  <button className="tr-restore" onClick={() => restore(row)}>Restore</button>
                  <button className="tr-delforever" onClick={() => askDeleteForever(row)} title="Delete forever" aria-label="Delete forever"><Icon name="trash" size={18} /></button>
                </span>
              </div>
            );
          })}
          {rows.length === 0 && (
            <div className="trash-empty">
              <Icon name="trash" size={40} />
              <p>No deleted {tab} — items you delete will appear here for {TRASH_RETENTION} days.</p>
            </div>
          )}
        </div>
      </div>
      {confirm && <TrashDeleteModal info={confirm} onCancel={() => setConfirm(null)} onConfirm={runConfirm} />}
    </div>
  );
}

// Typed-"delete" gate for permanent trash deletion (single item or empty-all).
function TrashDeleteModal({ info, onCancel, onConfirm }) {
  const M = window.DMS.Modal;
  const [text, setText] = useState("");
  const match = text.trim().toLowerCase() === "delete";
  return (
    <M title={info.label} sub="This permanently deletes — it cannot be undone" onClose={onCancel}
      footer={
        <div className="wiz-foot-right">
          <button className="btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn-danger" disabled={!match} onClick={() => { if (match) onConfirm(); }}>
            <Icon name="trash" size={18} />{info.label}</button>
        </div>
      }>
      <div className="del-confirm">
        <div className="del-warn">
          <span className="del-warn-ic"><Icon name="trash" size={20} /></span>
          <div>
            <div className="del-warn-title">You're about to permanently delete this.</div>
            <p className="del-note">{info.note}</p>
          </div>
        </div>
        <label className="field del-field">
          <span className="field-label">Type <b>delete</b> to confirm</span>
          <input className="field-input" autoFocus value={text} placeholder="delete"
            onChange={e => setText(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && match) onConfirm(); }} />
          {text.trim() && !match && <span className="field-err"><Icon name="info" size={13} />Type “delete” to confirm.</span>}
        </label>
      </div>
    </M>
  );
}

function GlobalSearch({ onPick }) {
  const [open, setOpen] = useState(false);
  const [drop, setDrop] = useState(null); // "type" | "people" | null
  const [q, setQ] = useState("");
  const wrapRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setDrop(null); } };
    const onKey = e => { if (e.key === "Escape") { setOpen(false); setDrop(null); } };
    document.addEventListener("mousedown", onDoc, true);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc, true); document.removeEventListener("keydown", onKey); };
  }, [open]);
  useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);
  const TYPE_OPTS = ["folder", "document", "project", "image", "pdf"];
  const PEOPLE_OPTS = Object.keys(USERS).slice(0, 6);
  const FILTERS = ["Projects", "Folders", "Files", "Users"];
  const history = [
    { title: (DATA[0] && DATA[0].name) || "Recent project", cat: "Project", kind: "project", color: "#1A73E8", nav: { type: "project", projId: DATA[0] && DATA[0].id } },
    { title: (DATA[1] && DATA[1].name) || "Recent project", cat: "Project", kind: "project", color: "#188038", nav: { type: "project", projId: DATA[1] && DATA[1].id } },
    { title: ownerName(PEOPLE_OPTS[0]), cat: "People", userKey: PEOPLE_OPTS[0], nav: { type: "user", userKey: PEOPLE_OPTS[0] } },
  ];
  // Live results computed inside the overlay only — never touches the main view filter.
  const needle = q.trim().toLowerCase();
  const results = useMemo(() => {
    if (!needle) return [];
    const out = [];
    const walkFolder = (f, projId, projName, parentPath) => {
      const myPath = [...parentPath, f.id];
      if ((f.name || "").toLowerCase().includes(needle)) out.push({ kind: "folder", title: f.name, cat: "Folder · " + projName, color: "#5F6368", nav: { type: "folder", projId, path: myPath } });
      (f.files || []).forEach(fl => { if ((fl.name || "").toLowerCase().includes(needle)) out.push({ kind: fl.type || "file", title: fl.name, cat: "File · " + f.name, color: "#188038", nav: { type: "file", projId, path: myPath, file: fl } }); });
      (f.subfolders || []).forEach(sf => walkFolder(sf, projId, projName, myPath));
    };
    DATA.forEach(p => {
      if ((p.name || "").toLowerCase().includes(needle)) out.push({ kind: "project", title: p.name, cat: "Project", color: "#1A73E8", nav: { type: "project", projId: p.id } });
      (p.folders || []).forEach(f => walkFolder(f, p.id, p.name, []));
    });
    Object.keys(USERS).forEach(k => {
      const u = USERS[k] || {};
      if ((u.name + " " + (u.email || "") + " " + (u.mobile || "")).toLowerCase().includes(needle)) out.push({ userKey: k, title: u.name, cat: u.email || "People", nav: { type: "user", userKey: k } });
    });
    return out.slice(0, 12);
  }, [needle]);
  const fill = (txt) => { setQ(txt); setDrop(null); if (inputRef.current) inputRef.current.focus(); };
  const pick = (r) => { setOpen(false); setDrop(null); if (onPick && r && r.nav) onPick(r.nav); };
  return (
    <div className={"gsearch" + (open ? " open" : "")} ref={wrapRef}>
      <div className="search-box topbar-search gsearch-trigger" onClick={() => setOpen(true)}>
        <Icon name="search" size={18} className="search-icon" />
        <input className="search-input" placeholder="Search users, projects & actions" value={q}
          onChange={e => setQ(e.target.value)} onFocus={() => setOpen(true)} aria-label="Global search" readOnly={open} />
        {q && !open && <button className="icon-btn" onClick={e => { e.stopPropagation(); setQ(""); }} aria-label="Clear search"><Icon name="close" size={18} /></button>}
      </div>
      {open && (
        <div className="gsearch-card" role="dialog" aria-label="Search">
          <div className="gsearch-search">
            <Icon name="search" size={20} className="search-icon" />
            <input ref={inputRef} className="search-input" placeholder="Search users, projects & actions"
              value={q} onChange={e => setQ(e.target.value)} aria-label="Search" />
            {q && <button className="icon-btn" onClick={() => fill("")} aria-label="Clear search"><Icon name="close" size={18} /></button>}
          </div>
          {needle ? (
            <>
              <div className="gsearch-section-label">{results.length} result{results.length === 1 ? "" : "s"}</div>
              <div className="gsearch-history">
                {results.length === 0 && <div className="gsearch-empty">No matches for “{q}”</div>}
                {results.map((r, i) => (
                  <button key={i} type="button" className="gsearch-hrow" onClick={() => pick(r)}>
                    {r.userKey
                      ? <Avatar userKey={r.userKey} size={30} />
                      : <span className="gsearch-thumb" style={{ background: r.color }}><Icon name={r.kind === "pdf" || r.kind === "doc" || r.kind === "xls" || r.kind === "image" ? "file" : r.kind} size={16} /></span>}
                    <span className="gsearch-hinfo">
                      <span className="gsearch-htitle">{r.title}</span>
                      <span className="gsearch-hcat">{r.cat}</span>
                    </span>
                  </button>
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="gsearch-section-label">Filter by</div>
              <div className="gsearch-filters">
                {FILTERS.map(f => (
                  <button key={f} type="button" className="gsearch-filter-chip" onClick={() => fill(f.toLowerCase() + ":")}>{f}</button>
                ))}
              </div>
              <div className="gsearch-section-label">History</div>
              <div className="gsearch-history">
                {history.map((h, i) => (
                  <button key={i} type="button" className="gsearch-hrow" onClick={() => pick(h)}>
                    {h.userKey
                      ? <Avatar userKey={h.userKey} size={30} />
                      : <span className="gsearch-thumb" style={{ background: h.color }}><Icon name={h.kind} size={16} /></span>}
                    <span className="gsearch-hinfo">
                      <span className="gsearch-htitle">{h.title}</span>
                      <span className="gsearch-hcat">{h.cat}</span>
                    </span>
                    <span className="gsearch-hmenu" role="button" tabIndex={0} aria-label="More" title="More"
                      onClick={e => e.stopPropagation()}><Icon name="more" size={18} /></span>
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

        </div>
        <div className="emp-foot">
          <button className="emp-foot-logout" onClick={() => { onClose(); onLogout && onLogout(); }}><Icon name="logout" size={18} />Logout</button>
        </div>
        </div>
      </div>
    </div>
  );
}

  // add existing users, or invite a new one — scoped to a project / folder
  const handleAddUser = (payload) => {
    const { mode, projectId, folderId } = payload;
    const proj = DATA.find(p => p.id === projectId);
    const fol = proj && folderId ? proj.folders.find(f => f.id === folderId) : null;
    let keys = [];
    if (mode === "invite") {
      const key = "u" + Date.now();
      const nm = (payload.name && payload.name.trim()) || payload.email.split("@")[0].replace(/[._]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      USERS[key] = { name: nm, email: payload.email, mobile: (payload.mobile || "").replace(/^\+?91[\s-]*/, ""), initials: nm.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase(), color: "#5F6368" };
      setUsers(us => [...us, { key, role: payload.role || "User", status: "Invited", last: "—", projects: projectId ? 1 : 0 }]);
      keys = [key];
    } else {
      keys = payload.userKeys || [];
    }
    // grant access at the chosen scope (folder implies project membership too)
    if (proj) {
      const have = new Set((proj.members || []).map(m => m.key));
      const added = keys.filter(k => !have.has(k)).map(k => ({ key: k, role: "Editor" }));
      proj.members = [...(proj.members || []), ...added];
    }
    if (fol) {
      fol.access = [...new Set([...(fol.access || []), ...keys])];
    }
    setProjVersion(v => v + 1);
    setAddUser(null);

    flash(`${mode === "invite" ? "Invited" : "Added"} ${who} to ${where}`);
  };

  // remove a user from a project (and from all its folders)
  const removeMember = (proj, key) => {
    if (!proj || key === proj.owner) return;
    proj.members = (proj.members || []).filter(m => m.key !== key);
    proj.folders.forEach(f => { if (f.access) f.access = f.access.filter(k => k !== key); });

    flash(`Removed ${ownerName(key)} from ${proj.name}`);

  // remove a single user's folder access
  const removeFolderAccess = (folderId, key) => {
    const proj = DATA.find(p => p.folders.some(f => f.id === folderId));
    const fol = proj && proj.folders.find(f => f.id === folderId);
    if (!fol) return;
    fol.access = (fol.access || []).filter(k => k !== key);
    setProjVersion(v => v + 1);
    flash(`Removed ${ownerName(key)} from ${fol.name}`);
  };

  // current location as an add-user / upload context
  const locationCtx = () => {
    const c = { projectId: null, folderId: null };

      c.projectId = breadcrumb[1];
      if (breadcrumb.length === 3) c.folderId = breadcrumb[2];
    }
    return c;
  };

  // approve / reject / request-changes from a card
  const decideApproval = (a, status, verb) => {
    setApprovals(list => list.map(x => x.id === a.id ? { ...x, status } : x));
    flash(`${verb}: ${a.fileName}`);
    onApprovalActivity(a, status);
  };

  // open the upload dialog, inferring project/folder from current location
  const openUpload = (override) => {
    let ctx = { projectId: null, projectName: null, folderId: null, folderName: null, pathNames: [] };
    if (view === "home" && breadcrumb.length >= 2) {

      if (breadcrumb.length >= 3 && proj) {

        if (fol) { ctx.folderId = fol.id; ctx.folderName = fol.name; ctx.pathNames = [proj.name, ...folderPathNames(proj, ids)]; }
      }
    }
    setUploadCtx({ ...ctx, ...(override || {}) });
  };

  // commit an upload: add the file to its folder + assign the action to each selected user
  const handleUpload = (data) => {
    const stamp = "Just now";
    const id = "up" + Date.now();
    const primary = data.primary || data.assignees[0];
    const newFile = {
      id, kind: "file", name: data.fileName, type: data.ftype, size: data.fileSize || "—",
      owner: "v", modified: stamp, opened: stamp, read: true,
      assignees: data.assignees, assigneeActions: data.userActions || {}, description: data.description || "",
      action: data.action ? { type: data.action, assignee: primary, due: data.due || "—" } : null,
      note: data.note || "", noteFor: data.note ? Array.from(new Set([...(data.noteFor || []), "v"])) : [],
    };
    // attach to the target folder if we know it (search any depth, not just top-level)
    let proj = data.context && data.context.projectId ? DATA.find(p => p.id === data.context.projectId) : null;
    let folder = proj && data.context.folderId ? findFolderDeep(proj, data.context.folderId) : (proj ? proj.folders[0] : null);
    if (folder) { folder.files = [...(folder.files || []), newFile]; setProjVersion(v => v + 1); }
    setUploadCtx(null);
    setDetail(null);
    const who = data.assignees.map(k => ownerName(k).split(" ")[0]).join(", ");
    flash(`Uploaded “${data.fileName}” · access granted to ${who}`);
  };

  // download a file (prototype: generates a placeholder blob named after the file) + logs the download
  const downloadItem = (item) => {
    if (!item || item.kind !== "file") return;
    const content = `DocuVault DMS — file export\n\nName: ${item.name}\nType: ${item.type || "file"}\nSize: ${item.size || "—"}\nOwner: ${ownerName(item.owner)}\nModified: ${item.modified || ""}${item.description ? "\nDescription: " + item.description : ""}\n\n(Placeholder content generated by the DocuVault DMS prototype.)\n`;
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = item.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "download", action: "downloaded", target: item.name, projectId: breadcrumb[1] || null, time: "Just now", date: "Today" }, ...list]);
    flash(`Downloading “${item.name}”`);

  // create a folder inside a project — or a subfolder when parentPath is given
  const createFwFolder = (projectId, data, parentFolderId) => {
    const proj = DATA.find(p => p.id === projectId);
    if (!proj) return;
    const rootName = (data.root || "").trim();
    if (!rootName) return;
    const baseId = "f" + Date.now();
    const acc = [...new Set([proj.owner, "v", ...(data.members || [])])];
    const clean = (data.subs || []).map(s => ({ sub: (s.sub || "").trim(), fileNo: (s.fileNo || "").trim(), members: s.members || [] })).filter(s => s.sub && s.fileNo);
    const childNodes = clean.map((s, i) => ({ id: baseId + "s" + i, kind: "folder", name: s.sub, owner: "v", modified: "Just now", created: "Today", fileNo: s.fileNo, files: [], subfolders: [], access: [...new Set([proj.owner, "v", ...s.members])] }));
    const node = { id: baseId, kind: "folder", name: rootName, owner: "v", modified: "Just now", created: "Today", fileNo: "", files: [], subfolders: childNodes, access: acc };
    if (parentFolderId) {
      const parent = findFolderDeep(proj, parentFolderId);
      if (!parent) return;
      parent.subfolders = parent.subfolders || [];
      parent.subfolders.push(node);
    } else {
      proj.folders.push(node);
    }
    setProjVersion(v => v + 1);
    setFwAdd(null);
    if (childNodes.length) setFwOpen(o => ({ ...o, [baseId]: true }));
    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "folder", action: parentFolderId ? "created subfolder" : "created folder", target: rootName, projectId, folderId: baseId, time: "Just now", date: "Today" }, ...list]);
    flash(`${parentFolderId ? "Subfolder" : "Folder"} “${rootName}”${childNodes.length ? " + " + childNodes.length + " subfolder" + (childNodes.length > 1 ? "s" : "") : ""} created`);
  };

  // Folder Wizard: add a subfolder inline under an existing folder (file no. required)
  const createFwSubfolder = (projectId, folderId, data) => {

    const subName = (data.sub || "").trim();
    const fileNo = (data.fileNo || "").trim();
    if (!subName || !fileNo) return;
    const target = findFolderDeep(proj, folderId);
    if (!target) return;
    const acc = target.access ? [...target.access] : [...new Set([proj.owner, "v"])];
    const newSub = { id: folderId + "s" + Date.now(), kind: "folder", name: subName, owner: "v", modified: "Just now", created: "Today", fileNo: fileNo, files: [], subfolders: [], access: acc };
    target.subfolders = [...(target.subfolders || []), newSub];

    setFwOpen(o => ({ ...o, [folderId]: true }));

    flash(`Subfolder “${subName}” added`);

  // Folder Wizard: add MULTIPLE subfolders inline under a folder (each needs name + file no.)
  const saveFwSubfolders = (projectId, folderId, rows) => {
    const proj = DATA.find(p => p.id === projectId);
    if (!proj) return;
    const target = findFolderDeep(proj, folderId);
    if (!target) return;
    const acc = target.access ? [...target.access] : [...new Set([proj.owner, "v"])];
    const clean = (rows || []).map(r => ({ sub: (r.sub || "").trim(), fileNo: (r.fileNo || "").trim(), members: r.members || null })).filter(r => r.sub && r.fileNo);
    if (!clean.length) return;
    const base = "f" + Date.now();
    const newSubs = clean.map((r, i) => ({ id: base + "s" + i, kind: "folder", name: r.sub, owner: "v", modified: "Just now", created: "Today", fileNo: r.fileNo, files: [], subfolders: [], access: r.members ? [...new Set([proj.owner, "v", ...r.members])] : acc }));
    target.subfolders = [...(target.subfolders || []), ...newSubs];
    setProjVersion(v => v + 1);
    setFwSubAdd(null);
    setFwOpen(o => ({ ...o, [folderId]: true }));
    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "folder", action: clean.length > 1 ? `added ${clean.length} subfolders` : "created subfolder", target: clean.map(c => c.sub).join(", "), projectId, folderId, time: "Just now", date: "Today" }, ...list]);
    flash(clean.length > 1 ? `${clean.length} subfolders added` : `Subfolder “${clean[0].sub}” added`);
  };

  // create a folder inside a project — or a subfolder when parentPath is given
  const createFolder = ({ projectId, name, parentPath, subfolders, members }) => {
    const proj = DATA.find(p => p.id === projectId);
    if (!proj) return;
    const id = "f" + Date.now();
    const acc = [...new Set([proj.owner, "v", ...((members) || [])])];
    // optional child subfolders (only for a new top-level folder) — dedupe by name, carry file no
    const seen = new Set();
    const subItems = (subfolders || []).map(s => ({ name: ((s && s.name) || "").trim(), fileNo: ((s && s.fileNo) || "").trim() })).filter(s => {
      if (!s.name) return false; const k = s.name.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true;
    });
    const childNodes = subItems.map((s, i) => ({ id: id + "s" + i, kind: "folder", name: s.name, owner: "v", modified: "Just now", created: "Today", fileNo: s.fileNo, files: [], subfolders: [], access: acc }));
    const node = { id, kind: "folder", name, owner: "v", modified: "Just now", created: "Today", fileNo: "", files: [], subfolders: childNodes, access: acc };
    let where = proj.name;
    if (parentPath && parentPath.length) {
      const parent = resolveFolderPath(proj, parentPath);
      if (parent) {
        parent.subfolders = [...(parent.subfolders || []), node];

      } else { proj.folders.push(node); }
    } else {
      proj.folders.push(node);

    setProjVersion(v => v + 1);
    setFolderModal(null);
    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "folder", action: "created folder", target: name, projectId, folderId: id, time: "Just now", date: "Today" }, ...list]);
    const extra = childNodes.length ? ` with ${childNodes.length} subfolder${childNodes.length > 1 ? "s" : ""}` : "";
    flash(`Folder “${name}”${extra} created in ${where}`);
  };

  // create a master folder template (mutates MASTERS so boards/dashboard pick it up)
  const createMasterFolder = (m) => {
    MASTERS.unshift(m);
    setMastersVersion(v => v + 1);
    setCreateMaster(false);
    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "folder", action: "created master folder", target: m.name, projectId: null, time: "Just now", date: "Today" }, ...list]);
    flash(`Master folder “${m.name}” created`);
  };

  // act on a dashboard/board action item (Review / Revise / Approve / Submit)
  const handleActionAct = (a, type, lbl) => {
    setActionDone(prev => { const n = new Set(prev); n.add(a.id); return n; });
    // clear the pending action on the matching file so pending badges clear on file/folder/project
    if (a.fileName) {
      DATA.forEach(p => p.folders.forEach(f => f.files.forEach(fl => {
        if (fl.name === a.fileName && (!a.projectId || p.id === a.projectId)) fl.action = null;
      })));
      setProjVersion(v => v + 1);
    }
    flash(`${lbl}: ${a.fileName}`);
  };

  // open the shared DetailPanel for a Dashboard / My Actions action item
  const openActionDetail = (a) => {
    const _proj = DATA.find(p => p.id === a.projectId);
    const _fol = _proj ? findFolderDeep(_proj, a.folderId) : null;
    setDetail({
      id: a.id, kind: "file", name: a.fileName, type: a.fileType,
      created: a.uploadedAt, modified: a.uploadedAt, opened: a.uploadedAt,
      projectId: a.projectId, folderId: a.folderId, _actionItem: a,
      fileNo: a.fileNo || (_fol && _fol.fileNo) || null,
      assignees: a.assignees || [CURRENT_USER.key],
      notes: a.note ? [{ id: "n_" + a.id, text: a.note, by: a.requestedBy, for: ["v"], seenBy: [], time: a.uploadedAt }] : [],
    });
  };

  // copy a shareable link to the clipboard (prototype)
  const shareItem = (item) => {
    if (!item) return;
    const link = `https://docuvault.cybercom.io/f/${item.id}`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).catch(() => {});

    setActivity(list => [{ id: "ac" + Date.now(), user: "v", type: "share", action: "copied a share link for", target: item.name, projectId: breadcrumb[1] || null, time: "Just now", date: "Today" }, ...list]);
    flash(`Share link copied · ${item.name}`);
  };

  // mark a file read when opened/previewed
  const markRead = (item) => {
    if (item && item.kind === "file" && item.read === false) setReadSet(prev => prev.has(item.id) ? prev : new Set(prev).add(item.id));
  };

  const navigate = (segs) => {
    if (segs[0] === "home") { setView("home"); setBreadcrumb(segs); }
    else { setView(segs[0]); setBreadcrumb(["home"]); }
    setDetail(null);
