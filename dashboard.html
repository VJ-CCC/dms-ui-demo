.msel{position:relative;min-width:0;}
.msel-btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:#fff;height:auto;min-height:56px;}
.msel-btn .msel-val{flex:1;min-width:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;overflow-wrap:anywhere;line-height:1.25;}
.msel-val.placeholder{color:var(--g600);}
.msel-caret{flex-shrink:0;color:var(--g500);transition:transform .15s;}
.msel.open .msel-caret{transform:rotate(180deg);}
.msel-btn:not(:disabled):hover{border-color:var(--g500);}
.msel.open .msel-btn{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.msel.disabled .msel-btn{background:var(--g100);color:var(--g600);cursor:not-allowed;}
.msel-menu{z-index:3000;background:#fff;border:1px solid var(--g200);border-radius:10px;box-shadow:var(--shadow-3);padding:6px;overflow-y:auto;}
.msel-opt{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:8px;text-align:left;font-size:14px;color:var(--g800);transition:background .1s;}
.msel-opt:hover{background:var(--g100);}
.msel-opt.on{background:var(--blue-light);color:var(--blue-dark);font-weight:600;}
.msel-opt-label{flex:1;min-width:0;overflow-wrap:anywhere;}
.msel-opt-check{flex-shrink:0;color:var(--blue);margin-left:auto;}

/* Read-only destination path (New Folder / Upload File dialogs) */
.pathbox{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:10px 12px;background:var(--g50);border:1px solid var(--g200);border-radius:9px;}
.pathbox-seg{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--g700);padding:3px 4px;min-width:0;}
.pathbox-seg svg{flex-shrink:0;color:var(--g500);}
.pathbox-seg.is-root{color:var(--blue-dark);}
.pathbox-seg.is-root svg{color:var(--blue);}
.pathbox-seg.is-leaf{color:var(--g900);font-weight:600;background:var(--blue-light);border-radius:7px;padding:3px 10px;}
.pathbox-seg.is-leaf svg{color:var(--blue-dark);}
.pathbox-sep{color:var(--g400);flex-shrink:0;}
.pathbox-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.pathbox-pending{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--blue-dark);padding:3px 10px;border:1px dashed var(--blue);border-radius:7px;}
.pathbox-pending svg{color:var(--blue);}

/* New-folder dialog: optional subfolder list */
.nf-sublist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;height:140px;overflow-y:auto;padding-right:2px;}
.nf-subrow{display:flex;align-items:center;gap:8px;}
.nf-subrow .nf-subic{color:var(--g500);flex-shrink:0;}
.nf-subrow .field-input{flex:1;}
.nf-subrow .nf-subfileno{flex:1.2;}
.nf-fileno-err{border-color:var(--danger,#D93025);}
.nf-fileno-err:focus{border-color:var(--danger,#D93025);box-shadow:0 0 0 3px rgba(217,48,37,.15);}
.nf-addsub{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;height:38px;padding:0 14px;border-radius:8px;border:1px dashed var(--g300);background:#fff;color:var(--blue-dark);font-size:13px;font-weight:600;transition:background .12s,border-color .12s;}
.nf-addsub:hover{background:var(--blue-light);border-color:var(--blue);}
.nf-addsub svg{color:var(--blue);}
.nf-subhint{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--g600);}
.nf-subhint svg{color:var(--g500);flex-shrink:0;}

/* members */
.member-list{display:flex;flex-direction:column;gap:8px;}
.member-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border:1px solid var(--g200);border-radius:10px;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:14px;font-weight:600;color:var(--g800);}
.member-email{font-size:12px;color:var(--g500);}
.add-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g500);margin:18px 0 10px;}
.member-chips,.folder-chips{display:flex;flex-wrap:wrap;gap:8px;}
.member-chip{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;border:1px solid var(--g300);border-radius:20px;font-size:13px;font-weight:500;color:var(--g800);transition:background .12s;}
.member-chip:hover{background:var(--blue-light);border-color:var(--blue-light);}
.member-chip svg{color:var(--blue);}
.member-chip.picked{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark);font-weight:600;}
.member-chip.picked svg{color:var(--blue-dark);}

/* ============ UPLOAD MODAL ============ */
.list-toolbar{display:flex;justify-content:flex-end;margin:0 0 12px;}
.upload-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;padding:28px 20px;border:2px dashed var(--g300);border-radius:12px;background:var(--g50);transition:border-color .15s,background .15s;text-align:center;}
.upload-drop:hover{border-color:var(--blue);background:var(--blue-light);}
.ud-icon{width:52px;height:52px;border-radius:50%;background:#fff;border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;color:var(--blue);margin-bottom:2px;}
.ud-main{font-size:14px;font-weight:600;color:var(--g800);}
.ud-sub{font-size:12px;color:var(--g500);}
.upload-file{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--g200);border-radius:10px;background:#fff;}
.uf-info{flex:1;min-width:0;}
.uf-name{font-size:14px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uf-size{font-size:12px;color:var(--g500);margin-top:1px;}
.action-seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.action-opt{display:flex;align-items:center;justify-content:center;gap:7px;height:42px;border:1px solid var(--g300);border-radius:9px;font-size:13px;font-weight:600;color:var(--g600);background:#fff;transition:all .12s;}
.action-opt:hover{border-color:var(--g500);background:var(--g50);}
.action-opt.on{box-shadow:var(--shadow-1);}
/* per-user action mapping */
.ua-map{display:flex;flex-direction:column;gap:6px;border:1px solid var(--g200);border-radius:10px;padding:6px;background:var(--g50);}
.ua-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;background:#fff;}
.ua-name{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ua-badge{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;font-size:11px;font-weight:700;padding:3px 9px;border-radius:11px;background:var(--g100);color:var(--g600);}
.ua-select{flex-shrink:0;width:130px;border:1px solid var(--g300);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12px;font-weight:600;color:var(--g800);background:#fff;cursor:pointer;outline:none;}
.ua-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.private-label{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.private-label svg{color:var(--g500);}
.pl-left{display:inline-flex;align-items:center;gap:6px;min-width:0;}
.field-label .pl-left svg{color:var(--g500);flex-shrink:0;}
.pl-visible{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;font-size:12px;font-weight:600;color:var(--blue);}
.pl-visible svg{color:var(--blue);}
.field-date{cursor:pointer;}
.field-date::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6;}
.field-date::-webkit-calendar-picker-indicator:hover{opacity:1;}
.note-vis-head{display:flex;align-items:center;gap:7px;margin:12px 0 9px;font-size:12px;font-weight:600;color:var(--g700,#374151);}
.note-vis-head svg{color:var(--blue);}
.note-vis-head em{font-style:normal;color:var(--g500);font-weight:500;}
.note-vis-anchor{position:relative;display:block;}
.note-vis-select{display:flex;align-items:center;gap:10px;width:100%;min-height:44px;padding:6px 12px;border:1px solid var(--g300);border-radius:9px;background:#fff;font-size:13px;color:var(--g800);transition:border-color .15s,box-shadow .15s;text-align:left;}
.note-vis-select:hover{border-color:var(--g500);}
.note-vis-select.open{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.nvs-placeholder{flex:1;color:var(--g500);}
.nvs-value{flex:1;display:flex;align-items:center;gap:10px;font-weight:500;}
.nvs-avs{display:inline-flex;}
.nvs-avs .avatar{box-shadow:0 0 0 2px #fff;margin-left:-6px;}
.nvs-avs .avatar:first-child{margin-left:0;}
.nvs-count{color:var(--g700,#374151);}
.nvs-caret{color:var(--g500);flex-shrink:0;transition:transform .15s;}
.note-vis-select.open .nvs-caret{transform:rotate(180deg);}
.note-vis-menu{top:calc(100% + 6px);left:0;right:0;width:auto;max-height:260px;overflow-y:auto;padding:6px;}
.nvm-item{display:flex;align-items:center;gap:11px;width:100%;padding:8px 10px;border-radius:8px;text-align:left;transition:background .1s;}
.nvm-item:hover{background:var(--g50);}
.nvm-item.on{background:var(--blue-light);}
.nvm-info{flex:1;min-width:0;}
.nvm-name{display:block;font-size:13px;font-weight:600;color:var(--g800);}
.nvm-email{display:block;font-size:11px;color:var(--g500);overflow:hidden;text-overflow:ellipsis;}
.nvm-check{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;color:var(--blue-dark);flex-shrink:0;}
.app[data-corners="sharp"] .note-vis-select{border-radius:6px;}

/* compact searchable user picker */
.up-anchor{display:block;}
.user-picker{display:flex;align-items:center;gap:8px;width:100%;min-height:40px;padding:5px 10px 5px 12px;border:1px solid var(--g300);border-radius:9px;background:#fff;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.user-picker:hover{border-color:var(--g500);}
.user-picker.disabled{cursor:not-allowed;background:var(--g50);border-color:var(--g200);opacity:.7;}
.user-picker.disabled:hover{border-color:var(--g200);}
.user-picker.disabled .up-placeholder{color:var(--g400,#9aa0a6);}
.user-picker.open{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.up-placeholder{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--g500);}
.up-placeholder svg{color:var(--g400,#9aa0a6);}
.up-tokens{flex:1;display:flex;flex-wrap:nowrap;gap:6px;overflow:hidden;min-width:0;}
.up-token{display:inline-flex;align-items:center;gap:4px;padding:2px 3px 2px 3px;background:var(--blue-light);border-radius:14px;font-size:11px;font-weight:600;color:var(--blue-dark);flex-shrink:0;}
.up-token-name{padding-left:1px;white-space:nowrap;}
.up-token-x{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;color:var(--blue-dark);opacity:.6;transition:opacity .1s,background .1s;}
.up-token-x:hover{opacity:1;background:rgba(0,0,0,.08);}
.up-more{display:inline-flex;align-items:center;height:22px;padding:0 8px;background:var(--g100);border-radius:11px;font-size:11px;font-weight:700;color:var(--g600);flex-shrink:0;}
.up-caret{color:var(--g500);flex-shrink:0;align-self:center;transition:transform .15s;}
.user-picker.open .up-caret{transform:rotate(180deg);}
/* stacked-avatar trigger — uniform User Assignment dialog */
.up-stack-trigger{flex:1;display:flex;align-items:center;gap:10px;min-width:0;}
.up-avstack{display:inline-flex;align-items:center;flex-shrink:0;}
.up-avstack .avatar{box-shadow:0 0 0 2px #fff;margin-left:-7px;}
.up-avstack .avatar:first-child{margin-left:0;}
.up-trigger-label{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.up-count{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:11px;background:var(--blue-light);color:var(--blue-dark);font-size:12px;font-weight:700;}
.ph-acc{color:var(--g500);font-weight:400;}

.user-picker-menu{top:calc(100% + 6px);left:auto;right:0;width:400px;padding:0;overflow:hidden;display:flex;flex-direction:column;max-height:340px;}
.up-search{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--g200);}
.up-search svg{color:var(--g500);flex-shrink:0;}
.up-search input{flex:1;border:none;outline:none;background:none;font-size:14px;color:var(--g800);}
.up-search input::placeholder{color:var(--g500);}
.up-search-x{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:var(--g500);}
.up-search-x:hover{background:var(--g100);color:var(--g800);}
.up-close{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;color:var(--g500);flex-shrink:0;margin-left:2px;}
.up-close:hover{background:var(--g100);color:var(--g800);}
.up-list{flex:1;overflow-y:auto;padding:6px;}
.up-empty{padding:22px 12px;text-align:center;font-size:13px;color:var(--g500);}
.up-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border-radius:10px;text-align:left;transition:background .12s;}
.up-item-row{display:flex;align-items:center;gap:6px;border-radius:8px;}
.up-item-all{border-bottom:1px solid var(--g100);margin-bottom:4px;padding-bottom:4px;}
.up-all-ava{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);flex-shrink:0;}
.up-token-all{background:var(--blue-light);padding:3px 9px;}
.up-token-all svg{color:var(--blue-dark);}
.up-item-row .up-item{flex:1;min-width:0;}
.up-item-action{flex-shrink:0;width:118px;border:1px solid var(--g300);border-radius:7px;padding:6px 8px;font-family:inherit;font-size:12px;font-weight:600;color:var(--blue-dark);background:#fff;cursor:pointer;outline:none;margin-right:4px;}
.up-item-action:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.up-token-act{font-style:normal;font-weight:600;opacity:.75;margin-left:2px;}
.up-item:hover{background:var(--g50,#f8f9fa);}
.up-item.on{background:var(--blue-light);}
.up-check{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1.5px solid var(--g300);border-radius:5px;color:#fff;flex-shrink:0;transition:background .1s,border-color .1s;}
.up-item.on .up-check{background:var(--blue);border-color:var(--blue);}
.up-tick{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--g300);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;transition:all .12s;}
.up-tick.on{background:var(--blue);border-color:var(--blue);}
/* selected rows: tick by default, red remove-cross on hover (click toggles off) */
.up-tick .uptk-check,.up-tick .uptk-cross{display:inline-flex;align-items:center;justify-content:center;}
.up-tick .uptk-cross{display:none;}
.up-item.on:hover .up-tick.on{background:#D93025;border-color:#D93025;}
.up-item.on:hover .up-tick .uptk-check{display:none;}
.up-item.on:hover .up-tick .uptk-cross{display:inline-flex;}
/* Note & Assign Action pickers: keep the check on hover, no red remove-cross */
.note-section .up-item.on:hover .up-tick.on,.assign-section .up-item.on:hover .up-tick.on{background:var(--blue);border-color:var(--blue);}
.note-section .up-item.on:hover .up-tick .uptk-check,.assign-section .up-item.on:hover .up-tick .uptk-check{display:inline-flex;}
.note-section .up-item.on:hover .up-tick .uptk-cross,.assign-section .up-item.on:hover .up-tick .uptk-cross{display:none;}
.up-role-badge{font-size:11px;font-weight:600;color:var(--g600);background:var(--g100);border-radius:7px;padding:2px 9px;white-space:nowrap;flex-shrink:0;}
/* add-affordance: empty checkbox in grant-access candidate list (no hover fill) */
.up-tick-add{color:#fff;}
.access-pop .up-item.on:hover .up-tick.on{background:var(--blue);border-color:var(--blue);}
.up-item.on .up-role-badge{background:#fff;color:var(--blue-dark);}
.up-item-info{flex:1;min-width:0;display:flex;flex-direction:column;}
.up-item-name{display:block;font-size:13.5px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.up-item-email{display:block;font-size:11px;color:var(--g500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.up-item-phone{display:block;font-size:11px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.up-item.on .up-item-phone{color:var(--blue-dark);}
.up-foot{display:flex;align-items:center;gap:14px;padding:9px 14px;border-top:1px solid var(--g200);background:var(--g50,#f8f9fa);}
.up-foot-count{flex:1;font-size:12px;font-weight:600;color:var(--g600);}
.up-clear{font-size:12px;font-weight:600;color:var(--g600);}
.up-clear:hover{color:var(--danger);}
.up-done{height:30px;padding:0 16px;border-radius:7px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;}
.up-done:hover{background:var(--blue-dark);}
.app[data-corners="sharp"] .user-picker{border-radius:6px;}
.app[data-corners="sharp"] .user-picker-menu{border-radius:6px;}
.private-hint{display:flex;align-items:flex-start;gap:7px;margin-top:8px;font-size:12px;color:var(--g600);background:var(--blue-light);padding:9px 12px;border-radius:8px;line-height:1.4;}
.private-hint svg{color:var(--blue);flex-shrink:0;margin-top:1px;}
/* unified private-note box: textarea on top, tinted footer with picker + instruction */
.private-note-box{border:1px solid var(--g300);border-radius:8px;background:#fff;transition:border-color .12s,box-shadow .12s;}
.private-note-box:has(.pnb-text:focus){border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.pnb-text{display:block;width:100%;box-sizing:border-box;border:none;background:transparent;outline:none;resize:vertical;min-height:78px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--g900);border-radius:8px;}
.private-note-box.expanded .pnb-text{border-radius:8px 8px 0 0;}
.pnb-foot{border-top:1px solid var(--g200);background:var(--g50);padding:11px 12px;display:flex;flex-direction:column;gap:9px;border-radius:0 0 8px 8px;}
.pnb-foot .private-hint{margin-top:0;background:transparent;padding:0 2px;color:var(--g500);font-size:11px;line-height:1.35;}
.app[data-corners="sharp"] .private-note-box{border-radius:6px;}
.app[data-corners="sharp"] .upload-drop,.app[data-corners="sharp"] .upload-file,.app[data-corners="sharp"] .action-opt{border-radius:6px;}
@media (max-width:560px){.action-seg{grid-template-columns:repeat(2,1fr);}}

/* folders */
.folder-tag{display:inline-flex;align-items:center;gap:7px;padding:6px 8px 6px 12px;background:var(--g100);border-radius:20px;font-size:13px;font-weight:500;color:var(--g800);}
.folder-tag button{display:flex;color:var(--g500);border-radius:50%;padding:2px;}
.folder-tag button:hover{background:var(--g300);color:var(--g800);}
.folder-add-row{display:flex;gap:10px;margin-top:14px;}
.folder-add-row .field-input{flex:1;}

/* review */
.wiz-review{display:flex;flex-direction:column;gap:2px;}
.rev-row{display:flex;padding:12px 0;border-bottom:1px solid var(--g100);}
.rev-k{width:120px;flex-shrink:0;font-size:13px;color:var(--g500);font-weight:600;}
.rev-v{font-size:14px;color:var(--g900);flex:1;}
.member-stack{display:flex;align-items:center;gap:4px;}
.member-stack .avatar{border:2px solid #fff;margin-left:-8px;}
.member-stack .avatar:first-child{margin-left:0;}
.rev-note{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--g600);background:var(--blue-light);padding:10px 14px;border-radius:8px;}
.rev-note svg{color:var(--blue);}

/* ============ USER MANAGEMENT ============ */
.users-toolbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding-top:26px;margin-bottom:18px;}
.users-toolbar-left{min-width:0;flex:1;}
.users-toolbar-left .page-sub{margin-top:4px;}
.users-search{flex:1;max-width:420px;height:42px;}
.users-toolbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.users-toolbar-right .btn-primary{white-space:nowrap;flex:0 0 auto;}
.users-stats{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--g600);}
.users-stats b{color:var(--g900);}
.dot-sep{color:var(--g300);}
.col-head.users-head,.list-row.user-row{grid-template-columns:minmax(200px,2fr) 1.3fr 1fr .8fr 1.1fr 128px;}
.list-row.user-row{cursor:pointer;height:64px;}
.user-id{display:flex;flex-direction:column;}
.user-name{font-size:14px;font-weight:600;color:var(--g800);}
.user-email{font-size:12px;color:var(--g500);}
.user-mobile{font-size:12px;color:var(--g600);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.cell-end{display:flex;justify-content:flex-end;}
.user-actions{display:flex;justify-content:flex-end;gap:2px;opacity:0;transition:opacity .12s ease;}
.user-row:hover .user-actions,.user-row:focus-within .user-actions{opacity:1;}
.icon-btn.danger-btn:hover{background:var(--danger-light,#fce8e6);color:var(--danger);}

/* ============ MY ACTIONS ============ */
.my-actions-strip{margin:28px 0;}
.mas-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mas-head h2{font-size:18px;font-weight:600;color:var(--g900);margin:0;}
.mas-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.ma-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid var(--g200);border-radius:10px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.ma-card:hover{border-color:var(--blue);box-shadow:var(--shadow-2);}
.ma-card-info{flex:1;min-width:0;}
.ma-card-name{font-size:13px;font-weight:600;color:var(--g800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ma-card-action{font-size:11px;color:var(--g500);margin-top:2px;}
.ma-card-pri{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.ma-empty{grid-column:1/-1;padding:24px;text-align:center;color:var(--g500);font-size:14px;background:#fff;border:1px solid var(--g200);border-radius:10px;}

/* approval cards (Home My Actions + My Actions page) */
.appr-card-list{display:flex;flex-direction:column;gap:10px;}
.appr-card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--g200);border-radius:12px;padding:13px 14px 13px 16px;transition:box-shadow .12s,border-color .12s;}
.appr-card:hover{border-color:var(--g300);box-shadow:var(--shadow-2);}
.appr-card-icon{flex-shrink:0;display:inline-flex;}
.appr-card-main{flex:1;min-width:0;}
.appr-card-name{font-size:14px;font-weight:600;color:var(--g800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.appr-card-meta{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12px;color:var(--g500);flex-wrap:wrap;}
.appr-card-by{display:inline-flex;align-items:center;gap:6px;color:var(--g700,#374151);font-weight:500;}
.appr-card-dot{color:var(--g300);}
.appr-card-menu{flex-shrink:0;}
.appr-card .status-pill{flex-shrink:0;}
.app[data-corners="sharp"] .appr-card{border-radius:5px;}
.app[data-density="compact"] .appr-card{padding:10px 12px;}

/* compact approval cards — horizontal scroll strip (Home My Actions) */
.appr-strip{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:thin;}
.appr-strip::-webkit-scrollbar{height:8px;}
.appr-strip::-webkit-scrollbar-thumb{background:var(--g200);border-radius:4px;}
.appr-strip::-webkit-scrollbar-thumb:hover{background:var(--g300);}
.appr-cardc{flex:0 0 258px;display:flex;flex-direction:column;gap:8px;background:#fff;border:1px solid var(--g200);border-radius:11px;padding:12px 13px;transition:box-shadow .12s,border-color .12s;}
.appr-cardc:hover{border-color:var(--g300);box-shadow:var(--shadow-2);}
.appr-cardc.actionable{border-left:1px solid var(--g200);}
.acc-row1{display:flex;align-items:center;gap:8px;}
.acc-row1 .appr-card-icon{flex-shrink:0;display:flex;}
.acc-name{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-row1 .status-pill{flex-shrink:0;font-size:10px;padding:2px 7px;}
.acc-row1 .appr-card-menu{flex-shrink:0;margin-left:-2px;}
.acc-row2{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--g500);}
.acc-by{font-weight:600;color:var(--g700,#374151);flex-shrink:0;}
.acc-proj-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-time{flex-shrink:0;white-space:nowrap;}
.appr-card-dot{color:var(--g300);flex-shrink:0;}
.acc-actions{display:flex;align-items:center;gap:6px;padding-top:9px;border-top:1px solid var(--g100);}
.acc-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 11px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid var(--g300);background:#fff;color:var(--g700,#374151);transition:background .12s,border-color .12s,color .12s;}
.acc-btn svg{color:var(--g500);}
.acc-btn:hover{background:var(--g50);border-color:var(--g500);}
.acc-btn.approve{color:#188038;border-color:#A8DAB5;background:#E6F4EA;}
.acc-btn.approve svg{color:#188038;}
.acc-btn.approve:hover{background:#188038;color:#fff;border-color:#188038;}
.acc-btn.approve:hover svg{color:#fff;}
.acc-actions .appr-card-menu{margin-left:auto;flex-shrink:0;}
.app[data-corners="sharp"] .appr-cardc{border-radius:5px;}

/* Add User modal */
.au-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
.au-row2 > *{min-width:0;}
.seg-toggle{display:inline-flex;gap:4px;padding:3px;background:var(--g100);border-radius:10px;align-self:flex-start;}
.seg-opt{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--g600);transition:background .12s,color .12s,box-shadow .12s;}
.seg-opt svg{color:var(--g500);}
.seg-opt.on{background:#fff;color:var(--g900);box-shadow:var(--shadow-1);}
.seg-opt.on svg{color:var(--blue);}
.status-seg{padding:3px;}
.status-seg .seg-opt{padding:5px 11px;font-size:12px;}
.status-seg .seg-opt svg{width:14px;height:14px;}
.au-access{margin-top:6px;border:1px solid var(--g200);border-radius:12px;background:var(--g50);padding:14px 16px 16px;}
.au-access-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g600);margin-bottom:12px;}
.au-access-head svg{color:var(--blue);}
.au-access .field-input{background:#fff;}
.au-scope{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--g700,#374151);background:var(--blue-light);border-radius:8px;padding:10px 12px;}
.au-scope svg{color:var(--blue);flex-shrink:0;}
.au-scope b{color:var(--blue-dark);font-weight:700;}
.au-scope-sep{color:var(--blue) !important;vertical-align:middle;}
@media (max-width:520px){.au-row2{grid-template-columns:1fr;}}

.ma-section{margin-bottom:24px;}
.ma-section-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);margin-bottom:12px;}
.ma-count{background:var(--g100);color:var(--g600);border-radius:9px;padding:1px 8px;font-size:11px;}
.ma-row{cursor:pointer;}
.ma-row:hover{box-shadow:var(--shadow-1);}
.ma-action-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ma-btn{height:36px;}


/* ============ THEMING (Tweaks-driven) ============ */
/* Density — compact tightens row/control heights for an enterprise feel */
.app[data-density="compact"] .list-row{height:42px;}
.app[data-density="compact"] .col-head{height:34px;}
.app[data-density="compact"] .cell-name{font-size:13px;}
.app[data-density="compact"] .nav-item{height:36px;}
.app[data-density="compact"] .rf-card{height:48px;}
.app[data-density="compact"] .tree-row{height:28px;}
.app[data-density="compact"] .new-btn{height:42px;}
.app[data-density="compact"] .search-box{height:42px;}

/* Corners — sharp = squared, corporate */
.app[data-corners="sharp"]{--radius:3px;--pill:6px;}
.app[data-corners="sharp"] .list-card{border-radius:5px;}
.app[data-corners="sharp"] .rf-card{border-radius:4px;}
.app[data-corners="sharp"] .search-box{border-radius:6px;}
.app[data-corners="sharp"] .new-btn{border-radius:6px;}
.app[data-corners="sharp"] .filter-chip{border-radius:6px;}
.app[data-corners="sharp"] .nav-item{border-radius:0 5px 5px 0;}
.app[data-corners="sharp"] .tree-row{border-radius:0 5px 5px 0;}
.app[data-corners="sharp"] .count-badge,
.app[data-corners="sharp"] .proj-chip,
.app[data-corners="sharp"] .role-pill{border-radius:4px;}
.app[data-corners="sharp"] .avatar{border-radius:6px;}
.app[data-corners="sharp"] .card-search{border-radius:6px;}
.app[data-corners="sharp"] .popmenu{border-radius:5px;}
.app[data-corners="sharp"] .brand-mark{border-radius:5px;}
.app[data-corners="sharp"] .preview-box{border-radius:5px;}

/* Dark sidebar — premium enterprise navigation */
.app[data-sidebar="dark"] .sidebar{background:#111927;border-right-color:rgba(255,255,255,.07);}
.app[data-sidebar="dark"] .brand-name{color:#E5E7EB;}
.app[data-sidebar="dark"] .collapse-toggle{color:#9AA4B2;}
.app[data-sidebar="dark"] .brand-collapse:hover{background:rgba(255,255,255,.08);}
.app[data-sidebar="dark"] .brand-collapse .bc-menu{color:#E5E7EB;}
.app[data-sidebar="dark"] .collapse-toggle:hover{background:rgba(255,255,255,.08);}
.app[data-sidebar="dark"] .new-btn{background:rgba(255,255,255,.06);color:#F3F4F6;border-color:rgba(255,255,255,.14);box-shadow:none;}
.app[data-sidebar="dark"] .new-btn:hover{background:rgba(255,255,255,.12);}
.app[data-sidebar="dark"] .nav-item{color:#CDD5DF;}
.app[data-sidebar="dark"] .nav-item svg{color:#9AA4B2;}
.app[data-sidebar="dark"] .nav-item:hover{background:rgba(255,255,255,.06);}
.app[data-sidebar="dark"] .nav-item.active{background:color-mix(in srgb, var(--blue) 30%, transparent);color:#fff;}
.app[data-sidebar="dark"] .nav-item.active svg{color:#fff;}
.app[data-sidebar="dark"] .tree-section{border-top-color:rgba(255,255,255,.07);}
.app[data-sidebar="dark"] .tree-heading{color:#697586;}
.app[data-sidebar="dark"] .tree-row,.app[data-sidebar="dark"] .tree-text{color:#CDD5DF;}
.app[data-sidebar="dark"] .tree-row:hover{background:rgba(255,255,255,.06);}
.app[data-sidebar="dark"] .tree-chevron{color:#9AA4B2;}
.app[data-sidebar="dark"] .tree-chevron:hover{background:rgba(255,255,255,.1);}
.app[data-sidebar="dark"] .tree-row.active{background:color-mix(in srgb, var(--blue) 26%, transparent);}
.app[data-sidebar="dark"] .tree-row.active .tree-text{color:#fff;font-weight:600;}

/* ============================================================
   SUPER ADMIN DASHBOARD — widgets, boards, grid cards
   ============================================================ */
.admin-dash .stat-row-4{grid-template-columns:repeat(4,1fr);}
.widget-stack{display:flex;flex-direction:column;gap:20px;}

/* ---- widget shell ---- */
.dash-widget{background:#fff;border:1px solid var(--g200);border-radius:14px;padding:6px 0 8px;}
.dash-widget--bare{background:transparent;border:none;border-radius:0;padding:0;}
.dash-widget--bare .dw-head{padding-left:0;padding-right:0;}
.admin-dash .dash-widget--bare > .dw-head{display:flex;padding-top:26px;}
.admin-dash .dash-widget--bare > .dw-head .dw-ic{width:38px;height:38px;border-radius:10px;}
.dash-widget--bare .dw-listwrap{padding-left:0;padding-right:0;}
.dash-widget--bare .dw-title h3{font-size:26px;font-weight:700;letter-spacing:-.01em;line-height:1.2;}
/* embedded Home-style project list inside a dashboard widget */
.dw-listwrap{padding:0 14px 8px;}
.pw-toolbar{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:0;flex-wrap:wrap;flex-shrink:0;}
.dw-head .dw-title{min-width:0;}
.dash-widget--bare .dw-head{flex-wrap:wrap;gap:12px;}
.pw-add{flex:0 0 auto;white-space:nowrap;}
.pw-infobar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:14px;padding:14px 18px;background:var(--g50);border:1px solid var(--g200);border-radius:12px;}
.pw-stats{display:flex;align-items:center;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--g600);}
.pw-stat{display:inline-flex;align-items:center;gap:7px;}
.pw-stat b{color:var(--g900);font-weight:700;margin-left:2px;}
.pw-stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pw-dot-active{background:#188038;}
.pw-dot-archived{background:#9AA0A6;}
.pw-stat-sep{width:1px;height:16px;background:var(--g300);}
.pw-viewall{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;height:36px;padding:0 16px;border-radius:8px;border:1px solid var(--blue);background:#fff;color:var(--blue-dark);font-size:13px;font-weight:600;}
.pw-viewall:hover{background:var(--blue-light);}
.app[data-corners="sharp"] .pw-infobar,.app[data-corners="sharp"] .pw-viewall{border-radius:5px;}
.dw-listwrap .list-card{border-radius:10px;}
/* make the full-width ListRow grid fit the narrower widget: fluid tracks + drop the fixed inline cell widths */
.dw-listwrap .col-head,.dw-listwrap .list-row{grid-template-columns:36px minmax(0,2.2fr) repeat(var(--cols,2),minmax(0,1fr)) 150px;column-gap:8px;padding:0 12px;}
.dw-listwrap .list-row{height:66px;}
.admin-dash .dash-widget--bare .dw-listwrap .col-head,
.admin-dash .dash-widget--bare .dw-listwrap .list-row{grid-template-columns:minmax(0,2.7fr) 1fr .9fr 1fr 1fr 40px;column-gap:30px;}
.admin-dash .dash-widget--bare .dw-listwrap .col-head .cell,
.admin-dash .dash-widget--bare .dw-listwrap .list-row .cell{text-align:left;justify-content:flex-start;}
.dw-listwrap .cell{width:auto !important;min-width:0;}
.dw-listwrap .row-name,.dw-listwrap .laf-name,.dw-listwrap .laf-folder{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* keep the project Files progress + count anchored left so it never crowds the Users column */
.admin-dash .dash-widget--bare .dw-listwrap .cell-progress{padding-right:22px;box-sizing:border-box;}
.admin-dash .dash-widget--bare .dw-listwrap .cell-progress .proj-progress{max-width:100%;}
.admin-dash .dash-widget--bare .dw-listwrap .cell-progress .pp-track{min-width:24px;}
.dw-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;}
.dw-title{display:flex;align-items:center;gap:11px;}
.dw-title h3{margin:0;font-size:16px;font-weight:600;color:var(--g900);}
.dw-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dw-viewall{display:inline-flex;align-items:center;gap:3px;font-size:13px;font-weight:600;color:var(--blue);padding:6px 8px 6px 12px;border-radius:var(--pill);transition:background .12s;}
.dw-viewall:hover{background:var(--blue-light);}
.dw-viewall svg{color:currentColor;}

/* ---- table (shared by widgets + board lists) ---- */
.dwt-scroll{overflow-x:auto;scrollbar-width:thin;}
.dwt-head,.dwt-row{display:grid;align-items:center;column-gap:14px;padding:0 18px;}
.dwt-head{height:38px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--g500);border-top:1px solid var(--g200);border-bottom:1px solid var(--g200);background:var(--g50);}
.dwt-head span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dwt-row{min-height:60px;border-bottom:1px solid var(--g100);transition:background .1s;}
.dwt-body .dwt-row:last-child{border-bottom:none;}
.dwt-row:hover{background:var(--g50);}
.dwt-actions-h{justify-self:start;}
.dwt-row-click{cursor:pointer;}
.dwt-row-unassigned{opacity:.5;background:var(--g50);}
.dwt-row-unassigned .dwt-by .dwt-muted{text-decoration:line-through;}
.dwt-row-unassigned:hover{opacity:.62;}
.ua-btn{display:inline-flex;align-items:center;gap:6px;width:158px;height:30px;padding:0 9px 0 11px;border:none;border-radius:8px;color:#fff;font:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-1);transition:filter .12s,box-shadow .12s,transform .06s;white-space:nowrap;}
.ua-btn svg{color:#fff;}
.ua-btn .ua-arrow{opacity:.85;margin-left:auto;}
.ua-btn:hover{filter:brightness(.93);box-shadow:var(--shadow-2);}
.ua-btn:active{transform:translateY(1px);}
.app[data-corners="sharp"] .ua-btn{border-radius:4px;}

/* grid templates per section (min-width forces horizontal scroll when cramped) */
.users-grid{grid-template-columns:2.1fr 2.7fr 1.5fr 1.05fr .9fr 124px;min-width:880px;}
.users-grid-w{grid-template-columns:1.9fr 1.5fr 2.3fr 1fr 1fr;min-width:760px;}
.dwt-projects{min-width:0;}
.proj-stack{display:inline-flex;align-items:center;gap:6px;max-width:100%;padding:1px;border:none;background:none;border-radius:14px;cursor:pointer;transition:background .12s;}
.proj-stack:hover{background:var(--g100);}
.proj-chip-trunc{max-width:128px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.masters-grid{grid-template-columns:minmax(280px,2.6fr) 1.1fr 104px;min-width:520px;}
.dwt-created{display:inline-flex;align-items:center;gap:7px;color:var(--g600);font-size:13px;}
.dwt-created svg{color:var(--g400,#9aa0a6);flex-shrink:0;}
.dwt-row.masters-grid .masters-actions{justify-content:flex-end;justify-self:end;gap:2px;opacity:0;transition:opacity .12s;}
.dwt-row.masters-grid:hover .masters-actions,.dwt-row.masters-grid:focus-within .masters-actions{opacity:1;}
.dwt-row.masters-grid .masters-actions .icon-btn{opacity:1;}
.master-del:hover{color:var(--danger)!important;background:rgba(217,48,37,.1)!important;}
.gbtn-del:hover{color:var(--danger);border-color:#F4C7C3;background:#FCEEED;}
.ft-hint{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:12px;color:var(--g500);}
.ft-hint svg{color:var(--g400,#9aa0a6);flex-shrink:0;}
.ft-chips .member-chip{padding:5px 11px 5px 9px;font-size:12.5px;}

/* compact master grid card */
.master-gcard{padding:13px 14px 11px;gap:9px;}
.master-gcard .master-ic{width:34px;height:34px;border-radius:9px;}
.mgc-top{display:flex;align-items:flex-start;gap:11px;}
.mgc-id{flex:1;min-width:0;}
.mgc-id .g-card-name{font-size:14.5px;}
.mgc-desc{margin:3px 0 0;font-size:12.5px;color:var(--g500);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mgc-actions{display:flex;gap:1px;flex-shrink:0;margin:-2px -5px 0 0;opacity:.5;transition:opacity .12s;}
.master-gcard:hover .mgc-actions,.master-gcard:focus-within .mgc-actions{opacity:1;}
.mgc-created{display:flex;align-items:center;gap:8px;padding-top:9px;border-top:1px solid var(--g100);}
.mgc-created-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g500);}
.mgc-created-val{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--g700,#374151);font-weight:500;}
.mgc-created-val svg{color:var(--g400,#9aa0a6);flex-shrink:0;}

/* ============ TEMPLATE GALLERY (masters) ============ */
/* stacked-paper thumbnail */
.tmpl-paper{position:relative;width:104px;height:118px;flex-shrink:0;}
.tmpl-paper .tpg{position:absolute;border-radius:9px;background:#fff;box-shadow:0 3px 12px rgba(16,24,40,.13);}
.tmpl-paper .tpg.back2{inset:8px 22px 16px -8px;transform:rotate(-6deg);background:#fafbfd;opacity:.8;}
.tmpl-paper .tpg.back1{inset:4px -8px 10px 22px;transform:rotate(5deg);background:#fcfdfe;opacity:.92;}
.tmpl-paper .tpg.front{inset:0;display:flex;flex-direction:column;gap:8px;padding:14px 13px;transition:box-shadow .15s;}
.tmpl-card:hover .tmpl-paper .tpg.front{box-shadow:0 9px 24px rgba(16,24,40,.18);}
.tmpl-paper .tbar{height:10px;width:46px;border-radius:3px;margin-bottom:3px;flex-shrink:0;}
.tmpl-paper .tln{height:6px;border-radius:3px;background:var(--g200);flex-shrink:0;}
.tmpl-paper .tln.w1{width:88%;}.tmpl-paper .tln.w2{width:70%;}.tmpl-paper .tln.w3{width:80%;}.tmpl-paper .tln.w4{width:54%;}
.tmpl-paper.sm{width:46px;height:54px;}
.tmpl-paper.sm .tpg{border-radius:6px;box-shadow:0 2px 7px rgba(16,24,40,.13);}
.tmpl-paper.sm .tpg.back2{inset:3px 9px 7px -4px;}
.tmpl-paper.sm .tpg.back1{inset:2px -4px 4px 9px;}
.tmpl-paper.sm .tpg.front{padding:7px 6px;gap:4px;}
.tmpl-paper.sm .tbar{height:5px;width:22px;border-radius:2px;margin-bottom:1px;}
.tmpl-paper.sm .tln{height:3px;border-radius:2px;}
.tmpl-paper.sm .tln.w4{display:none;}

/* grid card */
.tmpl-card{position:relative;border:1px solid var(--g200);border-radius:16px;background:#fff;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s,transform .1s;}
.tmpl-card:hover{box-shadow:var(--shadow-2);border-color:var(--g300);}
.tmpl-preview{position:relative;height:142px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--g100);}
.tmpl-chip{position:absolute;top:11px;left:11px;display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.92);font-size:11.5px;font-weight:600;color:var(--g700,#374151);box-shadow:0 1px 3px rgba(16,24,40,.12);}
.tmpl-chip svg{color:var(--g500);}
.tmpl-stat{position:absolute;top:11px;left:11px;display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:999px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.92);box-shadow:0 1px 3px rgba(16,24,40,.12);}
.tmpl-stat .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tmpl-body{padding:14px 16px 6px;display:flex;flex-direction:column;gap:9px;flex:1;}
.tmpl-name-row{display:flex;align-items:flex-start;gap:11px;min-width:0;}
.tmpl-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tmpl-name-id{min-width:0;}
.tmpl-name{font-size:15.5px;font-weight:650;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.tmpl-desc{margin:3px 0 0;font-size:13px;color:var(--g600);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px;}
.tmpl-meta{display:flex;align-items:center;gap:18px;font-size:12.5px;color:var(--g600);margin-top:1px;}
.tmpl-meta > span,.tmpl-meta > .tmpl-projects-wrap{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.tmpl-meta svg{color:var(--g400,#9aa0a6);flex-shrink:0;}
.tmpl-meta-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:0;margin:0;font:inherit;font-size:12.5px;color:var(--g600);cursor:pointer;white-space:nowrap;transition:color .12s;}
.tmpl-meta-btn:hover{color:var(--blue);text-decoration:underline;text-underline-offset:2px;}
.tmpl-meta-btn svg{color:var(--g400,#9aa0a6);}
.tmpl-meta-btn:hover svg{color:var(--blue);}
.tmpl-foot{display:flex;align-items:center;gap:8px;padding:12px 16px;margin-top:auto;border-top:1px solid var(--g100);}
.tmpl-use{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;height:38px;border:none;border-radius:10px;background:var(--blue);color:#fff;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:background .12s;}
.tmpl-use:hover{background:var(--blue-dark);}
.tmpl-iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--g200);background:#fff;color:var(--g600);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .12s,border-color .12s,color .12s;}
.tmpl-iconbtn:hover{background:var(--g50);border-color:var(--g300);color:var(--g800);}
.tmpl-iconbtn.del:hover{color:var(--danger);border-color:#F4C7C3;background:#FCEEED;}

/* list rows */
.tmpl-list-grid{grid-template-columns:minmax(260px,2.4fr) 1fr 1fr 1.1fr 232px;min-width:860px;}
.tmpl-row-id{display:flex;align-items:center;gap:14px;min-width:0;}
.tmpl-row-info{display:flex;flex-direction:column;min-width:0;gap:3px;}
.tmpl-row-name{font-size:14.5px;font-weight:650;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-row-desc{font-size:12.5px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-cell{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--g700,#374151);white-space:nowrap;}
.tmpl-cell svg{color:var(--g400,#9aa0a6);flex-shrink:0;}
.tmpl-row-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;justify-self:end;}
.tmpl-use-sm{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border:none;border-radius:9px;background:var(--blue-light);color:var(--blue-dark);font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s,color .12s;}
.tmpl-use-sm:hover{background:var(--blue);color:#fff;}
.tmpl-use-sm svg{color:currentColor;}
.tmpl-row-actions .icon-btn{opacity:.55;transition:opacity .12s,background .12s;}
.dwt-row:hover .tmpl-row-actions .icon-btn{opacity:1;}
.app[data-corners="sharp"] .tmpl-card{border-radius:6px;}

.masters-grid-w{grid-template-columns:2.5fr 1.7fr .9fr 1.05fr;min-width:720px;}
.projects-grid{grid-template-columns:2.3fr 1.2fr 1.05fr 1.4fr .8fr 162px;min-width:820px;}
.actions-grid{grid-template-columns:2.3fr 1.1fr 1.1fr 1fr .95fr 1.05fr 360px;min-width:1100px;}
/* New Actions table: File · Uploaded By · Uploaded At · Action · note */
.aiv-grid{grid-template-columns:2.4fr 1.7fr 1.2fr 124px 48px;min-width:720px;}
.aiv-grid-my{grid-template-columns:2.2fr 1.5fr 1.1fr 1.7fr 150px 52px;min-width:860px;}
.aiv-grid-my .ai-note-h,.aiv-grid-my .ai-comment-h{justify-self:center;}
.aiv-grid-my .ai-comment-cell{display:flex;align-items:center;justify-content:center;}
.aiv-grid-others{grid-template-columns:2.2fr 1.4fr 1.2fr 1.4fr 1.4fr;min-width:840px;}
.ai-act-when{margin-left:21px;font-size:11px;font-weight:400;color:var(--g400,#9aa0a6);}
.hovertip{position:fixed;z-index:3000;background:var(--g900,#202124);color:#fff;font-size:12px;font-weight:500;line-height:1.5;padding:9px 12px;border-radius:8px;box-shadow:0 6px 22px rgba(0,0,0,.24);white-space:normal;pointer-events:none;}
.others-act{display:flex;flex-direction:column;gap:3px;min-width:0;}
.oa-name{font-size:13px;font-weight:600;}
.oa-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;white-space:nowrap;}
.oa-status.oa-pending{color:#B26A00;}
.oa-status.oa-done{color:var(--g500);}
.ma-toolbar-right{display:flex;align-items:center;gap:12px;}
.ma-subfilter{display:flex;gap:4px;background:var(--g100);padding:4px;border-radius:var(--pill,12px);}
.ma-sub{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 14px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:600;color:var(--g600);cursor:pointer;transition:background .12s,color .12s;}
.ma-sub.on{background:#fff;color:var(--g900);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.ma-sub-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--g200);color:var(--g600);font-size:10.5px;font-weight:700;}
.ma-sub.on .ma-sub-count{background:#E8F0FE;color:var(--blue,#1A73E8);}
/* action button — name only, outlined in the action colour */
.ai-act-btn{display:inline-flex;align-items:center;height:30px;padding:0 16px;border-radius:var(--pill,16px);border:1.5px solid currentColor;background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s,box-shadow .12s;}
.ai-act-btn:hover{background:color-mix(in srgb, currentColor 12%, #fff);}
/* completed (non-clickable) action state */
.ai-act-done{display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;font-size:13px;font-weight:600;white-space:nowrap;}
.ai-act-done-top{display:inline-flex;align-items:center;gap:5px;}
/* private-note info icon */
.ai-note-cell{display:flex;align-items:center;justify-content:center;}
.ai-note-empty{display:block;width:18px;height:18px;}
.ai-note-wrap{display:inline-flex;}
.ai-note-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:none;background:none;border-radius:50%;color:var(--blue,#1A73E8);cursor:pointer;transition:background .12s;}
.ai-note-btn:hover{background:var(--g100);}
.ai-note-pop{width:280px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;z-index:60;}
.ai-note-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--g700);}
.ai-note-body{margin:0;font-size:13px;line-height:1.5;color:var(--g700);text-wrap:pretty;}
/* ---- My Actions full view ---- */
.myactions-view{display:flex;flex-direction:column;gap:16px;}
.ma-toolbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--g200);}
.ma-tabs{display:flex;gap:28px;background:none;padding:0;border-radius:0;}
.ma-tab{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-1px;border-radius:0;font-size:15px;font-weight:600;color:var(--g500);cursor:pointer;transition:color .12s,border-color .12s;}
.ma-tab:hover{color:var(--g800);}
.ma-tab.on{background:none;color:var(--g900);border-bottom-color:var(--blue,#1A73E8);box-shadow:none;}
.ma-tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--g200);color:var(--g600);font-size:11px;font-weight:700;}
.ma-tab.on .ma-tab-count{background:#E8F0FE;color:var(--blue,#1A73E8);}
.ma-toolbar-right{padding-bottom:7px;}
.ma-listcard{background:#fff;border:1px solid var(--g200);border-radius:14px;overflow-x:auto;padding-bottom:4px;}

/* cell building blocks */
.dwt-user,.dwt-folder,.dwt-by{display:flex;align-items:center;gap:11px;min-width:0;}
.dwt-by{gap:8px;}
.dwt-user-info{display:flex;flex-direction:column;min-width:0;gap:2px;}
.dwt-name{font-size:14px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dwt-sub{font-size:12px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dwt-update{font-size:13px;color:var(--g700,#374151);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.dwt-muted{font-size:12.5px;color:var(--g500);white-space:nowrap;}
.dwt-folder-ic{width:34px;height:34px;border-radius:9px;background:#FEF3E0;color:#B26A00;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dwt-proj-ic{width:34px;height:34px;border-radius:9px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dwt-linked{font-size:13px;color:var(--g600);white-space:nowrap;}
.link-count{font-weight:700;color:var(--g800);}
.dwt-prog{display:flex;align-items:center;gap:9px;}
.dwt-prog .pp-track{flex:1;min-width:54px;height:6px;border-radius:3px;background:var(--g200);overflow:hidden;}
.dwt-prog .pp-fill{display:block;height:100%;border-radius:3px;}
.dwt-prog .pp-pct{font-size:12px;font-weight:700;color:var(--g700,#374151);min-width:34px;text-align:right;}
.pending-chip{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;padding:0 7px;border-radius:11px;background:#FCE8E6;color:#D93025;font-size:12px;font-weight:700;}
.dwt-due{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--g600);white-space:nowrap;}
.dwt-due.overdue{color:#D93025;font-weight:600;}
.dwt-actions{display:flex;align-items:center;justify-content:flex-start;gap:1px;}
.dwt-row .dwt-actions .icon-btn{opacity:.55;transition:opacity .12s,background .12s;}
.dwt-row:hover .dwt-actions .icon-btn{opacity:1;}

/* quick action buttons (Review / Revise / Approve / Submit) */
.action-qbtns{display:flex;align-items:center;gap:5px;}
.qbtn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid var(--g200);background:#fff;color:var(--g700,#374151);transition:all .12s;white-space:nowrap;}
.qbtn svg{color:var(--g500);}
.qbtn:hover{background:var(--g50);border-color:var(--g300);}
.qbtn-review:hover{border-color:var(--blue);color:var(--blue-dark);background:var(--blue-light);}
.qbtn-review:hover svg{color:var(--blue-dark);}
.qbtn-revise:hover{border-color:#B26A00;color:#B26A00;background:#FEF3E0;}
.qbtn-revise:hover svg{color:#B26A00;}
.qbtn-approve:hover{border-color:#188038;color:#188038;background:#E6F4EA;}
.qbtn-approve:hover svg{color:#188038;}
.qbtn-submit:hover{border-color:#7A5AE0;color:#7A5AE0;background:#EEE9FB;}
.qbtn-submit:hover svg{color:#7A5AE0;}

/* ---- empty + skeleton ---- */
.dw-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:var(--g500);}
.dw-empty svg{color:#DADCE0;}
.dw-empty p{margin:0;font-size:13.5px;}
.skeleton-wrap{padding:8px 18px 4px;}
.sk-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--g100);}
.sk-row:last-child{border-bottom:none;}
.sk-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--g100);}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:7px;}
.sk-line{height:10px;border-radius:5px;background:var(--g100);}
.sk-line.w70{width:70%;}
.sk-line.w40{width:40%;}
.sk-pill{width:84px;height:22px;border-radius:11px;background:var(--g100);flex-shrink:0;}
.sk-avatar,.sk-line,.sk-pill{background:linear-gradient(90deg,#F1F3F4 25%,#E8EAED 37%,#F1F3F4 63%);background-size:400% 100%;animation:sk-shimmer 1.3s ease infinite;}
@keyframes sk-shimmer{0%{background-position:100% 0;}100%{background-position:-100% 0;}}
@media (prefers-reduced-motion:reduce){.sk-avatar,.sk-line,.sk-pill{animation:none;}}

/* ============ VIEW-ALL BOARDS ============ */
.board{padding-top:4px;}
.board-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.board-search{flex:1;min-width:240px;max-width:420px;height:44px;width:auto;}
.board-filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.board-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.view-seg{padding:3px;}
.view-seg .seg-btn{padding:6px 12px;}
.board-list{border:1px solid var(--g200);border-radius:12px;overflow-x:auto;background:#fff;scrollbar-width:thin;}
.board-list .dwt-head{border-top:none;border-radius:12px 12px 0 0;}

/* ---- grid cards ---- */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;}
.g-card{border:1px solid var(--g200);border-radius:14px;background:#fff;padding:16px;display:flex;flex-direction:column;gap:12px;transition:box-shadow .15s,transform .1s,border-color .15s;}
.g-card:hover{box-shadow:var(--shadow-2);border-color:var(--g300);}
.g-card-top{display:flex;align-items:flex-start;gap:11px;}
.g-card-id{flex:1;min-width:0;}
.g-card-name{font-size:15px;font-weight:600;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-card-sub{font-size:12px;color:var(--g500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-card-top .status-pill{flex-shrink:0;}
.g-card-update{margin:0;font-size:13px;color:var(--g700,#374151);line-height:1.45;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.g-card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.g-card-stats{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--g600);}
.g-card-stats .gstat b{color:var(--g900);font-weight:700;}
.g-card-foot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:11px;border-top:1px solid var(--g100);}
.gbtn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:8px;font-size:12.5px;font-weight:600;border:1px solid var(--g200);background:#fff;color:var(--g700,#374151);transition:all .12s;}
.gbtn svg{color:var(--g500);}
.gbtn:hover{background:var(--g50);border-color:var(--g300);}
.gbtn.primary{background:var(--blue);border-color:var(--blue);color:#fff;margin-left:auto;}
.gbtn.primary svg{color:#fff;}
.gbtn.primary:hover{background:var(--blue-dark);}
.user-gcard .g-card-update{min-height:36px;}
.master-ic{width:40px;height:40px;border-radius:10px;background:#E5F3F1;color:#0F766E;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.proj-ic{width:40px;height:40px;border-radius:10px;background:#EEEFFE;color:#4F46E5;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.g-card-prog{display:flex;flex-direction:column;gap:6px;}
.g-prog-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.g-prog-row .pp-pct{font-weight:700;color:var(--g700,#374151);}
.g-card-prog .pp-track{height:7px;border-radius:4px;background:var(--g200);overflow:hidden;}
.g-card-prog .pp-fill{display:block;height:100%;border-radius:4px;}
.proj-foot{justify-content:space-between;}
.g-owner{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--g600);}
.proj-foot-btns{display:flex;gap:1px;}
.g-card-rows{display:flex;flex-direction:column;gap:9px;}
.g-card-kv{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;}
.action-gcard .g-card-foot .action-qbtns{flex-wrap:wrap;}
.g-card.action-gcard.clickable{cursor:pointer;}
.g-card.action-gcard.clickable:hover{border-color:var(--blue);box-shadow:var(--shadow-1);}
.g-card.proj-gcard.clickable{cursor:pointer;}
.g-card.proj-gcard.clickable:hover{border-color:var(--blue);box-shadow:var(--shadow-1);}
.g-card-name.clickable-name{cursor:pointer;}
.g-card-name.clickable-name:hover{color:var(--blue);text-decoration:underline;text-underline-offset:2px;}

/* ---- pagination ---- */
.pager{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:18px;flex-wrap:wrap;}
.pager-info{font-size:13px;color:var(--g500);}
.pager-controls{display:flex;align-items:center;gap:4px;}
.pager-btn,.pager-num{min-width:34px;height:34px;padding:0 8px;border-radius:8px;border:1px solid var(--g200);background:#fff;color:var(--g700,#374151);font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;transition:all .12s;}
.pager-btn:hover:not(:disabled),.pager-num:hover{background:var(--g50);border-color:var(--g300);}
.pager-btn:disabled{opacity:.4;cursor:not-allowed;}
.pager-num.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.pager-btn svg{color:currentColor;}

.app[data-corners="sharp"] .dash-widget,.app[data-corners="sharp"] .g-card,
.app[data-corners="sharp"] .board-list{border-radius:5px;}
.app[data-corners="sharp"] .qbtn,.app[data-corners="sharp"] .gbtn,
.app[data-corners="sharp"] .pager-btn,.app[data-corners="sharp"] .pager-num{border-radius:4px;}

.app[data-density="compact"] .dwt-row{min-height:52px;}
.app[data-density="compact"] .widget-stack{gap:14px;}

@media (max-width:1100px){
  .admin-dash .stat-row-4{grid-template-columns:repeat(2,1fr);}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(290px,1fr));}
}
@media (max-width:680px){
  .board-right{margin-left:0;width:100%;}
  .card-grid{grid-template-columns:1fr;}
}

/* ============ DOCUMENT VIEWER ============ */
.viewer{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:#33373b;animation:vwFade .18s ease;}
@keyframes vwFade{from{opacity:0;}to{opacity:1;}}
@media (prefers-reduced-motion:reduce){.viewer{animation:none;}}

/* chrome top bar */
.vw-bar{display:flex;align-items:center;gap:14px;height:60px;padding:0 12px 0 16px;background:#2a2d30;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;color:#E8EAED;}
.vw-id{display:flex;align-items:center;gap:12px;min-width:0;flex:1;}
.vw-titles{min-width:0;}
.vw-name{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vw-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:#9AA0A6;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vw-loc svg{color:#8AB4F8;flex-shrink:0;}
.vw-tools{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border-radius:24px;padding:4px;flex-shrink:0;}
.vw-page-ind{font-size:13px;font-weight:600;color:#E8EAED;padding:0 6px;min-width:74px;text-align:center;white-space:nowrap;}
.vw-page-ind input{width:30px;background:rgba(255,255,255,.1);border:none;border-radius:5px;color:#fff;font:inherit;font-weight:600;text-align:center;padding:2px 0;outline:none;-moz-appearance:textfield;}
.vw-page-ind input::-webkit-outer-spin-button,.vw-page-ind input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.vw-zoom-lbl{font-size:12px;font-weight:600;color:#E8EAED;min-width:46px;text-align:center;}
.vw-divider{width:1px;height:22px;background:rgba(255,255,255,.12);margin:0 4px;flex-shrink:0;}
.vw-actions{display:flex;align-items:center;gap:2px;flex:1;justify-content:flex-end;flex-shrink:0;}
.vw-iconbtn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;color:#C4C7C5;transition:background .12s,color .12s;flex-shrink:0;}
.vw-iconbtn:hover{background:rgba(255,255,255,.1);color:#fff;}
.vw-iconbtn:disabled{opacity:.35;cursor:not-allowed;}
.vw-iconbtn.on{color:#FDD663;}
.vw-iconbtn.sky.on{color:#8AB4F8;background:rgba(138,180,248,.16);}
.vw-act-btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 18px;border-radius:20px;color:#fff;font-size:14px;font-weight:600;margin-left:6px;flex-shrink:0;transition:filter .15s;}
.vw-act-btn:hover{filter:brightness(1.08);}
.vw-act-done{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border-radius:20px;background:rgba(255,255,255,.1);font-size:13px;font-weight:600;margin-left:6px;flex-shrink:0;}

/* body = optional thumb rail + canvas + optional sidebar */
.vw-body{flex:1;display:flex;min-height:0;}
.vw-rail{width:148px;flex-shrink:0;background:#26292c;border-right:1px solid rgba(255,255,255,.07);overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;align-items:center;gap:14px;transition:width .2s,opacity .2s;}
.vw-rail.hidden{width:0;opacity:0;padding:0;overflow:hidden;border:none;}
.vw-thumb{width:96px;cursor:pointer;border:none;background:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.vw-thumb-sheet{width:96px;height:124px;background:#fff;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.4);overflow:hidden;position:relative;outline:2px solid transparent;outline-offset:2px;transition:outline-color .12s;}
.vw-thumb.on .vw-thumb-sheet{outline-color:#8AB4F8;}
.vw-thumb-num{font-size:11px;font-weight:600;color:#9AA0A6;}
.vw-thumb.on .vw-thumb-num{color:#E8EAED;}

/* canvas */
.vw-canvas{flex:1;overflow:auto;padding:32px 28px 56px;display:flex;flex-direction:column;align-items:center;gap:26px;scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){.vw-canvas{scroll-behavior:auto;}}
.vw-pagewrap{transition:width .15s;}
.vw-page{background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.4);transform-origin:top center;}

/* document content rendered inside a page */
.doc{width:680px;min-height:880px;padding:64px 70px;box-sizing:border-box;font-family:'Roboto',system-ui,sans-serif;color:#1F2937;}
.doc-hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--blue);padding-bottom:14px;margin-bottom:30px;}
.doc-hdr-brand{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--blue-dark);}
.doc-hdr-mark{width:22px;height:22px;border-radius:5px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.doc-hdr-meta{font-size:11px;color:#9AA0A6;text-align:right;line-height:1.5;}
.doc h1{font-size:26px;font-weight:700;color:#202124;margin:0 0 6px;line-height:1.25;text-wrap:balance;}
.doc-subtitle{font-size:13px;color:#6B7280;margin-bottom:30px;}
.doc h2{font-size:16px;font-weight:700;color:#1A73E8;margin:30px 0 12px;}
.doc-line{height:9px;border-radius:3px;background:#EAECEF;margin-bottom:11px;}
.doc-para{margin-bottom:22px;}
.doc-fig{height:150px;border-radius:8px;margin:8px 0 24px;background:repeating-linear-gradient(135deg,#EEF2F7 0 12px,#E4E9F0 12px 24px);display:flex;align-items:center;justify-content:center;}
.doc-fig span{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11px;color:#9AA0A6;letter-spacing:.04em;background:rgba(255,255,255,.7);padding:4px 10px;border-radius:5px;}
.doc-table{width:100%;border-collapse:collapse;margin:6px 0 24px;font-size:12px;}
.doc-table td,.doc-table th{border:1px solid #E5E7EB;padding:9px 12px;text-align:left;}
.doc-table th{background:#F3F6FB;font-weight:700;color:#374151;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.doc-table td{color:#4B5563;}
.doc-foot{margin-top:40px;padding-top:14px;border-top:1px solid #E5E7EB;display:flex;justify-content:space-between;font-size:10px;color:#9AA0A6;}

/* spreadsheet variant */
.doc-sheet{width:760px;min-height:560px;padding:0;background:#fff;box-sizing:border-box;font-family:'Roboto',system-ui,sans-serif;}
.sheet-grid{display:grid;}
.sheet-cell{border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;height:30px;display:flex;align-items:center;padding:0 9px;font-size:11.5px;color:#4B5563;white-space:nowrap;overflow:hidden;}
.sheet-cell.corner,.sheet-cell.colhdr,.sheet-cell.rowhdr{background:#F3F4F6;color:#6B7280;font-weight:600;justify-content:center;padding:0;font-size:10.5px;}
.sheet-cell.head{background:#E8F0FE;font-weight:700;color:#185ABC;}
.sheet-cell.num{justify-content:flex-end;font-variant-numeric:tabular-nums;}
.sheet-tabs{display:flex;gap:1px;background:#F3F4F6;border-top:1px solid #E5E7EB;padding:0 6px;}
.sheet-tab{font-size:11px;font-weight:600;color:#6B7280;padding:7px 14px;border-right:1px solid #E5E7EB;}
.sheet-tab.on{background:#fff;color:#188038;box-shadow:inset 0 -2px 0 #188038;}

/* image variant */
.doc-image{width:720px;height:520px;background:repeating-linear-gradient(135deg,#3a3d40 0 16px,#34373a 16px 32px);display:flex;align-items:center;justify-content:center;}
.doc-image span{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:#C4C7C5;letter-spacing:.05em;background:rgba(0,0,0,.35);padding:6px 14px;border-radius:6px;}

/* right info sidebar */
.vw-side{width:340px;flex-shrink:0;background:#fff;border-left:1px solid var(--g200);display:flex;flex-direction:column;animation:vwSlide .22s ease;}
@keyframes vwSlide{from{transform:translateX(40px);opacity:0;}to{transform:none;opacity:1;}}
@media (prefers-reduced-motion:reduce){.vw-side{animation:none;}}
.vw-side-tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--g200);gap:22px;flex-shrink:0;}
.vw-side-tab{padding:15px 2px 13px;font-size:13.5px;font-weight:600;color:var(--g500);border-bottom:3px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;}
.vw-side-tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.vw-side-tab .tab-count{font-size:11px;font-weight:700;background:var(--g100);color:var(--g600);border-radius:9px;padding:1px 7px;}
.vw-side-tab.on .tab-count{background:var(--blue-light);color:var(--blue-dark);}
.vw-side-body{flex:1;overflow-y:auto;padding:18px 20px;}

/* versions */
.ver-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--g100);position:relative;}
.ver-item:last-child{border-bottom:none;}
.ver-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.ver-dot{width:11px;height:11px;border-radius:50%;background:var(--g300);margin-top:4px;flex-shrink:0;border:2px solid #fff;box-shadow:0 0 0 1px var(--g300);}
.ver-item.current .ver-dot{background:var(--blue);box-shadow:0 0 0 1px var(--blue);}
.ver-line{flex:1;width:2px;background:var(--g200);margin:4px 0 -14px;}
.ver-item:last-child .ver-line{display:none;}
.ver-body{flex:1;min-width:0;}
.ver-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ver-tag{font-size:13px;font-weight:700;color:var(--g800);}
.ver-cur-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--blue-dark);background:var(--blue-light);padding:2px 8px;border-radius:9px;}
.ver-meta{display:flex;align-items:center;gap:7px;margin-top:5px;font-size:12px;color:var(--g500);}
.ver-meta b{color:var(--g700,#374151);font-weight:600;}
.ver-note{margin:8px 0 0;font-size:12.5px;color:var(--g700,#374151);line-height:1.45;background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:8px 10px;}
.ver-acts{display:flex;gap:6px;margin-top:9px;}
.ver-act{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--g600);background:#fff;border:1px solid var(--g300);border-radius:7px;padding:4px 10px;transition:all .12s;}
.ver-act:hover{background:var(--g50);border-color:var(--g500);color:var(--g800);}
.ver-act.primary{color:var(--blue);border-color:transparent;background:var(--blue-light);}
.ver-act.primary:hover{background:var(--blue);color:#fff;}
.ver-act svg{color:currentColor;}

/* comments */
.cmt-list{display:flex;flex-direction:column;gap:4px;}
.cmt{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--g100);}
.cmt:last-child{border-bottom:none;}
.cmt-body{flex:1;min-width:0;}
.cmt-top{display:flex;align-items:center;gap:7px;}
.cmt-by{font-size:13px;font-weight:600;color:var(--g800);}
.cmt-time{font-size:11.5px;color:var(--g500);}
.cmt-pageref{margin-left:auto;font-size:11px;font-weight:600;color:var(--blue-dark);background:var(--blue-light);border-radius:8px;padding:1px 8px;cursor:pointer;}
.cmt-text{margin:5px 0 0;font-size:13px;color:var(--g700,#374151);line-height:1.5;}
.cmt-resolved{display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:11px;font-weight:600;color:#188038;}
.cmt-resolved svg{color:#188038;}
.cmt-empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px 16px;text-align:center;color:var(--g500);}
.cmt-empty svg{color:var(--g300);}
.cmt-empty p{margin:0;font-size:13px;}
.cmt-compose{border-top:1px solid var(--g200);padding:14px 20px;flex-shrink:0;}
.cmt-box{display:flex;gap:10px;align-items:flex-start;}
.cmt-box textarea{flex:1;border:1px solid var(--g300);border-radius:10px;padding:9px 12px;font:inherit;font-size:13px;color:var(--g800);resize:none;outline:none;transition:border-color .12s;min-height:38px;}
.cmt-box textarea:focus{border-color:var(--blue);}
.cmt-send{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;flex-shrink:0;transition:background .15s;}
.cmt-send:hover{background:var(--blue-dark);}
.cmt-send:disabled{opacity:.4;cursor:not-allowed;}

/* details inside viewer reuse meta-row */
.vw-side-body .preview-box{height:160px;}

@media (max-width:1024px){
  .vw-side{position:absolute;right:0;top:60px;bottom:0;box-shadow:-4px 0 18px rgba(0,0,0,.3);z-index:5;}
  .vw-rail{position:absolute;left:0;top:60px;bottom:0;z-index:5;box-shadow:4px 0 18px rgba(0,0,0,.3);}
}
@media (max-width:680px){
  .vw-tools{display:none;}
}

/* ===================== NEW PROJECT POPUP (np-) ===================== */
.np-overlay{--g400:#9AA0A6;--g700:#374151;--danger-light:#FCE8E6;--ok:#188038;--ok-light:#E6F4EA;
  --np-sh1:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.08);
  --np-sh3:0 8px 28px rgba(60,64,67,.22),0 2px 6px rgba(60,64,67,.12);
  position:fixed;inset:0;background:rgba(32,33,36,.46);display:flex;align-items:center;justify-content:center;padding:28px;z-index:120;}
.np-modal{background:#fff;border-radius:18px;box-shadow:var(--np-sh3);width:100%;max-width:560px;height:auto;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
@media (prefers-reduced-motion:no-preference){.np-modal{animation:npPop .2s cubic-bezier(.2,.8,.3,1) both;}}
@keyframes npPop{from{transform:translateY(10px) scale(.985);}to{transform:none;}}
.np-head{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--g100);flex-shrink:0;}
.np-mark{width:40px;height:40px;border-radius:11px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.np-titles{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
.np-kicker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);}
.np-title{font-size:18px;font-weight:700;color:var(--g900);}
.np-x{margin-left:auto;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g500);border:1px solid var(--g200);transition:background .12s,color .12s,border-color .12s;flex-shrink:0;}
.np-x:hover{background:var(--g100);color:var(--g800);border-color:var(--g300);}
.np-body{flex:1;min-height:0;display:grid;grid-template-columns:1fr;}
.np-pane{display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
.np-pane-l{border-right:none;background:#fff;}
.np-pane-head{display:flex;align-items:center;gap:9px;padding:18px 24px 4px;}
.np-ph-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.np-pane-head h2{margin:0;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g600);}
.np-form{padding:16px 24px 24px;display:flex;flex-direction:column;gap:22px;}
.np-field{display:flex;flex-direction:column;gap:9px;}
.np-field-lbl{font-size:12px;font-weight:600;color:var(--g600);letter-spacing:.01em;display:flex;align-items:center;gap:6px;}
.np-field-lbl .np-req{color:var(--g400);font-weight:600;}
.np-field-lbl .np-opt{margin-left:auto;font-size:11px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--blue-dark);background:var(--blue-light);border-radius:9px;padding:1px 8px;}
.np-inp{height:44px;border:1px solid var(--g300);border-radius:10px;padding:0 13px;font-size:14px;color:var(--g900);background:#fff;outline:none;transition:border-color .12s,box-shadow .12s;width:100%;font-family:inherit;}
.np-inp::placeholder{color:var(--g400);}
.np-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.np-datefield{position:relative;height:44px;border:1px solid var(--g300);border-radius:10px;background:#fff;display:flex;align-items:center;gap:10px;padding:0 12px;cursor:pointer;transition:border-color .12s,box-shadow .12s;text-align:left;width:100%;}
.np-datefield:hover{border-color:var(--g500);}
.np-datefield.focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.np-df-ic{color:var(--g500);flex-shrink:0;}
.np-df-val{flex:1;font-size:14px;color:var(--g900);font-weight:500;}
.np-df-val.empty{color:var(--g400);font-weight:400;}
.np-df-chev{color:var(--g400);flex-shrink:0;}
.np-date-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.np-cal{position:fixed;z-index:130;width:300px;background:#fff;border-radius:16px;box-shadow:var(--np-sh3);border:1px solid var(--g200);padding:15px 15px 11px;}
@media (prefers-reduced-motion:no-preference){.np-cal{animation:npPopsm .14s ease both;}}
.np-cal-head{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.np-cal-title{flex:1;font-size:14.5px;font-weight:700;color:var(--g900);padding-left:4px;}
.np-cal-nav{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--g600);transition:background .12s,color .12s;}
.np-cal-nav:hover{background:var(--g100);color:var(--g900);}
.np-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.np-cal-dow{height:30px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.02em;}
.np-cal-cell{height:38px;display:flex;align-items:center;justify-content:center;}
.np-cal-day{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--g800);transition:background .12s,color .12s,box-shadow .12s;border:none;background:none;cursor:pointer;font-family:inherit;}
.np-cal-day:hover{background:var(--g100);}
.np-cal-day.out{color:var(--g300);}

.np-cal-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:10px;border-top:1px solid var(--g100);}
.np-cal-link{font-size:12.5px;font-weight:600;color:var(--blue);padding:5px 9px;border-radius:8px;transition:background .12s;border:none;background:none;cursor:pointer;font-family:inherit;}
.np-cal-link:hover{background:var(--blue-light);}
.np-cal-link.muted{color:var(--g500);}
.np-cal-link.muted:hover{background:var(--g100);color:var(--g700);}
.np-picker-btn{min-height:44px;border:1px solid var(--g300);border-radius:10px;background:#fff;display:flex;align-items:center;gap:9px;padding:6px 12px;cursor:pointer;transition:border-color .12s,box-shadow .12s;width:100%;text-align:left;}
.np-picker-btn:hover{border-color:var(--g500);}
.np-picker-btn.open{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
.np-picker-ph{font-size:14px;color:var(--g400);flex:1;}
.np-picker-stack{display:flex;align-items:center;flex:1;flex-wrap:nowrap;gap:6px;min-width:0;overflow:hidden;}
.np-chip{display:inline-flex;align-items:center;gap:6px;background:var(--g100);border-radius:20px;padding:3px 9px 3px 3px;flex-shrink:0;}
.np-chip-name{font-size:12.5px;font-weight:600;color:var(--g800);}
.np-chip-x{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g500);}
.np-chip-x:hover{background:var(--g300);color:var(--g800);}
.np-chip-more{display:inline-flex;align-items:center;font-size:12px;font-weight:700;color:var(--g600);background:var(--g100);border-radius:20px;padding:4px 10px;flex-shrink:0;}
.np-picker-chev{color:var(--g400);margin-left:auto;flex-shrink:0;}
.np-pop-clear{position:fixed;inset:0;z-index:125;}
.np-pop{position:fixed;z-index:130;width:400px;background:#fff;border-radius:13px;box-shadow:var(--np-sh3);border:1px solid var(--g200);overflow:hidden;}
@media (prefers-reduced-motion:no-preference){.np-pop{animation:npPopsm .14s ease both;}}
@keyframes npPopsm{from{transform:translateY(-4px);}to{transform:none;}}
.np-pop-head{display:flex;align-items:center;gap:8px;padding:11px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g600);border-bottom:1px solid var(--g100);}
.np-pop-head .np-pop-ct{margin-left:auto;font-size:11px;color:var(--blue-dark);background:var(--blue-light);border-radius:9px;padding:1px 8px;letter-spacing:0;}
.np-pop-list{max-height:280px;overflow-y:auto;padding:6px;}
.np-pop-search{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--g200);color:var(--g500);}
